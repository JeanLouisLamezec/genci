    var bootstrapPromise = null;
    var bootstrapComplete = false;
    var maxRetries = 3;

    // Spécifications d'affichage des références (dérivé automatiquement de SCHEMA.referenceDisplays)
    var GENCI_REF_DISPLAY_SPECS = [];
    
    // Initialiser GENCI_REF_DISPLAY_SPECS à partir du schéma
    function initializeRefDisplaySpecs() {
        if (SCHEMA && SCHEMA.referenceDisplays) {
            GENCI_REF_DISPLAY_SPECS = SCHEMA.referenceDisplays.map(function(ref) {
                return {
                    table: ref.table,
                    column: ref.column,
                    visibleColId: ref.visibleColumn
                };
            });
        }
    }
    
    // Appeler l'initialisation
    initializeRefDisplaySpecs();

    // Helper : convertit un tableau colonnaire Grist en tableau d'objets
    function columnarToRows(data) {
        if (!data || Array.isArray(data)) return data || [];
        var cols = Object.keys(data);
        if (!cols.length) return [];
        var n = (data[cols[0]] && data[cols[0]].length) || 0;
        var rows = [];
        for (var i = 0; i < n; i++) {
            var rec = {};
            for (var j = 0; j < cols.length; j++) {
                rec[cols[j]] = data[cols[j]][i];
            }
            rows.push(rec);
        }
        return rows;
    }

    // Helper : log structuré
    function log(phase, data) {
        var msg = '[GENCI schema] ' + phase;
        if (typeof console !== 'undefined') {
            if (data !== undefined) {
                console.info(msg, data);
            } else {
                console.info(msg);
            }
        }
    }

    // Helper : délai
    function delay(ms) {
        return new Promise(function (resolve) { setTimeout(resolve, ms); });
    }

    // Helper : attente conditionnelle avec backoff borné (TODO 13)
    async function waitUntil(predicate, options) {
        var opts = options || {};
        var attempts = opts.attempts || 6;
        var initialDelay = opts.initialDelay || 50;
        var maxDelay = opts.maxDelay || 300;
        
        for (var i = 0; i < attempts; i++) {
            var result = await predicate();
            if (result) {
                return { success: true, attempts: i + 1 };
            }
            if (i < attempts - 1) {
                var delayMs = Math.min(initialDelay * Math.pow(2, i), maxDelay);
                await delay(delayMs);
            }
        }
        
        return { success: false, attempts: attempts };
    }

    // Helper : vérifie si un type est Ref ou RefList
    function isRefType(type) {
        return /^(Ref|RefList):/.test(String(type || ''));
    }

    // Helper : extrait la table cible d'un type Ref
    function getRefTarget(type) {
        var match = /^(?:Ref|RefList):(.+)$/.exec(String(type || ''));
        return match ? match[1] : null;
    }

    // ========================================================================
    // PASSE 0 — Migration et inspection
    // ========================================================================
    
    async function migrateLegacyTables(grist) {
        var migrationEntries = [];
        try {
            // Renommer Portefeuilles → Programmes si nécessaire
            var tablesData = await grist.docApi.fetchTable('_grist_Tables');
            var tables = columnarToRows(tablesData);
            var hasPortefeuilles = tables.some(function(t) { return t.tableId === 'Portefeuilles'; });
            var hasProgrammes = tables.some(function(t) { return t.tableId === 'Programmes'; });
            
            if (hasPortefeuilles && !hasProgrammes) {
                await grist.docApi.applyUserActions([['RenameTable', 'Portefeuilles', 'Programmes']]);
                migrationEntries.push('Renamed Portefeuilles → Programmes');
                log('[GENCI tables] Migration: ' + migrationEntries[0]);
            }
        } catch (e) {
            log('[GENCI tables] Migration error: ' + (e.message || e));
        }
        return migrationEntries;
    }

    async function loadSchemaMetadata(grist) {
        // TODO 14 : Paralléliser les lectures indépendantes
        var results = await Promise.all([
            grist.docApi.fetchTable('_grist_Tables'),
            grist.docApi.fetchTable('_grist_Tables_column')
        ]);
        
        var tablesData = results[0];
        var columnsData = results[1];
        
        var tables = columnarToRows(tablesData);
        var columns = columnarToRows(columnsData);
        
        // Index par tableId
        var tableById = {};
        for (var i = 0; i < tables.length; i++) {
            tableById[tables[i].tableId] = tables[i];
        }
        
        // Index par (tableId, colId)
        var columnByKey = {};
        var columnByRowId = {};
        for (var j = 0; j < columns.length; j++) {
            var col = columns[j];
            var parentTable = tables.find(function (t) { t.id === col.parentId });
            if (parentTable) {
                var key = parentTable.tableId + '.' + col.colId;
                columnByKey[key] = col;
                columnByRowId[col.id] = col;
            }
        }
        
        return {
            tables: tables,
            columns: columns,
            tableById: tableById,
            columnByKey: columnByKey,
            columnByRowId: columnByRowId
        };
    }

    // ========================================================================
    // PASSE 1 — Création de toutes les tables (colonnes non-Ref uniquement)
    // ========================================================================
    
    // Normalise une définition de colonne pour Grist
    function normalizeColumnDefinition(column) {
        var opts = column.opts || column;
        return {
            id: column.id,
            type: opts.type || 'Text',
            isFormula: Boolean(opts.isFormula),
            formula: opts.formula || ''
        };
    }
    
    function splitColumns(columns, formulasMap, tableName) {
        var nonRefCols = [];
        var refCols = [];
        var formulaCols = [];
        
        for (var i = 0; i < columns.length; i++) {
            var col = columns[i];
            var type = col.type || (col.opts && col.opts.type);
            
            // Vérifier si c'est une formule définie
            if (formulasMap && formulasMap[tableName] && formulasMap[tableName][col.id]) {
                formulaCols.push(col);
            } else if (isRefType(type)) {
                refCols.push(col);
            } else {
                nonRefCols.push(col);
            }
        }
        
        return { nonRef: nonRefCols, ref: refCols, formula: formulaCols };
    }

    async function createTable(grist, tableId, columns, retryCount) {
        var colSpecs = columns.map(function (column) {
            var normalized = normalizeColumnDefinition(column);
            var spec = {
                id: normalized.id,
                type: normalized.type,
                isFormula: normalized.isFormula
            };
            if (normalized.isFormula && normalized.formula) {
                spec.formula = normalized.formula;
            }
            return spec;
        });
        
        // Validation avant appel Grist
        for (var i = 0; i < colSpecs.length; i++) {
            if (!colSpecs[i].id || !colSpecs[i].type) {
                throw new Error(
                    'Définition de colonne invalide pour ' + tableId +
                    ': ' + JSON.stringify(colSpecs[i])
                );
            }
        }
        
        log('[GENCI tables] Création table: ' + tableId + ' (' + colSpecs.length + ' colonnes)');
        
        try {
            await grist.docApi.applyUserActions([
                ['AddTable', tableId, colSpecs]
            ]);
            return true;
        } catch (e) {
            var msg = e.message || String(e);
            if (msg.indexOf('already exists') !== -1 && retryCount < maxRetries) {
                log('[GENCI tables] Table déjà créée, réessai ' + (retryCount + 1));
                await delay(200 * (retryCount + 1));
                return createTable(grist, tableId, columns, retryCount + 1);
            }
            throw e;
        }
    }

    async function ensureBaseTables(grist, schemaDef, formulasMap) {
        var metadata = await loadSchemaMetadata(grist);
        var created = [];
        var columnsAdded = [];
        var invalidTypes = [];
        var errors = [];
        
        for (var i = 0; i < SCHEMA.tableOrder.length; i++) {
            var tableId = SCHEMA.tableOrder[i];
            var tableDef = schemaDef.tables[tableId];
            
            if (!tableDef) continue;
            
            if (!metadata.tableById[tableId]) {
                // Table manquante : la créer
                var columns = tableDef.columns || [];
                var split = splitColumns(columns, formulasMap, tableId);
                
                // Créer avec colonnes non-Ref UNIQUEMENT (pas les formules ici)
                var baseCols = split.nonRef;
                if (baseCols.length > 0) {
                    await createTable(grist, tableId, baseCols, 0);
                    created.push(tableId);
                }
            } else {
                // Table existante : ajouter les colonnes simples manquantes
                var columns = tableDef.columns || [];
                var split = splitColumns(columns, formulasMap, tableId);
                
                for (var j = 0; j < split.nonRef.length; j++) {
                    var colDef = split.nonRef[j];
                    var key = tableId + '.' + colDef.id;
                    if (!metadata.columnByKey[key]) {
                        try {
                            await addColumn(grist, tableId, colDef, 0);
                            columnsAdded.push(key);
                        } catch (e) {
                            errors.push({
                                table: tableId,
                                column: colDef.id,
                                action: 'add',
                                error: e.message || String(e)
                            });
                        }
                    }
                }
            }
        }
        
        return { 
            created: created, 
            columnsAdded: columnsAdded,
            invalidTypes: invalidTypes,
            errors: errors 
        };
    }

    // ========================================================================
    // SYNCHRONISATION — Attendre la stabilisation des métadonnées (3 tentatives max)
    // ========================================================================
    
    async function syncMetadata(grist, expectedTables) {
        log('[GENCI sync] Attente stabilisation métadonnées...');
        
        var lastMetadata = null;
        
        // Utiliser waitUntil pour une attente conditionnelle (TODO 13)
        var result = await waitUntil(function() {
            return loadSchemaMetadata(grist).then(function(metadata) {
                lastMetadata = metadata;
                var missing = expectedTables.filter(function(tableId) {
                    return !metadata.tableById[tableId];
                });
                return missing.length === 0;
            });
        }, { attempts: 6, initialDelay: 50, maxDelay: 200 });
        
        if (result.success) {
            log('[GENCI sync] Métadonnées stabilisées (' + result.attempts + ' tentatives)');
            return lastMetadata;
        }
        
        // Échec après 6 tentatives
        var missing = expectedTables.filter(function(tableId) {
            return !lastMetadata.tableById[tableId];
        });
        
        throw new Error(
            'Tables absentes après ' + result.attempts + ' tentatives: ' +
            missing.join(', ')
        );
    }

    // ========================================================================
    // PASSE 2 — Création et réparation des colonnes de référence
    // ========================================================================
    
    async function addColumn(grist, tableId, colDef, retryCount) {
        var normalized = normalizeColumnDefinition(colDef);
        
        log('[GENCI refs] Ajout colonne: ' + tableId + '.' + normalized.id + ' (' + normalized.type + ')');
        
        var action = ['AddColumn', tableId, normalized.id, {
            type: normalized.type,
            isFormula: normalized.isFormula
        }];
        
        if (normalized.isFormula && normalized.formula) {
            action[3].formula = normalized.formula;
        }
        
        try {
            await grist.docApi.applyUserActions([action]);
            return true;
        } catch (e) {
            var msg = e.message || String(e);
            
            // ==========================================================================
            // GESTION DES ERREURS "already exists" — INTERDICTION DE RELANCER AVEUGLEMENT
            // ==========================================================================
            // Après une erreur indiquant que la colonne existe déjà :
            // 1. Relire les métadonnées
            // 2. Vérifier si la colonne canonique existe
            // 3. Vérifier son type
            // 4. Si elle existe avec le bon type → succès concurrent
            // 5. Si elle existe avec un mauvais type → conflit structuré
            // 6. JAMAIS relancer immédiatement AddColumn avec le même identifiant
            // ==========================================================================
            var isAlreadyExistsError = 
                msg.indexOf('already exists') !== -1 ||
                msg.indexOf('duplicate') !== -1 ||
                msg.indexOf('column exists') !== -1;
            
            if (isAlreadyExistsError) {
                log('[GENCI refs] Erreur "already exists" détectée, relecture des métadonnées...');
                
                try {
                    // Recharger les métadonnées pour vérifier l'état réel
                    var freshMetadata = await loadSchemaMetadata(grist);
                    var key = tableId + '.' + normalized.id;
                    var existingCol = freshMetadata.columnByKey[key];
                    
                    if (existingCol) {
                        // La colonne existe, vérifier son type
                        var expectedType = normalized.type;
                        var actualType = existingCol.type;
                        
                        if (actualType === expectedType) {
                            // Succès concurrent : un autre acteur a créé la colonne
                            log('[GENCI refs] Colonne déjà créée par un autre acteur (type correct)');
                            return true; // Considérer comme succès
                        } else {
                            // Conflit de type : la colonne existe avec un type incorrect
                            log('[GENCI refs] Conflit de type : attendu=' + expectedType + ', actuel=' + actualType);
                            throw new Error(
                                'COLUMN_TYPE_CONFLICT: ' + key + 
                                ' (expected: ' + expectedType + ', actual: ' + actualType + ')'
                            );
                        }
                    } else {
                        // Colonne toujours absente après erreur "already exists"
                        // C'est incohérent, ne pas réessayer immédiatement
                        log('[GENCI refs] Erreur incohérente : colonne absente après erreur "already exists"');
                        throw e; // Propager l'erreur originale
                    }
                } catch (metadataError) {
                    log('[GENCI refs] Erreur lors de la relecture des métadonnées:', metadataError);
                    throw e; // Propager l'erreur originale
                }
            }
            
            // Erreurs transitoires autres que "already exists" : retry avec délai progressif
            var isTransientError = 
                msg.indexOf('NoneType') !== -1 ||
                msg.indexOf('table_id') !== -1 ||
                msg.indexOf('table not found') !== -1 ||
                msg.indexOf('unknown table') !== -1 ||
                msg.indexOf('invalid table') !== -1;
            
            if (isTransientError && retryCount < maxRetries) {
                log('[GENCI refs] Erreur transitoire, réessai ' + (retryCount + 1) + ': ' + msg);
                await delay(300 * (retryCount + 1));
                return addColumn(grist, tableId, colDef, retryCount + 1);
            }
            
            // Après dernier essai ou erreur non transitoire : relancer l'erreur
            throw e;
        }
    }

    async function ensureRefColumns(grist, schemaDef, formulasMap) {
        var metadata = await loadSchemaMetadata(grist);
        var result = { added: [], repaired: [], errors: [] };
        
        for (var i = 0; i < SCHEMA.tableOrder.length; i++) {
            var tableId = SCHEMA.tableOrder[i];
            var tableDef = schemaDef.tables[tableId];
            
            if (!tableDef || !metadata.tableById[tableId]) continue;
            
            var columns = tableDef.columns || [];
            var split = splitColumns(columns, formulasMap, tableId);
            
            // Traiter les colonnes Ref
            for (var j = 0; j < split.ref.length; j++) {
                var colDef = split.ref[j];
                var key = tableId + '.' + colDef.id;
                var existingCol = metadata.columnByKey[key];
                
                if (!existingCol) {
                    // Colonne manquante : l'ajouter
                    try {
                        await addColumn(grist, tableId, colDef, 0);
                        result.added.push(key);
                    } catch (e) {
                        result.errors.push({
                            table: tableId,
                            column: colDef.id,
                            action: 'add',
                            error: e.message || String(e)
                        });
                    }
                } else {
                    // Colonne existante : vérifier le type
                    var expectedType = colDef.opts?.type || colDef.type;
                    var existingType = existingCol.type;
                    
                    if (existingType !== expectedType) {
                        // Type incorrect : tenter réparation
                        log('[GENCI refs] Type incorrect: ' + key + ' (attendu: ' + expectedType + ', actuel: ' + existingType + ')');
                        
                        // Vérifier que la table cible existe
                        var targetType = getRefTarget(expectedType);
                        if (targetType && metadata.tableById[targetType]) {
                            try {
                                await grist.docApi.applyUserActions([
                                    ['ModifyColumn', tableId, colDef.id, { type: expectedType }]
                                ]);
                                result.repaired.push(key);
                            } catch (e) {
                                result.errors.push({
                                    table: tableId,
                                    column: colDef.id,
                                    action: 'repair',
                                    expectedType: expectedType,
                                    actualType: existingType,
                                    error: e.message || String(e)
                                });
                            }
                        } else {
                            result.errors.push({
                                table: tableId,
                                column: colDef.id,
                                action: 'repair-skipped',
                                reason: 'Table cible non trouvée: ' + targetType
                            });
                        }
                    }
                }
            }
        }
        
        return result;
    }

    // Attend que toutes les colonnes Ref soient visibles dans les métadonnées
    async function waitForReferenceColumns(grist, schemaDef, formulasMap, options) {
        options = options || {};
        var maxAttempts = options.maxAttempts || 20;
        var baseDelay = options.baseDelay || 200;
        var attempt = 0;
        var lastMissing = [];
        var lastInvalid = [];
        
        // Construire la liste des colonnes Ref attendues
        var expectedRefs = [];
        for (var i = 0; i < SCHEMA.tableOrder.length; i++) {
            var tableId = SCHEMA.tableOrder[i];
            var tableDef = schemaDef.tables[tableId];
            if (!tableDef) continue;
            
            var columns = tableDef.columns || [];
            var split = splitColumns(columns, formulasMap, tableId);
            
            for (var j = 0; j < split.ref.length; j++) {
                var colDef = split.ref[j];
                expectedRefs.push({
                    table: tableId,
                    column: colDef.id,
                    expectedType: colDef.opts?.type || colDef.type
                });
            }
        }
        
        log('[GENCI sync] Attente des colonnes Ref (' + expectedRefs.length + ' colonnes)...');
        
        while (attempt < maxAttempts) {
            try {
                var metadata = await loadSchemaMetadata(grist);
                var missing = [];
                var invalid = [];
                
                for (var k = 0; k < expectedRefs.length; k++) {
                    var ref = expectedRefs[k];
                    var key = ref.table + '.' + ref.column;
                    var col = metadata.columnByKey[key];
                    
                    // Vérifier principalement l'existence de la colonne
                    if (!col) {
                        missing.push(key);
                    } else if (col.type !== ref.expectedType) {
                        // Types incorrects collectés mais ne bloquent pas la stabilisation
                        invalid.push({
                            key: key,
                            expected: ref.expectedType,
                            actual: col.type
                        });
                    }
                }
                
                // Sauvegarder pour le rapport final
                lastMissing = missing.slice();
                lastInvalid = invalid.slice();
                
                // Succès si toutes les colonnes existent (peu importe le type pour l'instant)
                if (missing.length === 0) {
                    log('[GENCI sync] Toutes les colonnes Ref sont présentes (' + attempt + ' tentatives)');
                    if (invalid.length > 0) {
                        log('[GENCI sync] Types incorrects détectés (seront réparés): ' + invalid.length);
                    }
                    return {
                        success: true,
                        missing: [],
                        invalid: invalid,
                        attempts: attempt + 1
                    };
                }
                
                if (missing.length > 0) {
                    log('[GENCI sync] Colonnes Ref manquantes: ' + missing.join(', '));
                }
                
            } catch (e) {
                log('[GENCI sync] Erreur de lecture métadonnées: ' + (e.message || e));
            }
            
            attempt++;
            if (attempt < maxAttempts) {
                await delay(baseDelay * Math.min(attempt, 5));
            }
        }
        
        return {
            success: false,
            error: 'Timeout après ' + attempt + ' tentatives',
            attempts: attempt,
            missing: lastMissing,
            invalid: lastInvalid
        };
    }

    // ========================================================================
    // PASSE 3 — Colonnes calculées (formules)
    // ========================================================================
    
    async function ensureFormulaColumns(grist, formulasMap) {
        var metadata = await loadSchemaMetadata(grist);
        var result = { added: [], skipped: [], errors: [] };
        
        for (var tableName in formulasMap) {
            if (!formulasMap.hasOwnProperty(tableName)) continue;
            
            var formulas = formulasMap[tableName];
            var tableMeta = metadata.tableById[tableName];
            
            if (!tableMeta) {
                result.skipped.push({ table: tableName, reason: 'Table non trouvée' });
                continue;
            }
            
            for (var colId in formulas) {
                if (!formulas.hasOwnProperty(colId)) continue;
                
                var formula = formulas[colId];
                var key = tableName + '.' + colId;
                var existingCol = metadata.columnByKey[key];
                
                if (!existingCol) {
                    // Colonne manquante : l'ajouter
                    try {
                        await grist.docApi.applyUserActions([
                            ['AddColumn', tableName, colId, {
                                type: 'Any',
                                isFormula: true,
                                formula: formula
                            }]
                        ]);
                        result.added.push(key);
                    } catch (e) {
                        result.errors.push({
                            table: tableName,
                            column: colId,
                            error: e.message || String(e)
                        });
                    }
                } else {
                    result.skipped.push({ table: tableName, column: colId, reason: 'Déjà existe' });
                }
            }
        }
        
        return result;
    }

    // ========================================================================
    // PASSE 4 — Configuration des Choices et statuts
    // ========================================================================
    
    async function configureChoiceColumns(grist, defaultChoices) {
        var result = { configured: [], skipped: [] };
        
        for (var key in defaultChoices) {
            if (!defaultChoices.hasOwnProperty(key)) continue;
            
            var parts = key.split('.');
            if (parts.length !== 2) continue;
            
            var table = parts[0];
            var column = parts[1];
            var choices = defaultChoices[key];
            
            try {
                var statusList = choices.map(function(v) {
                    return { value: v, label: v, fillColor: '#94a3b8', textColor: '#ffffff' };
                });
                
                var seedResult = await TF.seedStatusChoices(grist, table, column, statusList);
                
                if (seedResult.ok && seedResult.changed) {
                    result.configured.push(key);
                } else if (seedResult.ok && !seedResult.changed) {
                    result.skipped.push({ key: key, reason: seedResult.reason || 'Déjà configuré' });
                } else {
                    result.skipped.push({ key: key, reason: seedResult.error || 'Erreur inconnue' });
                }
            } catch (e) {
                result.skipped.push({ key: key, reason: e.message || String(e) });
            }
        }
        
        return result;
    }

    // ========================================================================
    // PASSE 5 — Configuration des colonnes visibles des références
    // ========================================================================
    
    async function configureAllRefDisplays(grist, specs) {
        log('[GENCI display] Configuration affichage références...');
        
        var result = await TF.setRefDisplayColumns(grist, specs);
        
        if (result.configured && result.configured.length > 0) {
            log('[GENCI display] Configurés: ' + result.configured.length);
        }
        if (result.alreadyCorrect && result.alreadyCorrect.length > 0) {
            log('[GENCI display] Déjà corrects: ' + result.alreadyCorrect.length);
        }
        if (result.skipped && result.skipped.length > 0) {
            log('[GENCI display] Ignorés: ' + result.skipped.length, result.skipped);
        }
        if (result.errors && result.errors.length > 0) {
            log('[GENCI display] Erreurs: ' + result.errors.length, result.errors);
        }
        
        return result;
    }

    // Helper : obtient toutes les spécifications de références depuis le schéma
    function getExpectedReferenceSpecs(schema) {
        var specs = [];
        
        for (var tableId in schema.tables) {
            if (!Object.prototype.hasOwnProperty.call(schema.tables, tableId)) {
                continue;
            }
            
            var columns = schema.tables[tableId].columns || [];
            
            for (var i = 0; i < columns.length; i++) {
                var column = columns[i];
                var opts = column.opts || column;
                var type = opts.type || '';
                
                if (/^(Ref|RefList):/.test(type)) {
                    specs.push({
                        table: tableId,
                        column: column.id,
                        expectedType: type,
                        targetTable: getRefTarget(type)
                    });
                }
            }
        }
        
        return specs;
    }
    
    // Helper : charge les colonnes réelles des tables utilisateur
    async function loadActualTableColumns(grist, tableIds) {
        var columnsByTable = {};
        var errors = [];
        
        for (var i = 0; i < tableIds.length; i++) {
            var tableId = tableIds[i];
            
            try {
                var data = await grist.docApi.fetchTable(tableId);
                columnsByTable[tableId] = new Set(Object.keys(data || {}));
            } catch (e) {
                columnsByTable[tableId] = new Set();
                errors.push({
                    table: tableId,
                    error: e.message || String(e)
                });
            }
        }
        
        return {
            columnsByTable: columnsByTable,
            errors: errors
        };
    }

    // ========================================================================
    // INSPECTION — Vérification complète du schéma
    // ========================================================================
    
    async function inspectGenciSchema(grist, requiredTables, metadataSnapshot) {
        var result = {
            ready: true,
            missingTables: [],
            missingColumns: [],
            metadataPending: [],
            invalidColumnTypes: [],
            invalidRefTargets: [],
            invalidVisibleColumns: [],
            missingFormulaColumns: [],
            duplicateColumns: [],
            corrupted: false
        };
        
        try {
            // Utiliser le snapshot fourni ou charger les métadonnées
            var metadata = metadataSnapshot || await loadSchemaMetadata(grist);
            
            // Vérifier les tables essentielles
            for (var i = 0; i < requiredTables.length; i++) {
                var tableId = requiredTables[i];
                if (!metadata.tableById[tableId]) {
                    result.missingTables.push(tableId);
                    result.ready = false;
                }
            }
            
            // Vérifier TOUTES les références du schéma (pas juste 6)
            var expectedRefs = getExpectedReferenceSpecs(SCHEMA);
            
            // Charger les colonnes réelles des tables pour distinguer absent vs retardé
            var refTableIds = Array.from(new Set(expectedRefs.map(function(ref) {
                return ref.table;
            })));
            
            var actualColumns = await loadActualTableColumns(grist, refTableIds);
            
            for (var j = 0; j < expectedRefs.length; j++) {
                var ref = expectedRefs[j];
                var key = ref.table + '.' + ref.column;
                var metadataCol = metadata.columnByKey[key];
                var actualTableCols = actualColumns.columnsByTable[ref.table];
                var existsInTable = actualTableCols && actualTableCols.has(ref.column);
                
                // Cas 1 : Colonne absente des métadonnées ET de la table réelle
                if (!metadataCol && !existsInTable) {
                    result.missingColumns.push(key);
                    result.ready = false;
                    continue;
                }
                
                // Cas 2 : Colonne présente dans la table mais absente des métadonnées (retard)
                if (!metadataCol && existsInTable) {
                    result.metadataPending.push(key);
                    // Ne pas mettre ready = false, c'est temporaire
                    continue;
                }
                
                // Cas 3 : Colonne présente dans les métadonnées, vérifier le type
                if (metadataCol.type !== ref.expectedType) {
                    result.invalidColumnTypes.push({
                        column: key,
                        expected: ref.expectedType,
                        actual: metadataCol.type
                    });
                    result.ready = false;
                    
                    // Vérifier si la table cible existe
                    var targetType = ref.targetTable;
                    if (!metadata.tableById[targetType]) {
                        result.invalidRefTargets.push({
                            column: key,
                            expectedTarget: targetType
                        });
                    }
                }
            }
            
            // Vérifier les visibleCol sur TOUTES les références de SCHEMA.referenceDisplays
            var refDisplaySpecs = SCHEMA.referenceDisplays || [];
            
            for (var k = 0; k < refDisplaySpecs.length; k++) {
                var spec = refDisplaySpecs[k];
                var specKey = spec.table + '.' + spec.column;
                var specCol = metadata.columnByKey[specKey];
                
                if (!specCol) {
                    // Référence absente des métadonnées
                    if (!result.metadataPending.includes(specKey)) {
                        result.metadataPending.push(specKey);
                    }
                    continue;
                }
                
                var targetTable = getRefTarget(specCol.type);
                if (targetTable) {
                    var visColKey = targetTable + '.' + spec.visibleColId;
                    var visCol = metadata.columnByKey[visColKey];
                    
                    if (visCol) {
                        // Vérification stricte du visibleCol
                        if (Number(specCol.visibleCol) !== Number(visCol.id)) {
                            result.invalidVisibleColumns.push({
                                column: specKey,
                                expected: visCol.id,
                                actual: specCol.visibleCol
                            });
                            result.ready = false;
                        }
                    }
                }
            }
            
            // ====================================================================
            // DETECTION DES COLONNES DUPLIQUEES (CORRUPTION)
            // ====================================================================
            // Pour chaque table du schéma, vérifier les colonnes qui correspondent
            // au pattern ^<canonical>[0-9]+$ pour détecter les duplications
            for (var tableIdx = 0; tableIdx < SCHEMA.tableOrder.length; tableIdx++) {
                var tableId = SCHEMA.tableOrder[tableIdx];
                var tableDef = SCHEMA.tables[tableId];
                
                if (!tableDef || !metadata.tableById[tableId]) {
                    continue;
                }
                
                // Obtenir toutes les colonnes de cette table depuis les métadonnées
                var tableColumns = metadata.columns.filter(function(col) {
                    var parentTable = metadata.tables.find(function(t) { 
                        return t.id === col.parentId; 
                    });
                    return parentTable && parentTable.tableId === tableId;
                });
                
                // Pour chaque colonne canonique du schéma
                for (var colIdx = 0; colIdx < tableDef.columns.length; colIdx++) {
                    var canonicalCol = tableDef.columns[colIdx];
                    var canonicalId = canonicalCol.id;
                    
                    // Échapper l'identifiant canonique pour la RegExp
                    var escapedCanonical = canonicalId.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    var duplicatePattern = new RegExp('^' + escapedCanonical + '[0-9]+$');
                    
                    // Trouver les duplications
                    var duplicates = tableColumns.filter(function(col) {
                        return duplicatePattern.test(col.colId);
                    }).map(function(col) {
                        return col.colId;
                    });
                    
                    if (duplicates.length > 0) {
                        result.duplicateColumns.push({
                            table: tableId,
                            canonicalColumn: canonicalId,
                            duplicates: duplicates
                        });
                    }
                }
            }
            
            // Marquer comme corrompu si des duplications sont trouvées
            if (result.duplicateColumns.length > 0) {
                result.corrupted = true;
            }
            
        } catch (e) {
            result.error = e.message || String(e);
            result.ready = false;
        }
        
        return result;
    }

    // Helper : extrait l'ID d'un enregistrement créé
    function getAddedRecordId(actionResult, label) {
        var value = Array.isArray(actionResult)
            ? actionResult[0]
            : actionResult;

        if (typeof value === 'number' && Number.isFinite(value)) {
            return value;
        }

        if (
            value &&
            typeof value === 'object' &&
            typeof value.id === 'number'
        ) {
            return value.id;
        }

        throw new Error(
            'ID de ligne introuvable après AddRecord' +
            (label ? ' (' + label + ')' : '') +
            ': ' + JSON.stringify(actionResult)
        );
    }

    // ========================================================================
    // ORCHESTRATEUR PRINCIPAL
    // ========================================================================
    
    async function ensureGenciSchema(grist, options) {
        options = options || {};
        
        // Sérialise les appels dans une même iframe
        if (bootstrapPromise) {
            return bootstrapPromise;
        }
        
        if (bootstrapComplete && !options.force) {
            return Promise.resolve({ success: true, alreadyComplete: true });
        }
        
        bootstrapPromise = (async function () {
            var startTime = Date.now();
            var globalLog = [];
            var result = {
                success: false,
                phases: {},
                errors: [],
                warnings: []
            };
            
            try {
                log('Démarrage initialisation...');
                
                // Phase 0 : Exécuter les migrations puis inspection
                log('Phase 0: Migrations...');
                var migrationLog = await migrateLegacyTables(grist);
                globalLog = globalLog.concat(migrationLog);
                
                // Exécuter les migrations versionnées si TaskFlowMigrations est disponible
                if (global.TaskFlowMigrations) {
                    try {
                        var currentVersion = await global.TaskFlowMigrations.getCurrentVersion(grist);
                        log('Version actuelle du schéma: v' + currentVersion);
                        
                        var migrationResult = await global.TaskFlowMigrations.runMigrations(grist, currentVersion);
                        
                        if (migrationResult.success) {
                            log('Migrations appliquées: ' + migrationResult.applied + ' migrations, version finale: v' + migrationResult.finalVersion);
                            globalLog.push('Migrations: v' + currentVersion + ' → v' + migrationResult.finalVersion);
                            result.phases.migrations = migrationResult;
                        } else {
                            result.warnings.push({ phase: 'migrations', message: 'Certaines migrations ont échoué' });
                        }
                    } catch (migrationError) {
                        log('Erreur lors des migrations: ' + (migrationError.message || migrationError));
                        result.warnings.push({ phase: 'migrations', error: migrationError.message || String(migrationError) });
                        // Continuer malgré tout, le schéma déclaratif réparera
                    }
                }
                
                result.phases.migration = migrationLog;
                
                // Phase 1 : Création des tables (sans Ref)
                log('Phase 1: Création tables...');
                var phase1 = await ensureBaseTables(grist, SCHEMA, options.formulasMap || {});
                globalLog.push('Tables créées: ' + phase1.created.join(', '));
                result.phases.tables = phase1;
                
                // Synchronisation
                var allExpectedTables = SCHEMA.tableOrder.slice();
                var metadata = await syncMetadata(grist, allExpectedTables);
                result.phases.sync = { success: true };
                
                // Phase 2 : Colonnes Ref
                log('Phase 2: Colonnes Ref...');
                var phase2 = await ensureRefColumns(grist, SCHEMA, options.formulasMap || {});
                globalLog.push('Ref ajoutées: ' + phase2.added.join(', '));
                if (phase2.repaired.length > 0) {
                    globalLog.push('Ref réparées: ' + phase2.repaired.join(', '));
                }
                
                // Vérifier les erreurs de création des Ref
                if (phase2.errors.length > 0) {
                    result.errors.push({
                        phase: 'refs',
                        errors: phase2.errors
                    });
                    result.success = false;
                    log('Échec création des colonnes Ref, arrêt de l\'initialisation');
                    return result;
                }
                
                result.phases.refs = phase2;
                
                // Phase 2 : Colonnes Ref terminées (succès des AddColumn = confirmation)
                log('Phase 2: Colonnes Ref terminées (' + phase2.added.length + ' créées)');
                result.phases.refs = phase2;
                
                // Petite pause pour stabilisation Grist avant formules
                await delay(500);
                
                // Phase 3 : Formules
                if (options.formulasMap && Object.keys(options.formulasMap).length > 0) {
                    log('Phase 3: Formules...');
                    var phase3 = await ensureFormulaColumns(grist, options.formulasMap);
                    globalLog.push('Formules ajoutées: ' + phase3.added.join(', '));
                    result.phases.formulas = phase3;
                }
                
                // Phase 4 : Choices
                log('Phase 4: Choices...');
                var phase4 = await configureChoiceColumns(grist, options.defaultChoices || {});
                result.phases.choices = phase4;
                
                // Phase 5 : Affichage des références
                log('Phase 5: Affichage références...');
                var phase5 = await configureAllRefDisplays(grist, GENCI_REF_DISPLAY_SPECS);
                result.phases.display = phase5;
                
                if (!phase5.ok) {
                    result.warnings.push({ phase: 'display', errors: phase5.errors });
                }
                
                // Phase 6 : Seed (seulement si demandé explicitement)
                if (options.seedDemo === true) {
                    log('Phase 6: Seed de démonstration...');
                    var seedContext = { tablesCreated: phase1.created };
                    var phase6 = await seedInitialData(grist, seedContext);
                    result.phases.seed = phase6;
                    if (phase6.seeded) {
                        globalLog = globalLog.concat(phase6.log || []);
                    }
                    if (phase6.error) {
                        result.errors.push({ phase: 'seed', error: phase6.error });
                    }
                } else {
                    result.phases.seed = {
                        seeded: false,
                        reason: 'Seed de démonstration désactivé (options.seedDemo !== true)'
                    };
                }
                
                // Vérification finale
                log('Vérification finale...');
                
                // Délai de stabilisation avant validation
                await delay(300);
                
                // Relire les métadonnées fraîches
                metadata = await loadSchemaMetadata(grist);
                
                var requiredTables = ['Team', 'Programmes', 'Entites', 'Projects', 'Tasks', 'Actions'];
                var inspection = await inspectGenciSchema(grist, requiredTables, metadata);
                
                if (!inspection.ready) {
                    result.errors.push({
                        phase: 'validation',
                        missingTables: inspection.missingTables,
                        missingColumns: inspection.missingColumns,
                        invalidTypes: inspection.invalidColumnTypes
                    });
                    
                    // Ne pas considérer comme échec total si ce sont juste des visibleCol ou metadataPending
                    if (inspection.missingTables.length === 0 && inspection.missingColumns.length === 0) {
                        result.success = true;
                        result.warnings.push({ phase: 'validation', details: inspection });
                    } else {
                        result.success = false;
                    }
                } else {
                    result.success = true;
                }
                
                // ====================================================================
                // ÉCRITURE DU MARQUEUR 'ready' DANS TaskFlow_Meta (SEULEMENT SI SUCCÈS)
                // ====================================================================
                if (result.success && TF && TF.writeSchemaReady) {
                    try {
                        log('Écriture de TaskFlow_Meta avec statut ready...');
                        
                        var writeResult = await TF.writeSchemaReady(grist, {
                            schemaVersion: SCHEMA.version,
                            installedBy: 'TaskFlowBootstrap',
                            lastMigration: result.phases.migrations ? result.phases.migrations.finalVersion : null
                        });
                        
                        if (writeResult.success) {
                            log('TaskFlow_Meta écrit avec succès: ' + writeResult.action);
                        } else {
                            log('Attention: échec écriture TaskFlow_Meta:', writeResult.error);
                            result.warnings.push({
                                phase: 'meta-write',
                                error: writeResult.error
                            });
                        }
                    } catch (writeError) {
                        log('Erreur lors de l\'écriture de TaskFlow_Meta:', writeError);
                        result.warnings.push({
                            phase: 'meta-write',
                            error: writeError.message || String(writeError)
                        });
                        // Ne pas considérer comme échec total, c'est un métadata
                    }
                }
                
                // Afficher le détail de la validation
                console.info(
                    '[GENCI validation]',
                    JSON.stringify({
                        ready: inspection.ready,
                        missingTables: inspection.missingTables,
                        missingColumns: inspection.missingColumns,
                        metadataPending: inspection.metadataPending,
                        invalidColumnTypes: inspection.invalidColumnTypes.length,
                        invalidRefTargets: inspection.invalidRefTargets.length,
                        invalidVisibleColumns: inspection.invalidVisibleColumns.length
                    }, null, 2)
                );
                
                // Afficher les warnings techniques
                if (result.warnings && result.warnings.length > 0) {
                    console.warn('[GENCI] Warnings:', result.warnings);
                }
                
                // Afficher les erreurs si échec
                if (!result.success && result.errors && result.errors.length > 0) {
                    console.error('[GENCI] Errors:', JSON.stringify(result.errors, null, 2));
                }
                
                // bootstrapComplete seulement si succès
                bootstrapComplete = result.success === true;
                var duration = Date.now() - startTime;
                log('Initialisation terminée (' + duration + 'ms)');
                result.duration = duration;
                result.log = globalLog;
                
                return result;
                
            } catch (e) {
                log('Échec initialisation: ' + (e.message || e));
                result.errors.push({ phase: 'global', error: e.message || String(e) });
                result.success = false;
                bootstrapComplete = false;
                throw e;
            } finally {
                bootstrapPromise = null;
            }
        })();
        
        return bootstrapPromise;
    }

    // Ancienne API pour compatibilité
    async function ensureSchema(grist, options) {
        return ensureGenciSchema(grist, options);

/* ============================================================================
 * taskflow-migrations.js — Migrations versionnées du schéma TaskFlow
 * ----------------------------------------------------------------------------
 * Ce module gère les évolutions du schéma de manière contrôlée et réversible.
 * Chaque migration est :
 * - Idempotente (peut être réexécutée sans effet secondaire)
 * - Non destructive (ne supprime jamais de données)
 * - Testable indépendamment
 * 
 * Version 1: Schéma de base
 * Version 2: TaskAssignments + extension quotidienne de TimeEntries
 * Version 3: MemberDailyCapacities + TimeEntries.capaciteJour
 * ============================================================================ */

(function (global) {
    'use strict';

    var SCHEMA = global.TASKFLOW_SCHEMA;
    var DEFAULT_WEEKLY_CAPACITY = 35;

    // Helper : délai
    function delay(ms) {
        return new Promise(function (resolve) { setTimeout(resolve, ms); });
    }

    // Helper : log
    function log(msg, data) {
        var prefix = '[TaskFlow Migration] ';
        if (typeof console !== 'undefined') {
            if (data !== undefined) {
                console.info(prefix + msg, data);
            } else {
                console.info(prefix + msg);
            }
        }
    }

    // Helper : convertir tableau colonnaire en lignes
    function columnarToRows(data) {
        if (!data || Array.isArray(data)) return data || [];
        var cols = Object.keys(data);
        if (!cols.length) return [];
        var n = (data[cols[0]] && data[cols[0]].length) || 0;
        var rows = [];
        for (var i = 0; i < n; i++) {
            var rec = {};
            for (var j = 0; j < cols.length; j++) {
                rec[cols[j]] = data[cols[j]][i];
            }
            rows.push(rec);
        }
        return rows;
    }

    // Helper : obtenir docApi normalisé
    function getDocApi(grist) {
        var docApi = grist && (grist.docApi || grist);
        if (!docApi || typeof docApi.fetchTable !== 'function' || typeof docApi.applyUserActions !== 'function') {
            throw new Error('INVALID_GRIST_DOC_API: grist.docApi doit exposer fetchTable et applyUserActions');
        }
        return docApi;
    }

    // Helper : charger les métadonnées
    async function loadMigrationMetadata(grist) {
        var docApi = getDocApi(grist);
        var tablesData = await docApi.fetchTable('_grist_Tables');
        var columnsData = await docApi.fetchTable('_grist_Tables_column');
        
        var tables = columnarToRows(tablesData);
        var columns = columnarToRows(columnsData);
        
        var tableById = {};
        for (var i = 0; i < tables.length; i++) {
            tableById[tables[i].id] = tables[i].tableId;
        }
        
        var columnsByKey = {};
        for (var j = 0; j < columns.length; j++) {
            var col = columns[j];
            var tableId = tableById[col.parentId];
            if (tableId) {
                var key = tableId + '.' + col.colId;
                columnsByKey[key] = {
                    tableId: tableId,
                    colId: col.colId,
                    type: col.type,
                    isFormula: col.isFormula,
                    parentId: col.parentId
                };
            }
        }
        
        var tablesByName = {};
        for (var k = 0; k < tables.length; k++) {
            tablesByName[tables[k].tableId] = tables[k];
        }
        
        return {
            tablesById: tableById,
            tablesByName: tablesByName,
            columnsByKey: columnsByKey
        };
    }

    // ========================================================================
    // MIGRATION V1 → V2 — Planning daily assignments

    async function migrateToV2(grist, metadata) {

  if (S.groupBy === 'project') return (t, c) => (t.projet ? String(t.projet) : '0') + '|' + c.teamId;

  if (S.groupBy === 'role') return (t, c) => { const m = teamById(c.teamId); return ((m && m.role) ? m.role : '—') + '|' + c.teamId; };
  return (t, c) => String(c.teamId);
}

// Lignes (ressources/groupes) avec libellé + capacité nominale + membres (pour la capacité par période)
function buildRows() {
  // Projet/Rôle : HIÉRARCHIQUE → ligne d'en-tête (groupe) + une sous-ligne par personne du groupe (capacité-aware).
  if (S.groupBy === 'project') {
    const ps = {};
    for (const t of planTasks()) {
      const pk = t.projet ? String(t.projet) : '0';
      if (!ps[pk]) { const p = projById(t.projet); ps[pk] = { label: p ? p.nom : 'Sans projet', color: p ? p.couleur : '#64748b', mem: new Map() }; }
      for (const c of effCharges(t)) { const m = teamById(c.teamId); if (m) ps[pk].mem.set(m.id, m); }
    }
    const out = [];
    for (const pk of Object.keys(ps)) {
      const g = ps[pk]; const mems = [...g.mem.values()];
      out.push({ key: 'h:' + pk, isHeader: true, label: g.label, color: g.color, members: mems, gkeys: mems.map(m => pk + '|' + m.id) });
      for (const m of mems) out.push({ key: pk + '|' + m.id, isSub: true, teamId: m.id, label: m.nom, color: m.couleur || '#6366f1', cap: capOf(m), members: [m] });
    }
    return out;
  }
  if (S.groupBy === 'programme') {
    const ps = {};
    for (const t of planTasks()) {
      const pk = progKeyOf(t);
      // Si un filtre programme est actif, ne garder que les programmes filtrés
      const progFilter = S.filters?.programme || [];
      if (progFilter.length > 0 && !progFilter.includes(String(pk))) continue;
      if (!ps[pk]) { const pf = progById(Number(pk)); ps[pk] = { label: pf ? pf.nom : 'Sans programme', color: (pf && pf.couleur) ? pf.couleur : '#64748b', mem: new Map() }; }
      for (const c of effCharges(t)) { const m = teamById(c.teamId); if (m) ps[pk].mem.set(m.id, m); }
    }
    const out = [];
    for (const pk of Object.keys(ps)) {
      const g = ps[pk]; const mems = [...g.mem.values()];
      out.push({ key: 'h:' + pk, isHeader: true, label: g.label, color: g.color, members: mems, gkeys: mems.map(m => pk + '|' + m.id) });
      for (const m of mems) out.push({ key: pk + '|' + m.id, isSub: true, teamId: m.id, label: m.nom, color: m.couleur || '#6366f1', cap: capOf(m), members: [m] });
    }
    return out;
  }
  // Rôle : HIÉRARCHIQUE - ne garde que les rôles qui ont des tâches
  if (S.groupBy === 'role') {
    const rs = {};
    for (const t of planTasks()) {
      for (const c of effCharges(t)) {
        const m = teamById(c.teamId);
        if (m) {
          const r = m.role || '—';
          if (!rs[r]) rs[r] = { label: r, color: '#6366f1', members: new Map() };
          rs[r].members.set(m.id, m);
        }
      }
    }
    const out = [];
    for (const r of Object.keys(rs)) {
      const g = rs[r]; const mems = [...g.members.values()];
      out.push({ key: 'h:' + r, isHeader: true, label: g.label, color: g.color, members: mems, gkeys: mems.map(m => r + '|' + m.id) });
      for (const m of mems) out.push({ key: r + '|' + m.id, isSub: true, teamId: m.id, label: m.nom, color: m.couleur || '#6366f1', cap: capOf(m), members: [m] });
    }
    return out;
  }
  // Personne : ne garde que les personnes qui ont des tâches
  const personMap = new Map();
  for (const t of planTasks()) {
    for (const c of effCharges(t)) {
      const m = teamById(c.teamId);
      if (m) personMap.set(m.id, m);
    }
  }
  // Appliquer les filtres locaux directement sur les lignes
  let filteredPersons = [...personMap.values()];
  
  // Filtre par assignee(s) spécifique(s) - nouveau système avec tableaux
  if (S.filters.assignee && S.filters.assignee.length > 0) {
    filteredPersons = filteredPersons.filter(m => S.filters.assignee.includes(String(m.id)));
  }
  
  // Filtre par équipe(s) - nouveau système avec tableaux
  if (S.filters.team && S.filters.team.length > 0) {
    filteredPersons = filteredPersons.filter(m => m.entite && S.filters.team.includes(String(m.entite)));
  }
  
  return filteredPersons.map(m => ({ key: String(m.id), label: m.nom, color: m.couleur || '#6366f1', cap: capOf(m), members: [m] }));
}

// Disponibilités : table datée Disponibilites [{membre, type, dateDebut, dateFin (Unix s), dispo 0..1}] -> capacité réduite par période.
// Fallback historique : ancien JSON Team.indispos [{start,end,label}] (dates ISO) compté comme indispo totale.
function parseIndispos(v) { try { const a = JSON.parse(v || '[]'); return Array.isArray(a) ? a.filter(x => x && x.start && x.end) : []; } catch (e) { return []; } }
const dayIdx = (s) => Math.floor(Date.parse(s + 'T00:00:00Z') / 86400000); // ISO yyyy-mm-dd -> index de jour
const isoToSec = (iso) => Math.floor(Date.parse(iso + 'T00:00:00Z') / 1000);
const secToISO = (sec) => new Date(sec * 1000).toISOString().slice(0, 10);
function periodDays(periodStart) { return S.granularity === 'month' ? new Date(Date.UTC(periodStart.getUTCFullYear(), periodStart.getUTCMonth() + 1, 0)).getUTCDate() : 7; }
// Index { membreId: [{s, e, frac}] } (s,e = index de jour ; frac = capacité retirée 0..1). Reconstruit à chaque chargement.
let DISPO = {};
function buildDispoIndex() {
  DISPO = {};
  const push = (id, s, e, frac) => { if (!id || frac <= 0) return; (DISPO[id] || (DISPO[id] = [])).push({ s: s, e: e, frac: frac }); };
  for (const r of (S.dispos || [])) {
    const id = Number(r.membre); if (!id || r.dateDebut == null || r.dateFin == null) continue;
    const dispo = (r.dispo == null || r.dispo === '') ? 0 : Math.max(0, Math.min(1, Number(r.dispo)));
    push(id, Math.floor(r.dateDebut / 86400), Math.floor(r.dateFin / 86400), 1 - dispo);
  }
  for (const m of (S.team || [])) for (const iv of parseIndispos(m && m.indispos)) push(m.id, dayIdx(iv.start), dayIdx(iv.end), 1); // fallback legacy
}
function indispoFrac(member, periodStart) {
  const arr = (member && DISPO[member.id]) || []; if (!arr.length) return 0;
  const p0 = Math.floor(periodStart.getTime() / 86400000), days = periodDays(periodStart);
  let acc = 0;
  for (let d = p0; d < p0 + days; d++) { let f = 0; for (const iv of arr) { if (d >= iv.s && d <= iv.e && iv.frac > f) f = iv.frac; } acc += f; }
  return Math.min(acc / days, 1);
}
// Capacité d'une ligne sur une période donnée (heures), ajustée des indisponibilités.
function capForRow(row, periodStart) {
  return (row.members || []).reduce((s, m) => s + capPeriod(capOf(m)) * (1 - indispoFrac(m, periodStart)), 0);
}
function rowReduced(row, periodStart) { return (row.members || []).some(m => indispoFrac(m, periodStart) > 0); }

function cellColor(h, cap) {
  if (!(h > 0)) return 'transparent';
  if (!(cap > 0)) return 'var(--ok)';
  const r = h / cap; return r > 1 ? 'var(--over)' : r > 0.85 ? 'var(--warn)' : 'var(--ok)';
}

// ============================================================================
// Rendu
// ============================================================================
function render() {
  // segments
  renderSeg('segGran', [['week', 'Sem'], ['month', 'Mois']], S.granularity, v => { S.granularity = v; S.offset = 0; render(); });
  renderSeg('segMode', [['prevu', 'Prévu'], ['realise', 'Réalisé'], ['reste', 'Reste'], ['dispo', 'Dispo']], S.mode, v => { S.mode = v; if (v === 'dispo' && S.groupBy !== 'person') { S.groupBy = 'person'; document.getElementById('selGroup').value = 'person'; toast('Vue Dispo : groupement « Personne » (la marge ne se mesure qu\'au global, tous projets confondus)'); } render(); });
  renderSeg('segUnit', [['pct', '%'], ['hours', 'h']], S.unit, v => { S.unit = v; render(); });
  document.getElementById('selGroup').value = S.groupBy;
  document.getElementById('chkDone').checked = S.includeDone;
  document.getElementById('chkDerive').checked = S.derive;
  document.getElementById('chkWorkdays').checked = S.workdays;
  document.getElementById('navToday').style.display = S.offset !== 0 ? '' : 'none';

  const _rmode = S.mode === 'realise' || S.mode === 'reste';
  const tasks = planTasks().map(t => (_rmode && isTerminal(t) && t.dateCloture && t.dateCloture >= t.dateDebut) ? Object.assign({}, t, { dateEcheance: t.dateCloture }) : t); // réalisé/reste : redater les tâches clôturées sur leur date de clôture réelle
  const dispo = S.mode === 'dispo';  // mode "capacité disponible" = cap - charge planifiée
  // #5 : en Réalisé/Reste, si la Feuille de temps existe, on place les heures dans leur période RÉELLE (datée) au lieu d'étaler tempsPasse.
  const exactReal = S.hasEntries && (S.mode === 'realise' || S.mode === 'reste');
  document.getElementById('legend').style.display = dispo ? 'none' : 'flex';
  document.getElementById('legendDispo').style.display = dispo ? 'flex' : 'none';
  document.getElementById('legendRealise').style.display = (S.mode === 'realise') ? 'flex' : 'none';
  { const lr = document.getElementById('legendRealiseTxt'); if (lr) lr.innerHTML = exactReal ? 'réalisé <b>daté</b> (Feuille de temps) — heures placées dans leur période réelle' : 'réalisé = temps passé saisi · <b>estimé</b> (= prévu) pour les tâches clôturées sans temps'; }
  let matrix;
  if (exactReal && S.mode === 'realise') matrix = entriesMatrix();
  else if (exactReal && S.mode === 'reste') matrix = subtractMatrix(TF.chargeMatrix(tasks, keyFn(), S.granularity, effCharges, S.workdays), entriesMatrix());
  else matrix = TF.chargeMatrix(tasks, keyFn(), S.granularity, dispo ? effCharges : chargesFor, S.workdays);
  const periods = TF.periodRange(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const nowKey = TF.periodKey(new Date(), S.granularity);
  document.getElementById('navRange').textContent = plabel(periods[0]) + ' → ' + plabel(periods[periods.length - 1]);

  const rows = buildRows();
  const wrap = document.getElementById('gridwrap');

  if (!S.team.length) { wrap.innerHTML = '<div class="empty"><div class="ic">▦</div><div>Aucun membre dans la table Team</div></div>'; renderAlerts(matrix, []); return; }
  const hasData = Object.keys(matrix).length > 0;
  const undated = tasks.filter(t => effCharges(t).length && (t.dateDebut == null || t.dateEcheance == null)).length;
  if (!hasData && !undated) { wrap.innerHTML = '<div class="empty"><div class="ic">▦</div><div>Aucune charge datée à planifier</div><div style="font-size:.78rem">Renseignez la charge par personne + des dates sur les tâches.</div></div>'; renderAlerts(matrix, periods); return; }

  const starts = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  let h = '<table class="grid"><thead><tr><th class="colres">Ressource</th>';
  periods.forEach((p, i) => { h += '<th class="' + (p === nowKey ? 'now' : '') + '"><div class="pk">' + plabel(p) + (p === nowKey ? ' •' : '') + '</div><div class="psub">' + subLabel(starts[i]) + '</div></th>'; });
  h += '<th class="sum">Σ fenêtre</th></tr></thead><tbody>';
  const canEditRes = S.groupBy === 'person';
  for (const row of rows) {
    if (row.isHeader) {
      // En-tête de groupe (projet/rôle) : somme des sous-lignes, sans heat (repère de section).
      const hc = {}; for (const gk of row.gkeys) { const mc = matrix[gk] || {}; for (const p in mc) hc[p] = (hc[p] || 0) + mc[p]; }
      let wtot = 0;
      h += '<tr class="grp"><td class="colres ghead"><div class="res"><span class="gdot" style="background:' + row.color + '"></span><span class="nm">' + esc(row.label) + '</span></div></td>';
      for (let pi = 0; pi < periods.length; pi++) { const p = periods[pi], hr = r1(hc[p] || 0); wtot += hr; h += '<td class="' + (p === nowKey ? 'nowcol' : '') + '">' + (hr > 0 ? '<span class="gval">' + hr + '</span>' : '<span class="dot">·</span>') + '</td>'; }
      h += '<td class="sum"><div class="sh">' + r1(wtot) + ' h</div></td></tr>';
      continue;
    }
    const cells = matrix[row.key] || {};
    const ini = row.label.split(' ').filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    const resClk = row.isSub || S.groupBy === 'person';
    const resId = row.isSub ? row.teamId : row.key;
    h += '<tr' + (row.isSub ? ' class="subr"' : '') + '><td class="colres' + (row.isSub ? ' sub' : '') + (resClk ? ' clk' : '') + '"' + (resClk ? ' data-res="' + esc(resId) + '" title="Capacité & indisponibilités"' : '') + '><div class="res"><span class="ava" style="background:' + row.color + '">' + esc(ini) + '</span><span><span class="nm">' + esc(row.label) + '</span>' + (row.cap > 0 ? ' <span class="cap">(' + Math.round(capPeriod(row.cap)) + 'h)</span>' : '') + '</span></div></td>';
    let win = 0, peakR = 0;
    for (let pi = 0; pi < periods.length; pi++) {
      const p = periods[pi], hr = r1(cells[p] || 0);
      const capP = capForRow(row, starts[pi]);
      const redu = rowReduced(row, starts[pi]);
      let content;
      if (dispo) { const free = capP > 0 ? r1(Math.max(capP - hr, 0)) : 0; win += free; content = fmtDispo(free, capP); }
      else { win += hr; if (capP > 0 && hr / capP > peakR) peakR = hr / capP; content = fmtCell(hr, capP); }
      h += '<td class="cell' + (p === nowKey ? ' nowcol' : '') + (redu ? ' redu' : '') + (String(S._cellKey) === String(row.key) && p === S._cellPeriod ? ' sel' : '') + '" data-key="' + esc(row.key) + '" data-period="' + p + '">' + content + '</td>';
    }
    const peak = Math.round(peakR * 100);
    h += '<td class="sum"><div class="sh">' + r1(win) + ' h</div>' + (dispo ? '<div class="sp">dispo</div>' : '<div class="sp" style="' + (peak > 100 ? 'color:var(--over)' : '') + '">pic ' + peak + '%</div>') + '</td>';
    h += '</tr>';
  }
  h += '</tbody>';
  // pied : total équipe par période vs capacité (ajustée des indisponibilités)
  h += '<tfoot><tr><td class="colres" style="text-align:left;padding:7px 10px">' + (dispo ? 'Dispo équipe' : 'Capacité équipe') + '</td>';
  let grand = 0;
  for (let pi = 0; pi < periods.length; pi++) {
    const p = periods[pi];
    // charge totale = somme des sous-lignes (les en-têtes n'ont pas de clé matrice) ; capacité = équipe une seule fois (indép. du groupement)
    let tot = 0; for (const row of rows) if (!row.isHeader) tot += (matrix[row.key] || {})[p] || 0;
    const capTeam = activeTeam().reduce((s, m) => s + capPeriod(capOf(m)) * (1 - indispoFrac(m, starts[pi])), 0);
    if (dispo) {
      const freeTot = Math.max(capTeam - tot, 0); grand += freeTot;
      h += '<td class="' + (p === nowKey ? 'nowcol' : '') + '">' + (freeTot > 0.05 ? r1(freeTot) : '·') + '</td>';
    } else {
      grand += tot;
      const pc = capTeam > 0 ? Math.round(tot / capTeam * 100) : null;
      h += '<td class="' + (p === nowKey ? 'nowcol' : '') + '">' + (tot > 0 ? r1(tot) + (pc != null ? '<div style="font-size:.66rem;color:var(--text-muted);font-weight:400">' + pc + '%</div>' : '') : '·') + '</td>';
    }
  }
  h += '<td class="sum"><div class="sh">' + r1(grand) + ' h</div></td></tr></tfoot></table>';
  // #6 : groupement Programme sans aucune affectation -> tout sous « Sans programme » : on guide l'utilisateur.
  if (S.groupBy === 'programme' && !S.projects.some(p => Number(p.programme || p.portefeuille) > 0)) {
    h = '<div class="pf-hint">Aucun projet n\'est rattaché à un programme — tout apparaît sous « Sans programme ». Affectez vos projets dans la table <b>Projects</b> (colonne <b>Programme</b>).</div>' + h;
  }
  wrap.innerHTML = h;
  wrap.querySelectorAll('td.cell').forEach(td => td.addEventListener('click', () => openCell(td.dataset.key, td.dataset.period)));
  wrap.querySelectorAll('td.colres.clk').forEach(td => td.addEventListener('click', () => openResource(td.dataset.res)));
  renderAlerts(matrix, periods);
  if (S.timeline) renderTimeline();
}

// Timeline par personne : tâches de chacun en barres sur la même fenêtre que la heatmap (panel du bas).
function toggleTimeline() {
  S.timeline = !S.timeline;
  const b = document.getElementById('btnTimeline'); if (b) b.classList.toggle('active', S.timeline);
  const p = document.getElementById('tlPanel');
  if (S.timeline) { renderTimeline(); p.classList.add('open'); } else p.classList.remove('open');
}
function renderTimeline() {
  const body = document.getElementById('tlBody');
  const periods = TF.periodRange(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const starts = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const gName = groupLabel(S.groupBy).toLowerCase();
  const ttl = document.querySelector('#tlPanel .tlhead strong'); if (ttl) ttl.textContent = 'Timeline par ' + gName;
  document.getElementById('tlRange').textContent = '  ' + plabel(periods[0]) + ' → ' + plabel(periods[periods.length - 1]);
  const winStart = starts[0].getTime();
  const winEnd = TF.shiftPeriods(starts[starts.length - 1], S.granularity, 1).getTime();
  const span = (winEnd - winStart) || 1;
  // FOCUS = cellule ouverte dans la heatmap (clé = personne, ou composite "groupe|personne")
  const fKey = S._cellKey != null ? String(S._cellKey) : null;
  const fIdx = (fKey != null && S._cellPeriod) ? periods.indexOf(S._cellPeriod) : -1; // surlignage période seulement si une cellule est focalisée
  let bandStyle = '', bandS = 0, bandE = 0;
  if (fIdx >= 0) {
    bandS = starts[fIdx].getTime();
    bandE = (fIdx + 1 < starts.length ? starts[fIdx + 1].getTime() : winEnd);
    const bl = Math.max(0, (bandS - winStart) / span) * 100;
    const bw = Math.min(100, (bandE - winStart) / span * 100) - bl;
    bandStyle = 'left:' + bl.toFixed(1) + '%;width:' + bw.toFixed(1) + '%';
  }
  const kf = keyFn();            // même clé que la heatmap → filtre les tâches de chaque sous-ligne
  const grouped = S.groupBy !== 'person';
  const tasks = planTasks().filter(t => t.dateDebut != null && t.dateEcheance != null);
  const rows = buildRows();
  let h = '<div class="tl-axis"><div style="width:var(--res-col);flex:none"></div>';
  periods.forEach((p, i) => { h += '<div class="c' + (i === fIdx ? ' on' : '') + '">' + plabel(p) + '</div>'; });
  h += '</div>';
  let any = false, pending = null;
  for (const row of rows) {
    if (row.isHeader) { pending = row; continue; } // section projet/rôle : affichée si au moins une sous-ligne a des tâches
    const laneKey = String(row.key);
    const pid = row.teamId != null ? row.teamId : row.key;
    const mine = tasks
      .filter(t => effCharges(t).some(c => String(kf(t, c)) === laneKey))
      .filter(t => (t.dateEcheance * 1000) >= winStart && (t.dateDebut * 1000) <= winEnd)
      .sort((a, b) => a.dateDebut - b.dateDebut);
    if (!mine.length) continue;
    any = true;
    if (pending) { h += '<div class="tl-sec"><span class="gdot" style="background:' + pending.color + '"></span>' + esc(pending.label) + '</div>'; pending = null; }
    const isF = fKey != null && laneKey === fKey;
    const ini = row.label.split(' ').filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    h += '<div class="tl-grp' + (grouped ? ' tl-ind' : '') + (isF ? ' tl-focus' : '') + '"' + (isF ? ' id="tlFocus"' : '') + ' data-lane="' + esc(laneKey) + '"><span class="tava" style="background:' + row.color + '">' + esc(ini) + '</span>' + esc(row.label) + ' · ' + mine.length + ' tâche' + (mine.length > 1 ? 's' : '') + '</div>';
    for (const t of mine) {
      const ts = t.dateDebut * 1000, te = t.dateEcheance * 1000;
      const l = Math.max(0, Math.min(1, (ts - winStart) / span)) * 100;
      const rr = Math.max(0, Math.min(1, (te - winStart) / span)) * 100;
      const w = Math.max(rr - l, 1.4);
      const col = (statusCfg.byValue[t.statut] || {}).fillColor || '#64748b';
      const hrs = (effCharges(t).find(c => String(c.teamId) === String(pid)) || {}).heures || 0;
      const hot = isF && fIdx >= 0 && ts < bandE && te > bandS; // tâche dans la période focalisée
      const tp = TF.periodKey(new Date(Math.max(ts, winStart)), S.granularity); // période à ouvrir si "Ajuster"
      h += '<div class="tl-row' + (grouped ? ' tl-ind' : '') + (isF ? ' tl-focus' : '') + '" data-lane="' + esc(laneKey) + '"><div class="tl-lbl" title="' + esc(t.titre) + '">' + esc(t.titre) + '</div><div class="tl-track">' + (bandStyle ? '<div class="tl-band" style="' + bandStyle + '"></div>' : '') + '<div class="tl-bar' + (hot ? ' hot' : '') + '" style="left:' + l.toFixed(1) + '%;width:' + w.toFixed(1) + '%;background:' + col + '" data-id="' + t.id + '" data-lane="' + esc(laneKey) + '" data-period="' + tp + '" title="' + esc(t.titre) + ' · ' + r1(hrs) + ' h — cliquer pour l’aperçu">' + esc(t.titre) + '</div></div></div>';
    }
  }
  if (!any) h += '<div class="tl-empty">Aucune tâche datée sur cette fenêtre.</div>';
  body.innerHTML = h;
  body.querySelectorAll('.tl-bar').forEach(b => b.addEventListener('mousedown', (e) => startBarDrag(e, b)));
  const fg = document.getElementById('tlFocus'); if (fg) fg.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// Drag d'une barre = REPLANIFIER (horizontal) ou RÉAFFECTER (vers une autre lane). Clic simple (sans drag) = aperçu.
function startBarDrag(e, bar) {
  if (e.button !== 0) return;
  const taskId = Number(bar.dataset.id), fromLane = bar.dataset.lane, period = bar.dataset.period;
  const track = bar.parentElement, trackW = track.clientWidth || 1;
  const starts = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const winStart = starts[0].getTime();
  const winEnd = TF.shiftPeriods(starts[starts.length - 1], S.granularity, 1).getTime();
  const totalDays = (winEnd - winStart) / 86400000;
  const startX = e.clientX, startY = e.clientY;
  let dragging = false;
  const clearTgt = () => document.querySelectorAll('.drop-tgt').forEach(n => n.classList.remove('drop-tgt'));
  function move(ev) {
    const dx = ev.clientX - startX, dy = ev.clientY - startY;
    if (!dragging && Math.abs(dx) + Math.abs(dy) > 4) { dragging = true; bar.classList.add('dragging'); document.body.style.cursor = 'grabbing'; closeTaskPop(); }
    if (!dragging) return;
    bar.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    clearTgt();
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const lane = el && el.closest('[data-lane]');
    if (lane && lane.dataset.lane !== fromLane) lane.classList.add('drop-tgt');
  }
  function up(ev) {
    document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up);
    document.body.style.cursor = ''; clearTgt();
    bar.classList.remove('dragging'); bar.style.transform = '';
    if (!dragging) { openTaskPop(taskId, bar, fromLane, period); return; }
    const ddays = Math.round((ev.clientX - startX) / trackW * totalDays);
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const laneEl = el && el.closest('[data-lane]');
    applyBarDrag(taskId, fromLane, laneEl ? laneEl.dataset.lane : fromLane, ddays);
  }
  document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
  e.preventDefault();
}
async function applyBarDrag(taskId, fromLane, toLane, ddays) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const lanePid = l => { l = String(l); const i = l.indexOf('|'); return Number(i >= 0 ? l.slice(i + 1) : l); };
  const fromPid = lanePid(fromLane), toPid = lanePid(toLane);
  const reassign = !isNaN(toPid) && toPid && toPid !== fromPid && !!teamById(toPid);
  if (!reassign && !ddays) return;  // rien à faire (la barre est déjà remise en place)
  let newDebut = null, newEch = null;
  if (ddays && t.dateDebut != null && t.dateEcheance != null) { newDebut = gToInput(t.dateDebut + ddays * 86400); newEch = gToInput(t.dateEcheance + ddays * 86400); }
  // confirmation pour une réaffectation ou un gros déplacement (≥ 1 semaine)
  if (reassign || Math.abs(ddays) >= 7) {
    const parts = [];
    if (reassign) parts.push('Réaffecter « ' + t.titre + ' » de ' + ((teamById(fromPid) || {}).nom || '?') + ' à ' + ((teamById(toPid) || {}).nom || '?'));
    if (ddays) parts.push((reassign ? 'et décaler' : 'Décaler') + ' les dates de ' + (ddays > 0 ? '+' : '') + ddays + ' j');
    const ok = await confirmModal('Confirmer le déplacement', parts.join(' ') + ' ?');
    if (!ok) { render(); return; }
  }
  if (newDebut && newEch) setDates(taskId, newDebut, newEch);
  if (reassign) reassignCharge(taskId, fromPid, toPid);
}
