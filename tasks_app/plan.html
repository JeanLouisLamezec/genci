function fmtCell(hr, capP) {
  if (!(hr > 0)) return '<span class="dot">·</span>';
  const pct = capP > 0 ? Math.round(hr / capP * 100) : 0;
  const txt = S.unit === 'pct' && capP > 0 ? pct + '%' : hr;
  return '<span class="v" style="background:' + heatBg(hr, capP) + '" title="' + hr + ' h' + (capP > 0 ? ' · ' + pct + '% de la capacité' : '') + '">' + txt + '</span>';
}
// Fond façon heatmap : teinte par seuil, intensité par taux (capP = capacité de la PÉRIODE).
function heatBg(hr, capP) {
  if (!(capP > 0)) return 'rgba(59,130,246,0.55)';
  const r = hr / capP;
  if (r > 1) return 'rgba(229,72,77,' + Math.min(0.7 + (r - 1) * 0.5, 0.96).toFixed(2) + ')';
  if (r > 0.85) return 'rgba(245,158,11,0.9)';

}
// Mode Dispo : capacité disponible (cap - charge), échelle verte (plus c'est vert, plus il y a de marge).
function fmtDispo(free, capP) {

  const r = capP > 0 ? Math.min(free / capP, 1) : 0;
  return '<span class="v" style="background:rgba(21,160,107,' + (0.18 + 0.62 * r).toFixed(2) + ')" title="' + free + ' h disponibles' + (capP > 0 ? ' / ' + Math.round(capP) + 'h' : '') + '">' + free + '</span>';
}

// ============================================================================
// Drill cellule -> panel (liste des tâches composant la charge)
// ============================================================================
function tasksInCell(key, period) {
  // Utilise TimeEntries au lieu de planTasks() + charges (contrat Plan/CRA unifié)
  const periodRange = TF.periodRange(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const periodStartsArr = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const pi = periodRange.indexOf(period);
  const pstart = pi >= 0 ? periodStartsArr[pi] : new Date();
  const periodDuration = S.granularity === 'week' ? 7 : 30;
  const pend = new Date(pstart.getTime() + periodDuration * 24 * 60 * 60 * 1000);
  const startDate = TF.formatDateUTC(pstart);
  const endDate = TF.formatDateUTC(pend);
  
  // Filtrer les TimeEntries pour cette cellule (membre + période)
  const entries = (S.entries || []).filter(e => 
    e.memberId === Number(key) &&
    e.date >= startDate &&
    e.date <= endDate
  );
  
  // Regrouper par affectation
  const byAssignment = TaskFlowTimeEntryLoader.groupEntriesByAssignment(entries);
  
  // Mapper vers les tâches
  const out = [];
  byAssignment.forEach((assignmentEntries, assignmentId) => {
    if (!assignmentId) return; // Skip legacy (sans affectation)
    
    const totalHours = assignmentEntries.reduce((sum, e) => sum + e.plannedHours, 0);
    const taskId = assignmentEntries[0].taskId;
    const task = S.tasks.find(t => t.id === taskId);
    
    if (task) {
      out.push({ 
        task: task,
        assignmentId: assignmentId,
        slice: r1(totalHours),
        total: r1(totalHours),
        entries: assignmentEntries
      });
    }
  });
  
  return out.sort((a, b) => b.slice - a.slice);
}

// Disponibilité par membre sur une période (charge TOTALE tous projets vs capacité) → guide la réaffectation.
// Utilise TimeEntries.heuresPrevues comme source canonique (contrat Plan/CRA unifié)
function memberAvail(period) {
  const pr = TF.periodRange(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const ss = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const pi = pr.indexOf(period);
  const pstart = pi >= 0 ? ss[pi] : new Date();
  
  // Calculer la fin de période (semaine = 7 jours, mois = 30 jours)
  const periodDuration = S.granularity === 'week' ? 7 : 30;
  const pend = new Date(pstart.getTime() + periodDuration * 24 * 60 * 60 * 1000);
  const startDate = TF.formatDateUTC(pstart);
  const endDate = TF.formatDateUTC(pend);
  
  const out = {};
  for (const m of activeTeam()) {
    // Filtrer les TimeEntries du membre sur cette période
    const memberEntries = (S.entries || []).filter(e => 
      e.memberId === m.id && 
      e.date >= startDate && 
      e.date <= endDate
    );
    
    // NOUVEAU : Somme des heures prévues depuis TimeEntries.heuresPrevues
    const plannedHours = memberEntries.reduce((sum, e) => sum + e.plannedHours, 0);
    
    const cap = capPeriod(capOf(m)) * (1 - indispoFrac(m, pstart));
    out[m.id] = { 
      load: r1(plannedHours),  // Utilise TimeEntries.heuresPrevues
      cap: r1(cap), 
      free: r1(Math.max(cap - plannedHours, 0)) 
    };
  }
  return out;
}

      : '<div class="th">' + i.total + ' h</div>';
    const dates = editable ? '<div class="tkdates"><span class="dl">📅 Dates</span><input type="date" name="dateDebut" value="' + gToInput(i.task.dateDebut) + '" title="Début" onchange="setDates(' + i.task.id + ',this.value,null)"><span>→</span><input type="date" name="dateEcheance" value="' + gToInput(i.task.dateEcheance) + '" title="Échéance" onchange="setDates(' + i.task.id + ',null,this.value)"></div>' : '';

function refreshCell() { if (S._cellKey != null) openCell(S._cellKey, S._cellPeriod); }

// Allocation éditable : agit sur Tasks.charges + COHÉRENCE assignés (option A) — recalcule la heatmap.
const toRefList = (ids) => (ids && ids.length) ? ['L'].concat(ids.map(Number)) : null;
async function persistTask(taskId, updates) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  Object.assign(t, updates); // optimiste
  if (!S.demo) { try { await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', taskId, updates]]); } catch (e) {} }
  render(); refreshCell();
}
function setCharge(taskId, teamId, heures) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const arr = TF.parseCharges(t.charges); const i = arr.findIndex(c => c.teamId === teamId);
  if (heures > 0) { if (i >= 0) arr[i].heures = heures; else arr.push({ teamId, heures }); } else if (i >= 0) arr.splice(i, 1);
  const updates = { charges: JSON.stringify(arr) };
  // cohérence : une charge implique d'être assigné
  if (heures > 0) { const asg = getRefList(t.assignees); if (!asg.includes(Number(teamId))) updates.assignees = toRefList(asg.concat([Number(teamId)])); }
  persistTask(taskId, updates);
}
function reassignCharge(taskId, fromId, toId) {
  if (fromId === toId) return;
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const arr = TF.parseCharges(t.charges); const fi = arr.findIndex(c => c.teamId === fromId); if (fi < 0) return;
  const hrs = arr[fi].heures; arr.splice(fi, 1);
  const ti = arr.findIndex(c => c.teamId === toId); if (ti >= 0) arr[ti].heures += hrs; else arr.push({ teamId: toId, heures: hrs });
  // cohérence assignés (option A) : + toId ; - fromId s'il n'a plus de charge sur la tâche
  let asg = getRefList(t.assignees);
  if (!asg.includes(Number(toId))) asg = asg.concat([Number(toId)]);
  if (!arr.some(c => Number(c.teamId) === Number(fromId))) asg = asg.filter(id => id !== Number(fromId));
  persistTask(taskId, { charges: JSON.stringify(arr), assignees: toRefList(asg) });
}
// Replanification depuis la vue : modifie les dates de la tâche (ré-étale la charge).
async function setDates(taskId, debut, echeance) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const upd = {};

// ============================================================================
// Prévisualisation du planning (nouveau moteur)
// ============================================================================

// État de l'interface de prévisualisation
const PreviewState = {
  idle: 'idle',
  loading: 'loading',
  success: 'success',
  committing: 'committing',
  committed: 'committed',
  error: 'error',
  obsolete: 'obsolete'
};

// Modes du panel pour une fermeture unifiée
const PanelMode = Object.freeze({
  NONE: 'none',
  CELL: 'cell',
  RESOURCE: 'resource',
  PREVIEW: 'preview'
});

let currentPreviewState = PreviewState.idle;
let currentPreviewRequestId = 0;
let activePanelMode = PanelMode.NONE;

// Contexte de la prévisualisation courante (après succès)
let currentPreviewContext = null;

// Indicateur de commit en cours pour ignorer les onRecords pendant l'écriture
let planningCommitInProgress = false;

// Verrou pour éviter les doubles confirmations
let commitConfirmationInProgress = false;

// Révisions pour détecter les obsolescences après rechargement Grist
let gristDataRevision = 0;
let previewDataRevision = null;
let initialDataLoadComplete = false;

/**
 * Réinitialise l'état de la prévisualisation
 */
function resetPreviewState() {
  invalidateCurrentPreviewRequest();
  currentPreviewState = PreviewState.idle;
  previewDataRevision = null;
  currentPreviewContext = null;
  window._currentPreviewResult = null;
}

/**
 * Marque la prévisualisation comme obsolète
 */
function markPreviewObsolete() {
  currentPreviewState = PreviewState.obsolete;
  previewDataRevision = null;
  currentPreviewContext = null;
  window._currentPreviewResult = null;
  showPreviewObsolete();
}

/**
 * Échappe une chaîne pour injection HTML sécurisée
 */
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

/**
 * Vérifie si la prévisualisation courante peut être committée
 * @param {number} assignmentId - ID de l'affectation à vérifier
 * @returns {boolean} true si toutes les préconditions sont réunies
 */
function canCommitCurrentPreview(assignmentId) {
  // Planning service disponible
  if (!planningService) return false;
  
  // Hors mode démo
  if (S.demo) return false;
  
  // Document non readonly
  if (TF.isReadOnly()) return false;
  
  // État courant = success
  if (currentPreviewState !== PreviewState.success) return false;
  
  // Contexte de preview existe
  if (!currentPreviewContext) return false;
  
  // Même assignmentId
  if (currentPreviewContext.assignmentId !== assignmentId) return false;
  
  // canCommit = true
  if (!currentPreviewContext.canCommit) return false;
  
  // previewDataRevision non null
  if (previewDataRevision === null) return false;
  
  // previewDataRevision === gristDataRevision
  if (previewDataRevision !== gristDataRevision) return false;
  
  // Aucune opération de commit déjà en cours
  if (planningCommitInProgress) return false;
  
  return true;
}

/**
 * Obtient la date de replanification sélectionnée (toujours la valeur actuelle)

/**
 * Invalide la requête de prévisualisation courante
 */
function invalidateCurrentPreviewRequest() {
  currentPreviewRequestId++;
}

/**
 * Lance une prévisualisation pour une affectation
 */
async function launchPreview(assignmentId, replanFromDate, button) {
  if (!planningService) {
    toast('Service de planification non disponible');
    return;
  }
  
  if (!button || button.disabled) return;
  
  // Incrémenter l'ID de requête pour éviter les race conditions
  const requestId = ++currentPreviewRequestId;
  
  // Capturer la révision des données au moment de la requête
  const requestDataRevision = gristDataRevision;
  
  // État loading
  currentPreviewState = PreviewState.loading;
  button.disabled = true;
  button.textContent = 'Calcul...';
  
  try {
    const todayIso = new Date().toISOString().slice(0, 10);
    
    const result = await planningService.previewAssignment(assignmentId, {
      replanFromDate,
      todayIso
    });
    
    // Vérifier que c'est toujours la requête courante
    if (requestId !== currentPreviewRequestId) {
      return; // Une nouvelle requête a pris le relais
    }
    
    // Vérifier que les données n'ont pas changé entre-temps
    if (requestDataRevision !== gristDataRevision) {
      markPreviewObsolete();
      return;
    }
    
    if (result.success) {
      currentPreviewState = PreviewState.success;
      previewDataRevision = requestDataRevision;
      currentPreviewContext = {
        assignmentId,
        replanFromDate,
        dataRevision: requestDataRevision,
        canCommit: result.canCommit === true
      };
      showPreviewResult(assignmentId, result);
    } else {
      currentPreviewState = PreviewState.error;
      showPreviewError(assignmentId, result);
    }
  } catch (e) {
    if (requestId !== currentPreviewRequestId) return;
    if (requestDataRevision !== gristDataRevision) {
      markPreviewObsolete();
      return;
    }
    
    currentPreviewState = PreviewState.error;
    console.error('Preview error:', e);
    showPreviewError(assignmentId, {
      success: false,
      error: { code: 'PREVIEW_ERROR', message: e.message || String(e) }
    });
  } finally {
    button.disabled = false;
    button.textContent = 'Simuler';
  }
}

/**
 * Lance le commit d'une prévisualisation
 */
async function launchCommit(assignmentId, button) {
  if (!planningService) {
    toast('Service de planification non disponible');
    return;
  }
  
  // Protection contre les doubles clics : verrou avant la modale
  if (commitConfirmationInProgress || planningCommitInProgress) {
    return;
  }
  
  // Vérifier les préconditions avant confirmation
  if (!canCommitCurrentPreview(assignmentId)) {
    if (previewDataRevision !== gristDataRevision) {
      markPreviewObsolete();
      toast('Données modifiées — relancez la prévisualisation');
    } else {
      toast('Prévisualisation non applicable');
    }
    return;
  }
  
  // Lire la date du contexte (pas du DOM qui a disparu)
  const replanFromDate = currentPreviewContext.replanFromDate;
  
  // Verrouiller avant la modale
  commitConfirmationInProgress = true;
  if (button) {
    button.disabled = true;
    button.textContent = 'Confirmation...';
  }
  
  try {
    // Récupérer les informations pour la confirmation
    const taskById = new Map(S.tasks.map(t => [t.id, t]));
    const memberById = new Map(S.team.map(m => [m.id, m]));
    const assignment = S.assignments.find(a => a.id === assignmentId);
    
    if (!assignment) {
      toast('Affectation introuvable');
      return;
    }
    
    const task = taskById.get(assignment.tache);
    const member = memberById.get(assignment.membre);
    const taskName = task ? task.titre : `Tâche ${assignment.tache}`;
    const memberName = member ? member.nom : `Membre ${assignment.membre}`;
    
    // Obtenir le résultat actuel pour afficher le résumé
    const result = window._currentPreviewResult;
    const changeSummary = result ? result.changeSummary : null;
    
    // Utiliser les totaux incluant les suppressions
    const capacitiesCount = changeSummary?.capacities?.total || 0;
    const timeEntriesCount = changeSummary?.timeEntries?.total || 0;
    
    // Demander confirmation explicite
    const confirmed = await confirmModal(
      'Appliquer cette planification ?',
      `Tâche : ${escapeHtml(taskName)}\n` +
      `Membre : ${escapeHtml(memberName)}\n` +
      `Replanification à partir du : ${replanFromDate}\n\n` +
      `${capacitiesCount} modifications de capacités\n` +
      `${timeEntriesCount} modifications de planning quotidien\n\n` +
      `Le moteur recalculera le plan avant l'écriture.`
    );
    
    if (!confirmed) {
      return;
    }
    
    // Vérifier à nouveau APRÈS la confirmation (les données ont pu changer)
    if (!canCommitCurrentPreview(assignmentId)) {
      if (previewDataRevision !== gristDataRevision) {
        markPreviewObsolete();
        toast('Données modifiées pendant la confirmation');
      } else {
        toast('Prévisualisation non applicable');
      }
      return;
    }
    
    // État committing
    planningCommitInProgress = true;
    currentPreviewState = PreviewState.committing;
    
    const todayIso = new Date().toISOString().slice(0, 10);
    
    // Appeler exclusivement commitAssignment()
    const commitResult = await planningService.commitAssignment(assignmentId, {
      replanFromDate,
      todayIso
    });
    
    if (commitResult.success) {
      currentPreviewState = PreviewState.committed;
      
      // Recharger les données après le commit
      await loadGrist({ preservePlanningPanel: true });
      
      // Vérifier l'idempotence après succès
      const verification = await planningService.previewAssignment(assignmentId, {
        replanFromDate,
        todayIso
      });
      
      // Finaliser le contexte avant d'afficher le résultat
      invalidateCurrentPreviewRequest();
      previewDataRevision = null;
      currentPreviewContext = null;
      window._currentPreviewResult = null;
      
      if (verification.success && 
          verification.changeSummary &&
          verification.changeSummary.capacities?.total === 0 &&
          verification.changeSummary.timeEntries?.total === 0) {
        // Succès vérifié
        showCommitSuccess(assignmentId, commitResult, true);
      } else {
        // Succès mais écarts restants
        showCommitSuccess(assignmentId, commitResult, false);
      }
    } else {
      // Échec du commit : recharger les données
      await loadGrist({ preservePlanningPanel: true });
      
      currentPreviewContext = null;
      previewDataRevision = null;
      currentPreviewState = PreviewState.error;
      
      showCommitError(assignmentId, commitResult);
    }
  } catch (e) {
    // Échec du commit : recharger les données
    await loadGrist({ preservePlanningPanel: true });
    
    currentPreviewContext = null;
    previewDataRevision = null;
    currentPreviewState = PreviewState.error;
    
    console.error('Commit error:', e);
    showCommitError(assignmentId, {
      success: false,
      error: { code: 'COMMIT_ERROR', message: e.message || String(e) }
    });
  } finally {
    planningCommitInProgress = false;
    commitConfirmationInProgress = false;
    if (button) {
      button.disabled = false;
      button.textContent = 'Appliquer la planification';
    }
  }
}

/**
 * Affiche un message d'obsolescence
 */
function showPreviewObsolete() {
  const pBody = document.getElementById('pBody');
  
  pBody.innerHTML = `

/**

    result.success === true &&
    result.canCommit === true &&
    previewDataRevision !== null &&
    previewDataRevision === gristDataRevision &&
    !S.demo &&
    !TF.isReadOnly()
  );
  
  let html = `
    <div class="phint" style="border-left:3px solid var(--ok)">
      <b>Prévisualisation valide</b> — ${result.canCommit ? 'Prête à être appliquée' : 'Non applicable'}
    </div>
    
    <div style="margin-bottom:16px">
      <h4 style="font-size:0.85rem;font-weight:700;margin-bottom:8px;color:var(--text)">Résumé métier</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.78rem">
        ${renderSummaryItem('Heures allouées', summary.allocatedHours)}
        ${renderSummaryItem('Heures protégées', summary.protectedPlannedHours)}
        ${renderSummaryItem('Heures planifiées', summary.newlyPlannedHours)}
        ${renderSummaryItem('Heures non planifiées', summary.unplannedHours)}
        ${renderSummaryItem('Surconsommation', summary.overconsumedHours)}
      </div>

/**
 * Rendu du tableau du plan
 */
function renderPlanTable(desiredPlan) {
  if (!desiredPlan || desiredPlan.length === 0) {
    return '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:0.85rem">Aucun plan généré</div>';
  }
  
  // Limiter à 10 entrées pour l'affichage
  const displayPlan = desiredPlan.slice(0, 10);
  const remaining = desiredPlan.length - 10;
  
  let html = `
    <div style="max-height:300px;overflow:auto;border:1px solid var(--border);border-radius:6px">
      <table style="width:100%;font-size:0.75rem;border-collapse:collapse">
        <thead>
          <tr style="background:var(--surface-2);position:sticky;top:0">
            <th style="padding:6px;text-align:left;border-bottom:1px solid var(--border)">Date</th>
            <th style="padding:6px;text-align:right;border-bottom:1px solid var(--border)">Heures prévues</th>
            <th style="padding:6px;text-align:right;border-bottom:1px solid var(--border)">Capacité théo.</th>
            <th style="padding:6px;text-align:right;border-bottom:1px solid var(--border)">Capacité disp.</th>
          </tr>
        </thead>
        <tbody>
  `;
  
  for (const item of displayPlan) {
    const dateStr = item.date ? new Date(item.date + 'T00:00:00Z').toLocaleDateString('fr-FR') : '—';
    html += `
      <tr style="border-bottom:1px solid var(--border)">
        <td style="padding:6px">${escapeHtml(dateStr)}</td>
        <td style="padding:6px;text-align:right;font-weight:600">${(item.plannedHours || 0).toFixed(1)}h</td>
        <td style="padding:6px;text-align:right;color:var(--text-muted)">${(item.baseCapacityHours || 0).toFixed(1)}h</td>
        <td style="padding:6px;text-align:right;color:var(--text-muted)">${(item.availableCapacityHours || 0).toFixed(1)}h</td>
      </tr>
    `;
  }
  
  html += '</tbody></table></div>';
  
  if (remaining > 0) {
    html += `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:6px;text-align:center">+${remaining} autres lignes…</div>`;
  }
  
  return html;
}

/**
 * Rendu des diagnostics
 */
function renderDiagnostics(diagnostics) {
  if (!diagnostics || diagnostics.length === 0) return '';
  
  let html = '<div style="display:flex;flex-direction:column;gap:6px">';
  
  for (const diag of diagnostics) {
    const level = getDiagnosticLevel(diag);
    const icon = level === 'bloquant' ? '⛔' : level === 'avertissement' ? '⚠️' : 'ℹ️';
    const color = level === 'bloquant' ? 'var(--over)' : level === 'avertissement' ? 'var(--warn)' : 'var(--text-muted)';
    
    html += `
      <div style="padding:8px;border-radius:6px;font-size:0.78rem;display:flex;gap:8px;align-items:flex-start;background:rgba(255,255,255,0.02)">
        <span style="flex-shrink:0">${icon}</span>
        <div>
          <div style="font-weight:600;color:${color};margin-bottom:2px">${escapeHtml(diag.code || 'DIAGNOSTIC')}</div>
          <div style="color:var(--text-muted)">${escapeHtml(diag.message || '')}</div>
        </div>
      </div>
    `;
  }
  
  html += '</div>';
  return html;
}

/**
 * Détermine le niveau d'un diagnostic en utilisant la fonction du noyau
 */
function getDiagnosticLevel(diag) {
  // Utiliser la fonction officielle du bundle si disponible
  const api = window.TaskFlowPlanning;
  if (api && typeof api.isBlockingDiagnostic === 'function') {
    if (api.isBlockingDiagnostic(diag)) {
      return 'bloquant';
    }
  }
  
  // Fallback pour les diagnostics réellement non bloquants
  const code = diag.code || '';
  if (code.includes('OVERCONSUMPTION') || code.includes('UNPLANNED')) {
    return 'avertissement';
  }
  
  return 'information';
}

async function loadGrist(options = {}) {
  const { preservePlanningPanel = false } = options;
  
  let [tasks, team, projects, dispos, prog, entries, entites, assignments] = await Promise.all([
    grist.docApi.fetchTable('Tasks'),
    grist.docApi.fetchTable('Team'),
    grist.docApi.fetchTable('Projects'),
    grist.docApi.fetchTable('Disponibilites').catch(() => null),
    grist.docApi.fetchTable('Programmes').catch(() => null),
    grist.docApi.fetchTable('TimeEntries').catch(() => null),
    grist.docApi.fetchTable('Entites').catch(() => null),
    grist.docApi.fetchTable('TaskAssignments').catch(() => null)
  ]);
  
  S.demo = false;
  appMode = 'grist';
  
  const ensured = await ensurePlanColumns(team, tasks, dispos); team = ensured.team; tasks = ensured.tasks; dispos = ensured.dispos;
  S.tasks = tasks ? TF.columnarToRows(tasks) : [];
  S.team = team ? TF.columnarToRows(team) : [];
  S.projects = projects ? TF.columnarToRows(projects) : [];
  S.dispos = dispos ? TF.columnarToRows(dispos) : [];
  S.programmes = prog ? TF.columnarToRows(prog) : [];
  S.entites = entites ? TF.columnarToRows(entites) : [];
  // #5 : réalisé daté EXACT depuis la Feuille de temps (TimeEntries). Opt-in : actif seulement si la table existe.
  // Utilisation du loader commun pour normaliser les données (contrat Plan/CRA unifié)
  const timeEntriesResult = entries ? await TaskFlowTimeEntryLoader.loadTimeEntries(grist) : { entries: [], feuillesById: {}, diagnostics: [] };
  S.entries = timeEntriesResult.entries;
  S.feuillesById = timeEntriesResult.feuillesById;
  S.hasEntries = !!(entries && S.entries.length);
  
  // Logger les diagnostics (optionnel)
  if (timeEntriesResult.diagnostics && timeEntriesResult.diagnostics.length > 0) {
    console.log('[Plan] TimeEntries chargées:', timeEntriesResult.diagnostics);
  }
  // TaskAssignments : chargement pour la prévisualisation du planning
  S.assignments = assignments ? TF.columnarToRows(assignments) : [];
  // Programme = opt-in : actif seulement si la colonne Projects.programme (ou portefeuille) existe. Sinon le groupement propose l'activation.
  S.hasProg = !!(projects && (('programme' in projects) || ('portefeuille' in projects)) && prog);
  
  // Incrémenter la révision des données après chargement réussi
  if (initialDataLoadComplete) {
    gristDataRevision++;
    
    // Invalider une prévisualisation déjà affichée si les données ont changé
    // SAUF si un commit est en cours (on ne veut pas afficher "obsolete" pendant l'écriture)
    if (
      !planningCommitInProgress &&
      activePanelMode === PanelMode.PREVIEW &&
      previewDataRevision !== null &&
      previewDataRevision !== gristDataRevision
    ) {
      invalidateCurrentPreviewRequest();
      previewDataRevision = null;
      currentPreviewState = PreviewState.obsolete;
      showPreviewObsolete();
    }
  } else {
    initialDataLoadComplete = true;
  }
  
  buildDispoIndex();
  initFilterManager();
  render();
}

// Le widget Plan est le CRÉATEUR UNIQUE de ses colonnes (sweet spot opt-in) : Team.capaciteHebdo/indispos
// + Tasks.charges/dateCloture. Les autres widgets ne créent rien — ils n'activent leurs bouts "charge"
// que si ces colonnes existent. Un doc qui n'ouvre jamais le Plan reste sans empreinte.
let _colsEnsured = false;
async function ensurePlanColumns(team, tasks, dispos) {
  if (_colsEnsured) return { team, tasks, dispos };
  const add = [];
  if (team && !('capaciteHebdo' in team)) add.push(['AddColumn', 'Team', 'capaciteHebdo', { type: 'Numeric' }]);
  if (team && !('indispos' in team)) add.push(['AddColumn', 'Team', 'indispos', { type: 'Text' }]);
  if (tasks && !('charges' in tasks)) add.push(['AddColumn', 'Tasks', 'charges', { type: 'Text' }]);
  if (tasks && !('dateCloture' in tasks)) add.push(['AddColumn', 'Tasks', 'dateCloture', { type: 'Date' }]);
  if (dispos == null) add.push(['AddTable', 'Disponibilites', [{ id: 'membre', type: 'Ref:Team' }, { id: 'type', type: 'Text' }, { id: 'dateDebut', type: 'Date' }, { id: 'dateFin', type: 'Date' }, { id: 'dispo', type: 'Numeric' }, { id: 'commentaire', type: 'Text' }]]);
  _colsEnsured = true; // garde anti-ré-entrance (onRecords rappelle loadGrist pendant l'await)
  if (!add.length) return { team, tasks, dispos };
  try {
    await grist.docApi.applyUserActions(add);
    const [t2, tm2, d2] = await Promise.all([
      grist.docApi.fetchTable('Tasks').catch(() => tasks),
      grist.docApi.fetchTable('Team').catch(() => team),
      grist.docApi.fetchTable('Disponibilites').catch(() => dispos)
    ]);
    return { team: tm2, tasks: t2, dispos: d2 };
  } catch (e) { return { team, tasks, dispos }; }
}

// Programme (JPP #11) : regroupement simple de projets. Satellite opt-in, créé seulement sur action
// explicite (sélection du groupement Programme). Table Programmes + colonne Projects.programme.
// L'affectation projet -> programme se fait nativement dans la table Projects (colonne Ref).
async function ensureProgSchema() {
  try {
    // Migration : Renommer Portefeuilles → Programmes si l'ancienne table existe
    const portefTable = await grist.docApi.fetchTable('_grist_Tables').then(data => {
      const rows = TF.columnarToRows(data);
      return rows.find(r => r.tableId === 'Portefeuilles');
    }).catch(() => null);
    if (portefTable) {
      await grist.docApi.applyUserActions([['RenameTable', 'Portefeuilles', 'Programmes']]);
    }
    
    const projects = await grist.docApi.fetchTable('Projects').catch(() => null);
    const progExists = await grist.docApi.fetchTable('Programmes').then(() => true).catch(() => false);
    const acts = [];
    if (!progExists) acts.push(['AddTable', 'Programmes', [
      { id: 'nom', type: 'Text' }, { id: 'couleur', type: 'Text' },
      { id: 'responsable', type: 'Ref:Team' }, { id: 'description', type: 'Text' }, { id: 'actif', type: 'Bool' }
    ]]);
    // Migration : portefeuille → programme (si ancienne colonne existe, on la garde, sinon on crée programme)
    if (projects && !('programme' in projects)) {
      // Si portefeuille existe déjà, on ne fait rien (rétrocompatible)
      if (!('portefeuille' in projects)) {
        acts.push(['AddColumn', 'Projects', 'programme', { type: 'Ref:Programmes' }]);
      }
    }
    if (acts.length) await grist.docApi.applyUserActions(acts);
    const [pj2, pf2] = await Promise.all([
      grist.docApi.fetchTable('Projects').catch(() => null),
      grist.docApi.fetchTable('Programmes').catch(() => null)
    ]);
    S.projects = pj2 ? TF.columnarToRows(pj2) : S.projects;
    S.programmes = pf2 ? TF.columnarToRows(pf2) : S.programmes;
    // hasProg = true si programme OU portefeuille existe
    S.hasProg = !!(pj2 && (('programme' in pj2) || ('portefeuille' in pj2)) && pf2);
  } catch (e) { /* droits insuffisants : hasProg reste false */ }
}

  if (

// Fermer toutes les sections de filtres au chargement complet
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const allCheckboxes = document.querySelectorAll('.filter-checkboxes');
    allCheckboxes.forEach(cb => {
      cb.classList.remove('open');
      cb.style.display = 'none';
    });
    const allHeaders = document.querySelectorAll('.filter-section-header');
    allHeaders.forEach(h => h.classList.remove('open'));
  }, 200);
});

async function initGrist() {
  try {
    console.info('[Plan init] Connexion à Grist…');

    await grist.ready({
      requiredAccess: 'full'
    });

    appMode = 'grist';
    S.demo = false;

    console.info(
      '[Plan init] Connexion Grist confirmée'
    );

    TF.readOnlyBanner();

    TF.guardWrites(grist, {
      onReadOnly: () => {
        toast(
          'Lecture seule : modification non autorisée'
        );
      },
      onDenied: () => {
        toast(
          'Modification refusée par vos droits'
        );

        loadGrist().catch(error => {
          console.error(
            '[Plan] Rechargement après refus impossible',
            error
          );
        });
      }
    });

    initPlanningService();

    await loadGrist();

    grist.onRecords(() => {
      if (appMode !== 'grist') {
        return;
      }

      loadGrist().catch(error => {
        console.error(
          '[Plan] Rechargement Grist impossible',
          error
        );
      });
    });

    try {
      grist.onOptions(options => {
        S.extFilters =
          options && options.filters
            ? options.filters
            : null;

        if (S.filterManager) {
          S.filterManager.applyExternalFilters(
            options
          );
        }

        render();
      });
    } catch (error) {
      console.warn(
        '[Plan] onOptions indisponible',
        error
      );
    }
  } catch (error) {
    appMode = 'error';
    S.demo = false;

    console.error(
      '[Plan init] Initialisation Grist impossible',
      error
    );

    const wrap =
      document.getElementById('gridwrap');

    if (wrap) {
      wrap.innerHTML =
        '<div class="empty">' +
          '<div class="ic">⚠</div>' +
          '<div>Connexion à Grist impossible</div>' +
          '<div style="font-size:.78rem">' +
            esc(error?.message || error) +
          '</div>' +
        '</div>';
    }
  }
}

bindToolbar();

if (window.self === window.top) {
  appMode = 'demo';
  loadDemo();
} else {
  initGrist();
}
