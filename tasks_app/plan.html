<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan - TaskFlow</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="core/filters/filter-manager.js"></script>
<script src="core/planning/time_entry/time-entry-loader.js"></script>
<script src="core/generated/taskflow-planning-browser.js"></script>
<link rel="stylesheet" href="core/theme/taskflow-theme.css">
<link rel="stylesheet" href="core/filters/filter-styles.css">
<style>
/* Couleurs spécifiques au Plan (états de charge) */
:root{
  --ok:#3b82f6; --warn:#f59e0b; --over:#e5484d; --off:#475569;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
#app{display:flex;flex-direction:column;height:100vh}
.bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.title{display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:700;color:var(--primary)}
.title .ic{font-size:1.2rem}
.spacer{flex:1}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.seg button{background:transparent;color:var(--text-muted);border:0;padding:5px 11px;cursor:pointer;font-size:0.82rem}
.seg button.on{background:var(--primary);color:#fff}
.btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:5px 10px;cursor:pointer;font-size:0.82rem}
.btn:hover{background:var(--surface-3)}
.btn.ghost{background:transparent;color:var(--text-muted)}
.nav{display:inline-flex;align-items:center;gap:6px}
.nav .range{font-size:0.82rem;color:var(--text-muted);min-width:104px;text-align:center}
select.btn{appearance:none;padding-right:24px}
label.chk{display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text-muted);cursor:pointer}
.alerts{padding:7px 14px;font-size:0.78rem;color:var(--text-muted);border-bottom:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap}
.alerts .warn{color:var(--warn)} .alerts .over{color:var(--over)}
.gridwrap{flex:1;overflow:auto;position:relative}
.pf-hint{position:sticky;top:0;z-index:5;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--warn);border-radius:6px;margin:8px;padding:7px 10px;font-size:.76rem;color:var(--text-muted)}
:root{--res-col:184px;--sum-col:80px}
table.grid{border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed;font-size:0.8rem}
table.grid th,table.grid td{padding:0;border-bottom:1px solid var(--border)}
table.grid thead th{position:sticky;top:0;z-index:3;background:var(--surface);color:var(--text-muted);font-weight:600;padding:8px 8px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--border)}
table.grid thead th.now{color:var(--primary)}
.colres{position:sticky;left:0;z-index:2;background:var(--surface);text-align:left!important;width:var(--res-col);min-width:var(--res-col);border-right:1px solid var(--border)}
thead th.colres{z-index:4}
.res{display:flex;align-items:center;gap:8px;padding:7px 10px}
.ava{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.66rem;font-weight:700;color:#fff;flex-shrink:0}
.res .nm{font-weight:600;white-space:nowrap}
.res .cap{color:var(--text-muted);font-size:0.72rem}
.cell{text-align:center;padding:0;cursor:pointer}
.cell .v{display:block;padding:6px 4px;font-weight:600;font-size:0.78rem;color:#fff;min-width:0}
.cell .dot{display:block;padding:6px 8px;color:var(--off)}
.cell:hover .v{outline:2px solid rgba(255,255,255,.45);outline-offset:-2px}
.cell.nowcol,thead th.now,tfoot td.nowcol{box-shadow:inset 1px 0 var(--primary),inset -1px 0 var(--primary)}
thead th .pk{font-weight:700}
thead th .psub{font-weight:400;font-size:0.65rem;color:var(--off);margin-top:1px}
th.sum,td.sum{text-align:center;background:var(--surface-2);border-left:1px solid var(--border);white-space:nowrap;padding:6px 8px;width:var(--sum-col)}
td.sum .sh{font-weight:700;font-size:0.8rem}
td.sum .sp{font-size:0.67rem;color:var(--text-muted)}
tfoot td{position:sticky;bottom:0;background:var(--surface-2);font-weight:600;color:var(--text);padding:7px 6px;text-align:center;border-top:1px solid var(--border)}
tfoot td.colres{background:var(--surface-2);z-index:2}
.legend{padding:8px 14px;display:flex;gap:16px;flex-wrap:wrap;font-size:0.74rem;color:var(--text-muted);border-top:1px solid var(--border)}
.legend .sw{display:inline-block;width:11px;height:11px;border-radius:2px;vertical-align:middle;margin-right:4px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100%;color:var(--text-muted);text-align:center}
.empty .ic{font-size:2.4rem;opacity:.5}
/* panel slide-in (même primitive que les autres widgets) */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s;z-index:20}
.overlay.show{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:.22s;z-index:21;display:flex;flex-direction:column}
.panel.show{transform:none}
.panel .ph{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border)}
.panel .ph h3{font-size:0.98rem}
.panel .ph .sub{font-size:0.76rem;color:var(--text-muted);margin-top:2px}
.panel .pb{flex:1;overflow:auto;padding:14px}
.tk{display:flex;flex-direction:column;gap:8px;padding:11px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:9px;transition:border-color .15s,background .15s}
.tk:hover{border-color:var(--primary);background:rgba(123,140,255,.05)}
.tk .tkmain{display:flex;align-items:center;gap:10px}
.unitbar{display:flex;align-items:center;gap:6px;font-size:0.74rem;color:var(--text-muted);margin-bottom:12px}
.unitbar button{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:7px;padding:3px 10px;cursor:pointer;font-size:0.74rem;transition:.12s}
.unitbar button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.unitbar button:not(.on):hover{border-color:var(--primary);color:var(--text)}
.tk .tkdates{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border)}
.tk .tkdates .dl{font-size:0.7rem;color:var(--text-muted);font-weight:600;white-space:nowrap}
.tk .tkdates input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:3px 7px;font-size:0.73rem;color-scheme:dark;transition:.12s}
.tk .tkdates input:focus{outline:none;border-color:var(--primary)}
.tk .tkdates span{color:var(--text-muted);font-size:0.74rem}
.tk .pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tk .tinfo{flex:1;min-width:0}
.tk .tt{font-weight:650;font-size:0.84rem;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tk .tm{font-size:0.71rem;color:var(--text-muted);margin-top:1px}
.tk .th{font-weight:700;font-size:0.84rem;color:var(--text)}
.tk .tkedit{display:flex;align-items:center;gap:5px;flex-shrink:0}
.tk .tkedit input{width:52px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:4px 7px;font-size:0.82rem;text-align:right;font-variant-numeric:tabular-nums;transition:.12s}
.tk .tkedit input:focus{outline:none;border-color:var(--primary)}
.tk .tkedit .u{font-size:0.7rem;color:var(--text-muted);min-width:8px}
.tk .tkedit select{width:34px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);border-radius:7px;padding:4px 2px;font-size:0.82rem;cursor:pointer;transition:.12s}
.tk .tkedit select:hover{border-color:var(--primary);color:var(--text)}
.panel .pf{padding:12px 14px;border-top:1px solid var(--border)}
.x{background:transparent;border:0;color:var(--text-muted);font-size:1.3rem;cursor:pointer;line-height:1}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);background:var(--surface-3);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:0.8rem;opacity:0;pointer-events:none;transition:.2s;z-index:30;max-width:80vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#cfOverlay{z-index:70}
.cfmodal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;z-index:71;width:380px;max-width:90vw;opacity:0;pointer-events:none;transition:.18s}
.cfmodal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.cfmodal h3{font-size:1rem;margin-bottom:8px}
.cfmodal p{font-size:0.84rem;color:var(--text-muted);margin-bottom:16px;line-height:1.45;white-space:pre-line}
.cfmodal .cfbtns{display:flex;justify-content:flex-end;gap:8px}
.colres.clk{cursor:pointer}
.colres.clk:hover{background:var(--surface-3)}
.cell.redu{background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(71,85,105,.28) 5px,rgba(71,85,105,.28) 10px)}
.rl{font-size:0.78rem;color:var(--text-muted);font-weight:600}
.capedit{display:flex;align-items:center;gap:8px;margin-top:6px}
.capedit input{width:74px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:0.85rem}
.capedit .u{color:var(--text-muted);font-size:0.8rem}
.indispo{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;margin-top:6px}
.indispo .il{font-weight:600;font-size:0.8rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.indispo .id{font-size:0.72rem;color:var(--text-muted);white-space:nowrap}
.indispo .ix{background:transparent;border:0;color:var(--text-muted);cursor:pointer;font-size:1.1rem;line-height:1}
.indispo-add{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.indispo-add>input[type=text]{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:0.8rem}
.indispo-add .dd{display:flex;align-items:center;gap:6px}
.indispo-add .dd input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 6px;font-size:0.74rem;color-scheme:dark}
   .indispo-add .dd span{color:var(--text-muted)}
   /* Filtres - utiliser le CSS commun depuis core/filters/filter-styles.css */
</style>
</head>
<body>
<div id="app">
  <div class="bar">
    <div class="title"><span class="ic">▦</span> Plan</div>
    <div class="seg" id="segGran"></div>
    <div class="nav">
      <button class="btn ghost" id="navPrev">◀</button>
      <span class="range" id="navRange">—</span>
      <button class="btn ghost" id="navNext">▶</button>
      <button class="btn ghost" id="navToday" style="display:none">Aujourd'hui</button>
    </div>
    <div class="spacer"></div>
    <label class="chk"><span>Grouper</span>
      <select class="btn" id="selGroup">
        <option value="person">Personne</option>
        <option value="programme">Programme</option>
        <option value="project">Projet</option>
        <option value="role">Rôle</option>
      </select>
    </label>
    <div class="seg" id="segMode"></div>
    <div class="seg" id="segUnit"></div>
    <div class="filter-dropdown">
      <button class="filter-btn" id="btnFilterToggle" title="Filtres"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg> Filtres <span class="filter-count" style="display:none"></span>▾</button>
      <div class="filter-panel" id="filterPanel">
        <div class="filter-sections">
          <div id="filterPersonContainer"></div>
          <div id="filterTeamContainer"></div>
          <div id="filterProjectContainer"></div>
          <div id="filterProgramContainer"></div>
          <div id="filterTaskContainer"></div>
        </div>
        <div class="filter-actions">
          <button class="btn ghost" id="btnClearFilters" title="Effacer tous les filtres">× Effacer tout</button>
        </div>
      </div>
    </div>
    <label class="chk"><input type="checkbox" id="chkDone"> Inclure terminé</label>
    <label class="chk" title="Estimer la charge des tâches sans charge à partir de leur estimation ÷ nb assignés"><input type="checkbox" id="chkDerive"> Estimer</label>
    <label class="chk" title="Étaler la charge sur les jours ouvrés (lun-ven) seulement"><input type="checkbox" id="chkWorkdays"> Jours ouvrés</label>
    <button class="btn" id="btnInit" title="Initialiser la charge des tâches sans charge depuis estimationH ÷ nb assignés">⚙ Init. charges</button>
    <button class="btn" id="btnExport" title="Exporter le plan en CSV (COPIL)">⬇ CSV</button>
    <button class="btn" id="btnTimeline" title="Timeline par personne : les tâches de chacun en barres sur la fenêtre">⊞ Timeline</button>
    <button class="btn" id="btnPlanningPreview" title="Prévisualiser le planning avec le nouveau moteur">🔮 Prévisualiser</button>
  </div>
  <div class="alerts" id="alerts"></div>
  <div class="gridwrap" id="gridwrap"><div class="empty"><div class="ic">▦</div><div>Chargement…</div></div></div>
  <div class="legend" id="legend">
    <span><span class="sw" style="background:var(--ok)"></span>charge OK</span>
    <span><span class="sw" style="background:var(--warn)"></span>&gt; 85% capacité</span>
    <span><span class="sw" style="background:var(--over)"></span>surcharge</span>
    <span><span class="sw" style="background:var(--off)"></span>capacité réduite</span>
    <span>· = aucune charge</span>
  </div>
  <div class="legend" id="legendDispo" style="display:none">
    <span><span class="sw" style="background:rgba(21,160,107,.85)"></span>capacité disponible (plus vert = plus de marge)</span>
    <span>· = complet / en surcharge</span>
  </div>
  <div class="legend" id="legendRealise" style="display:none">
    <span id="legendRealiseTxt">réalisé = temps passé saisi · <b>estimé</b> (= prévu) pour les tâches clôturées sans temps</span>
  </div>
</div>
<div class="overlay" id="overlay"></div>
<div class="panel" id="panel">
  <div class="ph">
    <div><h3 id="pTitle">Détail</h3><div class="sub" id="pSub"></div></div>
    <button class="x" id="pClose">×</button>
  </div>
  <div class="pb" id="pBody"></div>
</div>
<div id="toast" class="toast"></div>
<style>
.tlpanel { position: fixed; left: 0; right: 0; bottom: 0; height: 46vh; background: var(--card-bg, #1a2236); border-top: 1px solid var(--border, #2a3550); box-shadow: 0 -12px 40px rgba(0,0,0,.4); transform: translateY(100%); transition: transform .25s ease, right .2s ease; z-index: 45; display: flex; flex-direction: column; }
body.panel-open .tlpanel { right: min(380px, 92vw); }
#app { transition: margin-right .2s ease; }
body.panel-open #app { margin-right: min(380px, 92vw); }
.tlpanel.open { transform: translateY(0); }
.tlhead { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border, #2a3550); flex: none; font-size: .9rem; }
.tlhead .tlrange { color: var(--text-muted, #94a3b8); font-size: .76rem; margin-left: 8px; font-weight: 400; }
.tlhead .x { background: none; border: none; color: var(--text-muted, #94a3b8); font-size: 1.4rem; cursor: pointer; line-height: 1; }
.tlbody { overflow: auto; flex: 1; padding-bottom: 14px; }
.tl-axis { display: flex; position: sticky; top: 0; background: var(--card-bg, #1a2236); z-index: 2; padding: 5px var(--sum-col) 5px 0; border-bottom: 1px solid var(--border, #2a3550); }
.tl-axis .c { flex: 1; text-align: center; font-size: .6rem; color: var(--text-muted, #94a3b8); border-left: 1px solid var(--border, #2a3550); }
.tl-grp { font-size: .74rem; font-weight: 700; color: var(--text, #e2e8f0); padding: 9px 14px 3px; display: flex; align-items: center; gap: 7px; }
.tl-grp .tava { width: 18px; height: 18px; border-radius: 50%; color: #fff; font-size: .56rem; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; flex: none; }
.tl-row { display: flex; align-items: center; height: 23px; }
.tl-lbl { width: var(--res-col); flex: none; font-size: .71rem; color: var(--text-muted, #cbd5e1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 8px 0 28px; box-sizing: border-box; }
.tl-track { flex: 1; position: relative; height: 100%; border-left: 1px solid var(--border, #2a3550); margin-right: var(--sum-col); }
.tl-bar { position: absolute; top: 4px; height: 15px; min-width: 4px; border-radius: 4px; font-size: .59rem; color: #fff; line-height: 15px; padding: 0 5px; overflow: hidden; white-space: nowrap; box-shadow: 0 1px 3px rgba(0,0,0,.35); cursor: pointer; }
.tl-bar:hover { filter: brightness(1.12); }
.tl-empty { padding: 26px; text-align: center; color: var(--text-muted, #94a3b8); font-size: .82rem; }
.tl-band { position: absolute; top: 0; bottom: 0; background: rgba(123,140,255,.13); border-left: 1px solid rgba(123,140,255,.55); border-right: 1px solid rgba(123,140,255,.55); pointer-events: none; z-index: 0; }
.tl-grp.tl-focus, .tl-row.tl-focus { background: rgba(123,140,255,.08); }
.tl-axis .c.on { color: var(--primary, #7b8cff); font-weight: 700; }
.tl-bar { z-index: 1; }
.tl-bar.hot { z-index: 3; outline: 2px solid #fff; box-shadow: 0 0 0 2px rgba(123,140,255,.7), 0 2px 7px rgba(0,0,0,.45); }
.tl-bar { cursor: grab; }
.tl-bar.dragging { pointer-events: none; opacity: .9; z-index: 6; box-shadow: 0 6px 20px rgba(0,0,0,.55); }
.tl-row.drop-tgt, .tl-grp.drop-tgt { background: rgba(123,140,255,.16); box-shadow: inset 0 0 0 1px rgba(123,140,255,.65); }
.grid td.cell.sel { outline: 2px solid var(--primary, #7b8cff); outline-offset: -2px; border-radius: 3px; }
.grid tr.grp td { background: rgba(123,140,255,.07); }
.grid .colres.ghead { font-weight: 700; }
.grid .colres.ghead .gdot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 9px; flex: none; }
.grid tr.grp .gval { font-weight: 700; color: var(--text-muted, #cbd5e1); font-variant-numeric: tabular-nums; }
.grid .colres.sub { padding-left: 30px; }
.grid .colres.sub .ava { width: 20px; height: 20px; font-size: .56rem; }
.tl-sec { font-size: .78rem; font-weight: 800; color: var(--text, #e6e9f2); padding: 11px 14px 3px; display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border, #2a3550); margin-top: 3px; }
.tl-sec .gdot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
.tl-grp.tl-ind { padding-left: 26px; }
.tl-row.tl-ind .tl-lbl { padding-left: 42px; }
.pbanner { padding: 9px 12px; border-radius: 9px; font-size: .8rem; font-weight: 600; margin-bottom: 10px; border-left: 3px solid transparent; line-height: 1.4; }
.pbanner b { font-weight: 800; }
.pbanner.over { background: rgba(229,72,77,.13); color: #ff9094; border-left-color: #e5484d; }
.pbanner.warn { background: rgba(245,158,11,.13); color: #f3b35e; border-left-color: #f59e0b; }
.pbanner.ok { background: rgba(59,130,246,.12); color: #93b6ff; border-left-color: #3b82f6; }
.pbanner.under { background: rgba(21,160,107,.12); color: #54d2a4; border-left-color: #15a06b; }
.phint { font-size: .75rem; color: var(--text-muted, #94a3b8); margin-bottom: 12px; line-height: 1.55; }
.phint b { color: var(--text, #cbd5e1); font-weight: 600; }
.tlpop { position: fixed; z-index: 60; width: 272px; max-width: 88vw; background: var(--surface, #1a2236); border: 1px solid var(--border, #2a3550); border-radius: 12px; box-shadow: 0 14px 44px rgba(0,0,0,.5); padding: 13px; }
.tpc-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 7px; }
.tpc-prio, .tpc-status, .tpc-mil { font-size: .64rem; font-weight: 700; padding: 2px 8px; border-radius: 6px; line-height: 1.45; }
.tpc-mil { background: rgba(124,92,240,.18); color: #b9a6ff; }
.tpc-title { font-weight: 700; font-size: .92rem; letter-spacing: -.01em; margin-bottom: 7px; line-height: 1.25; }
.tpc-meta { display: flex; flex-direction: column; gap: 4px; font-size: .74rem; color: var(--text-muted, #94a3b8); margin-bottom: 9px; }
.tpc-proj { display: inline-flex; align-items: center; gap: 6px; }
.tpc-proj i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex: none; }
.tpc-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.tpc-ava { display: flex; }

<script>
"use strict";

// <taskflow-core> -- GENERE par scripts/build-taskflow.js, NE PAS EDITER ICI
/* ============================================================================
 * taskflow-core.js — Module commun aux widgets TaskFlow
 * ----------------------------------------------------------------------------
 * SOURCE UNIQUE. Inline dans chaque widget par scripts/build-taskflow.js entre
 * les marqueurs de generation prevus a cet effet.
 * NE PAS editer la copie inlinee dans les .html : editer CE fichier puis lancer
 *   npm run build:taskflow
 *
 * Expose un objet `TF` (namespace) pour ne jamais entrer en collision avec les
 * helpers locaux existants des widgets. Toutes les fonctions qui ecrivent dans
 * Grist sont DEFENSIVES : en cas d'echec elles n'interrompent jamais le widget
 * (au pire, comportement actuel inchange).
 * ========================================================================== */
const TF = (function () {
    'use strict';

    /* ----- Statuts ---------------------------------------------------------
     * Convention : l'ORDRE fait foi. Le DERNIER statut de la liste est l'etat
     * terminal ("termine") utilise par la logique de completion des widgets.
     * Les statuts reels proviennent de la colonne Choice `statut` (editable par
     * l'utilisateur dans Grist). DEFAULT_STATUSES n'est qu'un repli.
     * --------------------------------------------------------------------- */
    const DEFAULT_STATUSES = [
        { value: 'todo',       label: 'À faire',  fillColor: '#94a3b8', textColor: '#ffffff' },
        { value: 'inprogress', label: 'En cours', fillColor: '#f59e0b', textColor: '#ffffff' },
        { value: 'review',     label: 'En revue', fillColor: '#3b82f6', textColor: '#ffffff' },
        { value: 'done',       label: 'Terminé',  fillColor: '#10b981', textColor: '#ffffff' }
    ];
    // Repli libelle + couleur pour les CODES par defaut. Permet d'afficher un libelle
    // FR (et la bonne couleur) meme quand la colonne Choice stocke le code brut
    // (todo/inprogress/...). Une valeur renommee par l'utilisateur garde SON libelle.
    const DEFAULTS_BY_VALUE = {};
    for (var _i = 0; _i < DEFAULT_STATUSES.length; _i++) DEFAULTS_BY_VALUE[DEFAULT_STATUSES[_i].value] = DEFAULT_STATUSES[_i];

    // Convertit un tableau Grist colonnaire en tableau d'objets lignes.
    function columnarToRows(data) {
        if (!data || Array.isArray(data)) return data || [];
        const cols = Object.keys(data);
        if (!cols.length) return [];
        const n = (data[cols[0]] && data[cols[0]].length) || 0;
        const rows = [];
        for (let i = 0; i < n; i++) {
            const rec = {};
            for (const k of cols) rec[k] = data[k][i];
            rows.push(rec);
        }
        return rows;
    }

    // Resout le rowId d'une table depuis son tableId via _grist_Tables.
    async function tableRowId(grist, tableId) {
        const meta = columnarToRows(await grist.docApi.fetchTable('_grist_Tables'));
        const row = meta.find(r => r.tableId === tableId);
        return row ? row.id : null;
    }

    // Verifie si un type est une reference (Ref ou RefList)
    function isRefType(type) {
        return /^(Ref|RefList):/.test(String(type || ''));
    }

    // Extrait la table cible d'un type Ref ou RefList
    function getRefTarget(type) {
        const match = /^(?:Ref|RefList):(.+)$/.exec(String(type || ''));
        return match ? match[1] : null;
    }

    // Verifie si une colonne est une formule derivee
    function isFormulaColumn(tableName, colId, formulasMap) {
        if (!formulasMap || !formulasMap[tableName]) return false;
        return Boolean(formulasMap[tableName][colId]);
    }

    // Helper : délai
    function delay(ms) {
        return new Promise(function (resolve) {
            setTimeout(resolve, ms);
        });
    }

    // Attend que les metadonnees de toutes les tables soient disponibles
    async function waitForTablesMetadata(grist, expectedTableIds, options) {
        options = options || {};
        var maxAttempts = options.maxAttempts || 30;
        var baseDelay = options.baseDelay || 200;
        var attempt = 0;
        var missing = [];
        var unavailable = [];

        while (attempt < maxAttempts) {
            try {
                var tablesData = await grist.docApi.fetchTable('_grist_Tables');
                var tables = columnarToRows(tablesData);
                var tableIds = tables.map(function(t) { return t.tableId; });
                
                missing = [];
                unavailable = [];
                
                for (var i = 0; i < expectedTableIds.length; i++) {
                    var tableId = expectedTableIds[i];
                    
                    // Vérifier si la table existe dans _grist_Tables
                    if (tableIds.indexOf(tableId) === -1) {
                        missing.push(tableId);
                        continue;
                    }
                    
                    // Vérifier que fetchTable(tableId) réussit
                    try {
                        await grist.docApi.fetchTable(tableId);
                    } catch (e) {
                        unavailable.push(tableId);
                    }
                }
                
                if (missing.length === 0 && unavailable.length === 0) {
                    // Petit delai supplementaire pour stabilisation
                    await delay(300);
                    return { 
                        success: true, 
                        missing: [],
                        unavailable: [],
                        attempts: attempt + 1
                    };
                }
            } catch (e) {
                // Erreur globale, continuer a essayer
            }
            
            attempt++;
            if (attempt < maxAttempts) {
                await delay(baseDelay * Math.min(attempt, 5));
            }
        }

        return { 
            success: false, 
            missing: missing,
            unavailable: unavailable,
            error: 'Timeout after ' + attempt + ' attempts. Missing: ' + missing.join(', ') + '. Unavailable: ' + unavailable.join(', '),
            attempts: attempt
        };
    }

    // Construit une config de statuts normalisee depuis une liste brute.
    function buildStatusConfig(list, source) {
        const clean = (list || []).filter(s => s && s.value != null).map(s => {
            const v = String(s.value);
            const d = DEFAULTS_BY_VALUE[v];
            const hasExplicitLabel = s.label != null && s.label !== '' && String(s.label) !== v;
            return {
                value: v,
                label: hasExplicitLabel ? String(s.label) : (d ? d.label : v),
                fillColor: s.fillColor || (d ? d.fillColor : '#94a3b8'),
                textColor: s.textColor || (d ? d.textColor : '#ffffff')
            };
        });
        const final = clean.length ? clean : DEFAULT_STATUSES.slice();
        const byValue = {};
        for (const s of final) byValue[s.value] = s;
        return {
            list: final,
            byValue,
            values: final.map(s => s.value),
            terminalValue: final[final.length - 1].value, // convention "dernier = termine"
            firstValue: final[0].value,
            source: clean.length ? source : 'default'
        };
    }

    /* Lit les statuts (libelles + couleurs + ordre) depuis la colonne Choice
     * indiquee, via les metadonnees Grist. Repli en cascade :
     *   1. options de la colonne Choice (cas ideal)
     *   2. valeurs distinctes presentes dans les donnees (colonne Text)
     *   3. DEFAULT_STATUSES
     * Ne jette jamais : retourne toujours une config exploitable.
     */
    async function loadStatusConfig(grist, table, column, distinctFallback) {
        try {
            const tid = await tableRowId(grist, table);
            if (tid != null) {
                const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
                const col = cols.find(c => c.parentId === tid && c.colId === column);
                if (col && col.widgetOptions) {
                    let opt = {};
                    try { opt = JSON.parse(col.widgetOptions) || {}; } catch (e) { opt = {}; }
                    const choices = Array.isArray(opt.choices) ? opt.choices : [];
                    const co = opt.choiceOptions || {};
                    if (choices.length) {
                        return buildStatusConfig(choices.map(ch => ({
                            value: ch,
                            label: ch,
                            fillColor: co[ch] && co[ch].fillColor,
                            textColor: co[ch] && co[ch].textColor
                        })), 'choice');
                    }
                }
            }
        } catch (e) { /* repli silencieux */ }

        if (Array.isArray(distinctFallback) && distinctFallback.length) {
            const seen = [];
            for (const v of distinctFallback) { if (v != null && v !== '' && seen.indexOf(v) === -1) seen.push(v); }
            if (seen.length) return buildStatusConfig(seen.map(v => ({ value: v, label: v })), 'data');
        }
        return buildStatusConfig(DEFAULT_STATUSES.slice(), 'default');
    }

    function getStatus(cfg, value) {
        if (cfg && cfg.byValue && cfg.byValue[value]) return cfg.byValue[value];
        return { value: value, label: value || '', fillColor: '#94a3b8', textColor: '#ffffff' };
    }
    function isTerminal(cfg, value) { return !!cfg && value === cfg.terminalValue; }

    /* Seme les options (choix + couleurs) sur une colonne Choice si elle n'en a
     * pas encore. Defensif. A appeler depuis ensureSchema apres creation.
     * Retourne un resultat structure : { ok, changed, reason/error }
     */
    async function seedStatusChoices(grist, table, column, statuses) {
        try {
            const tid = await tableRowId(grist, table);
            if (tid == null) {
                return { ok: false, changed: false, reason: 'Table non trouvée: ' + table };
            }
            
            const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
            const col = cols.find(c => c.parentId === tid && c.colId === column);
            
            if (!col) {
                return { ok: false, changed: false, reason: 'Colonne non trouvée: ' + table + '.' + column };
            }
            
            let opt = {};
            try { opt = JSON.parse(col.widgetOptions || '{}') || {}; } catch (e) { opt = {}; }
            
            // Si deja configure, on respecte les personnalisations
            if (Array.isArray(opt.choices) && opt.choices.length) {
                return { ok: true, changed: false, reason: 'already-configured' };
            }
            
            const list = statuses && statuses.length ? statuses : DEFAULT_STATUSES;
            const choiceOptions = {};
            for (const s of list) choiceOptions[s.value] = { fillColor: s.fillColor, textColor: s.textColor };
            const widgetOptions = JSON.stringify({ choices: list.map(s => s.value), choiceOptions: choiceOptions });
            
            await grist.docApi.applyUserActions([['ModifyColumn', table, column, { widgetOptions: widgetOptions }]]);
            
            return { ok: true, changed: true, reason: null };
        } catch (e) {
            console.warn('TF.seedStatusChoices:', e && e.message);
            return { ok: false, changed: false, error: e.message || String(e) };
        }
    }

    /* ----- #2 : colonnes d'affichage des Ref (noms au lieu des IDs) ---------
     * Pose le visibleCol + la display formula sur des colonnes Ref pour que les
     * VUES NATIVES Grist affichent un libelle plutot que l'ID de ligne.
     * specs : [{ table:'Tasks', column:'projet', visibleColId:'nom' }, ...]
     * ROBUSTE : verifie les metadonnees, gere les erreurs, retourne un rapport.
     * --------------------------------------------------------------------- */
    async function setRefDisplayColumns(grist, specs) {
        var result = {
            ok: true,
            configured: [],
            alreadyCorrect: [],
            skipped: [],
            errors: []
        };

        if (!Array.isArray(specs) || !specs.length) {
            return result;
        }

        try {
            // Relire les metadonnees fraîches
            var tables = columnarToRows(await grist.docApi.fetchTable('_grist_Tables'));
            var cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
            
            var tidOf = function(tableId) {
                var r = tables.find(function(t) { return t.tableId === tableId; });
                return r ? r.id : null;
            };
            
            var colOf = function(tableRowId, colId) {
                return cols.find(function(c) { return c.parentId === tableRowId && c.colId === colId; });
            };

            for (var i = 0; i < specs.length; i++) {
                var s = specs[i];
                var srcTid = tidOf(s.table);
                
                if (srcTid == null) {
                    result.skipped.push({ table: s.table, column: s.column, reason: 'Table source non trouvée' });
                    continue;
                }
                
                var refCol = colOf(srcTid, s.column);
                if (!refCol) {
                    result.skipped.push({ table: s.table, column: s.column, reason: 'Colonne référence absente des métadonnées' });
                    result.ok = false;  // IMPORTANT : skipped = échec, pas ignoré
                    continue;
                }
                
                // Verifier que c'est bien une colonne Ref ou RefList
                var typeMatch = /^(?:Ref|RefList):(.+)$/.exec(refCol.type || '');
                if (!typeMatch) {
                    result.errors.push({
                        table: s.table,
                        column: s.column,
                        reason: 'Type incorrect: ' + (refCol.type || 'undefined') + ' (attendu Ref:*)'
                    });
                    result.ok = false;
                    continue;
                }
                
                // Table cible deduite du type
                var targetTid = tidOf(typeMatch[1]);
                if (targetTid == null) {
                    result.errors.push({
                        table: s.table,
                        column: s.column,
                        reason: 'Table cible non trouvée: ' + typeMatch[1]
                    });
                    result.ok = false;
                    continue;
                }
                
                var visCol = colOf(targetTid, s.visibleColId);
                if (!visCol) {
                    result.errors.push({
                        table: s.table,
                        column: s.column,
                        reason: 'Colonne visible non trouvée: ' + s.visibleColId
                    });
                    result.ok = false;
                    continue;
                }
                
                // Verifier si deja configure correctement
                var visibleColId = refCol.visibleCol;
                var displayColId = refCol.displayCol;
                
                // Verifier visibleCol (comparaison numerique)
                var visibleColIsCorrect = (Number(visibleColId) === Number(visCol.id));
                
                // Verifier display formula
                var displayFormula = '$' + s.column + '.' + s.visibleColId;
                var displayCol = displayColId ? cols.find(function(c) { return c.id === displayColId; }) : null;
                var displayFormulaIsCorrect = displayCol && displayCol.formula === displayFormula;
                
                if (visibleColIsCorrect && displayFormulaIsCorrect) {
                    result.alreadyCorrect.push({ table: s.table, column: s.column });
                    continue;
                }
                
                // Appliquer les corrections
                var actions = [];
                
                // Configurer la formule d'affichage
                actions.push(['SetDisplayFormula', s.table, null, s.column, displayFormula]);
                
                // Configurer le visibleCol
                actions.push(['UpdateRecord', '_grist_Tables_column', refCol.id, { visibleCol: visCol.id }]);
                
                try {
                    await grist.docApi.applyUserActions(actions);
                    result.configured.push({ table: s.table, column: s.column });
                } catch (e) {
                    result.errors.push({
                        table: s.table,
                        column: s.column,
                        reason: e.message || String(e)
                    });
                    result.ok = false;
                }
            }
            
            return result;
        } catch (e) {
            result.ok = false;
            result.errors.push({ reason: 'Erreur globale: ' + (e.message || String(e)) });
            return result;
        }
    }

    /* ----- #3 : plan de charge (heures par personne) ------------------------
     * Stockage : colonne Text `charges` sur Tasks, JSON [{teamId, heures}].
     * Parse defensif identique au pattern subtasks.
     * --------------------------------------------------------------------- */
    function parseCharges(v) {
        try {
            const a = JSON.parse(v || '[]');
            if (!Array.isArray(a)) return [];
            return a.filter(x => x && x.teamId != null)
                    .map(x => ({ teamId: Number(x.teamId), heures: Number(x.heures) || 0 }))
                    .filter(x => !isNaN(x.teamId));
        } catch (e) { return []; }
    }
    function chargesToJson(arr) {
        return JSON.stringify((arr || [])
            .filter(x => x && x.teamId != null)
            .map(x => ({ teamId: Number(x.teamId), heures: Number(x.heures) || 0 }))
            .filter(x => !isNaN(x.teamId)));
    }
    // Heures totales d'une tache (somme des charges par personne).
    function chargeTotal(charges) { return parseCharges(typeof charges === 'string' ? charges : JSON.stringify(charges || [])).reduce((s, c) => s + c.heures, 0); }
    // Agrege la charge par membre sur une liste de taches (chaque tache expose .charges).
    function chargeByMember(tasks) {
        const by = {};
        for (const t of (tasks || [])) {
            for (const c of parseCharges(t && t.charges)) {
                by[c.teamId] = (by[c.teamId] || 0) + c.heures;
            }
        }
        return by;
    }

    // Cle de periode : semaine ISO 'YYYY-Www' ou mois 'YYYY-MM'.
    function periodKey(date, granularity) {
        if (granularity === 'month') {
            return date.getUTCFullYear() + '-' + String(date.getUTCMonth() + 1).padStart(2, '0');
        }
        const d = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
        const day = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - day);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return d.getUTCFullYear() + '-W' + String(week).padStart(2, '0');
    }

    // #3 plan de charge temporel : etale les charges PROPRES de chaque tache sur sa
    // duree (jours calendaires), agrege par personne et par periode.
    // dateDebut/dateEcheance = timestamps Unix SECONDES (Grist). Tache sans dates ou
    // sans charge = ignoree. Retourne { teamId: { periodKey: heures } }.
    function chargeByMemberPeriod(tasks, granularity) {
        const g = granularity === 'month' ? 'month' : 'week';
        const out = {};
        for (const t of (tasks || [])) {
            const charges = parseCharges(t && t.charges);
            if (!charges.length) continue;
            const s = t.dateDebut, e = t.dateEcheance;
            if (s == null || e == null) continue;
            const day0 = Math.floor((s * 1000) / 86400000);
            const day1 = Math.floor((e * 1000) / 86400000);
            const nDays = Math.max(day1 - day0 + 1, 1);
            for (const c of charges) {
                const perDay = (Number(c.heures) || 0) / nDays;
                if (!perDay) continue;
                if (!out[c.teamId]) out[c.teamId] = {};
                for (let dd = day0; dd <= day1; dd++) {
                    const key = periodKey(new Date(dd * 86400000), g);
                    out[c.teamId][key] = (out[c.teamId][key] || 0) + perDay;
                }
            }
        }
        return out;
    }

    // Decale une date de n periodes (semaine = 7 jours, mois = 1 mois).
    function shiftPeriods(date, granularity, n) {
        const d = new Date(date.getTime());
        if (granularity === 'month') d.setUTCMonth(d.getUTCMonth() + n);
        else d.setUTCDate(d.getUTCDate() + n * 7);
        return d;
    }

    // Liste contigue de cles de periode (semaine ISO ou mois) a partir d'une date,
    // alignee sur le debut de periode (lundi / 1er du mois). Inclut les periodes vides.
    function periodRange(startDate, granularity, count) {
        const g = granularity === 'month' ? 'month' : 'week';
        let d = new Date(Date.UTC(startDate.getUTCFullYear(), startDate.getUTCMonth(), startDate.getUTCDate()));
        if (g === 'week') { const day = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() - day + 1); }
        else { d = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1)); }
        const out = [];
        for (let i = 0; i < count; i++) {
            out.push(periodKey(d, g));
            if (g === 'week') d.setUTCDate(d.getUTCDate() + 7);
            else d.setUTCMonth(d.getUTCMonth() + 1);
        }
        return out;
    }

    // chargeMatrix : generalise chargeByMemberPeriod. Etale les charges (via getCharges,
    // defaut parseCharges) sur la duree, agrege par cle keyFn(t, charge) et periode.
    function chargeMatrix(tasks, keyFn, granularity, getCharges, workdays) {
        const g = granularity === 'month' ? 'month' : 'week';
        const out = {};
        for (const t of (tasks || [])) {
            const charges = getCharges ? getCharges(t) : parseCharges(t && t.charges);
            if (!charges.length || t.dateDebut == null || t.dateEcheance == null) continue;
            const d0 = Math.floor((t.dateDebut * 1000) / 86400000), d1 = Math.floor((t.dateEcheance * 1000) / 86400000);
            const days = [];
            for (let dd = d0; dd <= d1; dd++) { if (workdays) { const wd = new Date(dd * 86400000).getUTCDay(); if (wd < 1 || wd > 5) continue; } days.push(dd); }
            if (!days.length) days.push(d0);
            for (const c of charges) {
                const key = keyFn(t, c); if (key == null) continue;
                const perDay = c.heures / days.length; if (!perDay) continue;
                if (!out[key]) out[key] = {};
                for (const dd of days) { const pk = periodKey(new Date(dd * 86400000), g); out[key][pk] = (out[key][pk] || 0) + perDay; }
            }
        }
        return out;
    }

    /* ----- #7 : respect des droits (ACL) ------------------------------------
     * Deux niveaux : (a) acces document lecture seule -> Grist passe
     * `readonly=true` dans l'URL de l'iframe ; (b) ACL au niveau ligne ->
     * l'acces widget peut etre `full` mais une ecriture sur une ligne donnee
     * est refusee par le serveur. safeApply absorbe ce refus proprement.
     * --------------------------------------------------------------------- */
    function _qp(name) { try { return new URLSearchParams(location.search).get(name); } catch (e) { return null; } }
    // Vrai si Grist a ouvert le widget en lecture seule (acces doc restreint).
    function isReadOnly() { return _qp('readonly') === 'true'; }
    // Niveau d'acces accorde au widget : 'full' | 'read table' | 'none' (defaut 'full').
    function accessLevel() { return _qp('access') || 'full'; }
    // Detecte un message d'erreur Grist correspondant a un refus de droits.
    function isAccessError(e) {
        const msg = (e && (e.message || e.toString())) || '';
        return /access denied|not allowed|permission|forbidden|read[- ]?only|cannot (modify|add|remove)|acl/i.test(msg);
    }
    // Applique des actions en absorbant un refus de droits.
    // Retourne { ok:true } ou { ok:false, denied:bool, message }. Ne fait PAS d'UI
