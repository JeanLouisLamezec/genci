            log('[GENCI seed] Tables vides — création données de démonstration...');

            // 2. Team
            if (context.tablesCreated && context.tablesCreated.indexOf('Team') !== -1) {

                    ['AddRecord', 'Team', null, { nom: 'Alice Martin', role: 'chef_de_projet', actif: true }]
                ]);

                var member2 = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Team', null, { nom: 'Bob Durant', role: 'membre', actif: true }]
                ]);

                // Mettre à jour les références
                if (createdIds.Entites && createdIds.Entites.dev) {
                    await grist.docApi.applyUserActions([
                        ['UpdateRecord', 'Team', createdIds.Team.alice, { entite: createdIds.Entites.dev }],
                        ['UpdateRecord', 'Team', createdIds.Team.bob, { entite: createdIds.Entites.dev, responsable: createdIds.Team.alice }]
                    ]);
                }
                
                seedEntries.push('Créé: Team (2)');
            }
            
            // 3. Programmes
            if (context.tablesCreated && context.tablesCreated.indexOf('Programmes') !== -1) {
                var programme = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Programmes', null, { nom: 'Transformation Digitale', couleur: '#4f46e5', actif: true }]
                ]);
                createdIds.Programmes = { digital: getAddedRecordId(programme, 'Programmes.Transformation') };
                seedEntries.push('Créé: Programmes (1)');
            }
            
            // 4. Competences
            if (context.tablesCreated && context.tablesCreated.indexOf('Competences') !== -1) {
                await grist.docApi.applyUserActions([
                    ['AddRecord', 'Competences', null, { nom: 'JavaScript', categorie: 'technique', actif: true }],
                    ['AddRecord', 'Competences', null, { nom: 'Python', categorie: 'technique', actif: true }],
                    ['AddRecord', 'Competences', null, { nom: 'Gestion de projet', categorie: 'fonctionnel', actif: true }]
                ]);
                seedEntries.push('Créé: Competences (3)');
            }
            
            // 5. KanbanSteps
            if (context.tablesCreated && context.tablesCreated.indexOf('KanbanSteps') !== -1) {
                await grist.docApi.applyUserActions([
                    ['AddRecord', 'KanbanSteps', null, { nom: 'À faire', valeur: 'todo', couleur: '#94a3b8', ordre: 0, actif: true }],
                    ['AddRecord', 'KanbanSteps', null, { nom: 'En cours', valeur: 'inprogress', couleur: '#f59e0b', ordre: 1, actif: true }],
                    ['AddRecord', 'KanbanSteps', null, { nom: 'En revue', valeur: 'review', couleur: '#3b82f6', ordre: 2, actif: true }],
                    ['AddRecord', 'KanbanSteps', null, { nom: 'Terminé', valeur: 'done', couleur: '#10b981', ordre: 3, actif: true }]
                ]);

            }
            
            return { seeded: true, ids: createdIds, log: seedEntries };
            
        } catch (e) {
            log('[GENCI seed] Erreur: ' + (e.message || e));
            return { seeded: false, error: e.message || String(e) };
        }
    }

    // ========================================================================
    // ORCHESTRATEUR PRINCIPAL
    // ========================================================================
    
    async function ensureGenciSchema(grist, options) {
        options = options || {};
        
        // Sérialise les appels dans une même iframe
        if (bootstrapPromise) {
            return bootstrapPromise;
        }
        
        if (bootstrapComplete && !options.force) {
            return Promise.resolve({ success: true, alreadyComplete: true });
        }
        
        bootstrapPromise = (async function () {
            var startTime = Date.now();
            var globalLog = [];
            var result = {
                success: false,
                phases: {},
                errors: [],
                warnings: []
            };
            
            try {
                log('Démarrage initialisation...');
                
                // Phase 0 : Exécuter les migrations puis inspection
                log('Phase 0: Migrations...');
                var migrationLog = await migrateLegacyTables(grist);
                globalLog = globalLog.concat(migrationLog);
                
                // Exécuter les migrations versionnées si TaskFlowMigrations est disponible
                if (global.TaskFlowMigrations) {
                    try {
                        var currentVersion = await global.TaskFlowMigrations.getCurrentVersion(grist);
                        log('Version actuelle du schéma: v' + currentVersion);
                        
                        var migrationResult = await global.TaskFlowMigrations.runMigrations(grist, currentVersion);
                        
                        if (migrationResult.success) {
                            log('Migrations appliquées: ' + migrationResult.applied + ' migrations, version finale: v' + migrationResult.finalVersion);
                            globalLog.push('Migrations: v' + currentVersion + ' → v' + migrationResult.finalVersion);
                            result.phases.migrations = migrationResult;
                        } else {
                            result.warnings.push({ phase: 'migrations', message: 'Certaines migrations ont échoué' });
                        }
                    } catch (migrationError) {
                        log('Erreur lors des migrations: ' + (migrationError.message || migrationError));
                        result.warnings.push({ phase: 'migrations', error: migrationError.message || String(migrationError) });
                        // Continuer malgré tout, le schéma déclaratif réparera
                    }
                }
                
                result.phases.migration = migrationLog;
                
                // Phase 1 : Création des tables (sans Ref)
                log('Phase 1: Création tables...');
                var phase1 = await ensureBaseTables(grist, SCHEMA, options.formulasMap || {});
                globalLog.push('Tables créées: ' + phase1.created.join(', '));
                result.phases.tables = phase1;
                
                // Synchronisation
                var allExpectedTables = SCHEMA.tableOrder.slice();
                var metadata = await syncMetadata(grist, allExpectedTables);
                result.phases.sync = { success: true };
                
                // Phase 2 : Colonnes Ref
                log('Phase 2: Colonnes Ref...');
                var phase2 = await ensureRefColumns(grist, SCHEMA, options.formulasMap || {});
                globalLog.push('Ref ajoutées: ' + phase2.added.join(', '));
                if (phase2.repaired.length > 0) {
                    globalLog.push('Ref réparées: ' + phase2.repaired.join(', '));
                }
                
                // Vérifier les erreurs de création des Ref
                if (phase2.errors.length > 0) {
                    result.errors.push({
                        phase: 'refs',
                        errors: phase2.errors
                    });
                    result.success = false;
                    log('Échec création des colonnes Ref, arrêt de l\'initialisation');
                    return result;
                }
                
                result.phases.refs = phase2;
                
                // Phase 2 : Colonnes Ref terminées (succès des AddColumn = confirmation)
                log('Phase 2: Colonnes Ref terminées (' + phase2.added.length + ' créées)');
                result.phases.refs = phase2;
                
                // Petite pause pour stabilisation Grist avant formules
                await delay(500);
                
                // Phase 3 : Formules
                if (options.formulasMap && Object.keys(options.formulasMap).length > 0) {
                    log('Phase 3: Formules...');
                    var phase3 = await ensureFormulaColumns(grist, options.formulasMap);
                    globalLog.push('Formules ajoutées: ' + phase3.added.join(', '));
                    result.phases.formulas = phase3;
                }
                
                // Phase 4 : Choices
                log('Phase 4: Choices...');
                var phase4 = await configureChoiceColumns(grist, options.defaultChoices || {});
                result.phases.choices = phase4;
                
                // Phase 5 : Affichage des références
                log('Phase 5: Affichage références...');
                var phase5 = await configureAllRefDisplays(grist, GENCI_REF_DISPLAY_SPECS);
                result.phases.display = phase5;
                
                if (!phase5.ok) {
                    result.warnings.push({ phase: 'display', errors: phase5.errors });
                }
                
                // Phase 6 : Seed (seulement si demandé explicitement)
                if (options.seedDemo === true) {
                    log('Phase 6: Seed de démonstration...');
                    var seedContext = { tablesCreated: phase1.created };
                    var phase6 = await seedInitialData(grist, seedContext);
                    result.phases.seed = phase6;
                    if (phase6.seeded) {
                        globalLog = globalLog.concat(phase6.log || []);
                    }
                    if (phase6.error) {
                        result.errors.push({ phase: 'seed', error: phase6.error });
                    }
                } else {
                    result.phases.seed = {
                        seeded: false,
                        reason: 'Seed de démonstration désactivé (options.seedDemo !== true)'
                    };
                }
                
                // Vérification finale
                log('Vérification finale...');
                
                // Délai de stabilisation avant validation
                await delay(300);
                
                // Relire les métadonnées fraîches
                metadata = await loadSchemaMetadata(grist);
                
                var requiredTables = ['Team', 'Programmes', 'Entites', 'Projects', 'Tasks', 'Actions'];
                var inspection = await inspectGenciSchema(grist, requiredTables, metadata);
                
                if (!inspection.ready) {
                    result.errors.push({
                        phase: 'validation',
                        missingTables: inspection.missingTables,
                        missingColumns: inspection.missingColumns,
                        invalidTypes: inspection.invalidColumnTypes
                    });
                    
                    // Ne pas considérer comme échec total si ce sont juste des visibleCol ou metadataPending
                    if (inspection.missingTables.length === 0 && inspection.missingColumns.length === 0) {
                        result.success = true;
                        result.warnings.push({ phase: 'validation', details: inspection });
                    } else {
                        result.success = false;
                    }
                } else {
                    result.success = true;
                }
                
                // Afficher le détail de la validation
                console.info(
                    '[GENCI validation]',
                    JSON.stringify({
                        ready: inspection.ready,
                        missingTables: inspection.missingTables,
                        missingColumns: inspection.missingColumns,
                        metadataPending: inspection.metadataPending,
                        invalidColumnTypes: inspection.invalidColumnTypes.length,
                        invalidRefTargets: inspection.invalidRefTargets.length,
                        invalidVisibleColumns: inspection.invalidVisibleColumns.length
                    }, null, 2)
                );
                
                // Afficher les warnings techniques
                if (result.warnings && result.warnings.length > 0) {
                    console.warn('[GENCI] Warnings:', result.warnings);
                }
                
                // Afficher les erreurs si échec
                if (!result.success && result.errors && result.errors.length > 0) {
                    console.error('[GENCI] Errors:', JSON.stringify(result.errors, null, 2));
                }
                
                // bootstrapComplete seulement si succès
                bootstrapComplete = result.success === true;
                var duration = Date.now() - startTime;
                log('Initialisation terminée (' + duration + 'ms)');
                result.duration = duration;
                result.log = globalLog;
                
                return result;
                
            } catch (e) {
                log('Échec initialisation: ' + (e.message || e));
                result.errors.push({ phase: 'global', error: e.message || String(e) });
                result.success = false;
                bootstrapComplete = false;
                throw e;
            } finally {
                bootstrapPromise = null;
            }
        })();
        
        return bootstrapPromise;
    }

    // Ancienne API pour compatibilité
    async function ensureSchema(grist, options) {
        return ensureGenciSchema(grist, options);
    }

    // Export public
    global.TaskFlowBootstrap = {
        ensureSchema: ensureSchema,
        ensureGenciSchema: ensureGenciSchema,
        inspectGenciSchema: inspectGenciSchema,
        loadSchemaMetadata: loadSchemaMetadata,
        reset: function () {
            bootstrapPromise = null;
            bootstrapComplete = false;
        },
        GENCI_REF_DISPLAY_SPECS: GENCI_REF_DISPLAY_SPECS
    };

})(typeof window !== 'undefined' ? window : (typeof global !== 'undefined' ? global : this));


/* ============================================================================
 * taskflow-migrations.js — Migrations versionnées du schéma TaskFlow
 * ----------------------------------------------------------------------------
 * Ce module gère les évolutions du schéma de manière contrôlée et réversible.
 * Chaque migration est :
 * - Idempotente (peut être réexécutée sans effet secondaire)
 * - Non destructive (ne supprime jamais de données)
 * - Testable indépendamment
 * 
 * Version 1: Schéma de base
 * Version 2: TaskAssignments + extension quotidienne de TimeEntries
 * Version 3: MemberDailyCapacities + TimeEntries.capaciteJour
 * ============================================================================ */

(function (global) {
    'use strict';

    var SCHEMA = global.TASKFLOW_SCHEMA;
    var DEFAULT_WEEKLY_CAPACITY = 35;

    // Helper : délai
    function delay(ms) {
        return new Promise(function (resolve) { setTimeout(resolve, ms); });
    }

    // Helper : log
    function log(msg, data) {
        var prefix = '[TaskFlow Migration] ';
        if (typeof console !== 'undefined') {
            if (data !== undefined) {
                console.info(prefix + msg, data);
            } else {
                console.info(prefix + msg);
            }
        }
    }

    // Helper : convertir tableau colonnaire en lignes
    function columnarToRows(data) {
        if (!data || Array.isArray(data)) return data || [];
        var cols = Object.keys(data);
        if (!cols.length) return [];
        var n = (data[cols[0]] && data[cols[0]].length) || 0;
        var rows = [];
        for (var i = 0; i < n; i++) {
            var rec = {};
            for (var j = 0; j < cols.length; j++) {
                rec[cols[j]] = data[cols[j]][i];
            }
            rows.push(rec);
        }
        return rows;
    }

    // Helper : obtenir docApi normalisé
    function getDocApi(grist) {
        var docApi = grist && (grist.docApi || grist);
        if (!docApi || typeof docApi.fetchTable !== 'function' || typeof docApi.applyUserActions !== 'function') {
            throw new Error('INVALID_GRIST_DOC_API: grist.docApi doit exposer fetchTable et applyUserActions');
        }
        return docApi;
    }

    // Helper : charger les métadonnées
    async function loadMigrationMetadata(grist) {
        var docApi = getDocApi(grist);
        var tablesData = await docApi.fetchTable('_grist_Tables');
        var columnsData = await docApi.fetchTable('_grist_Tables_column');
        
        var tables = columnarToRows(tablesData);
        var columns = columnarToRows(columnsData);
        
        var tableById = {};
        for (var i = 0; i < tables.length; i++) {
            tableById[tables[i].id] = tables[i].tableId;
        }
        
        var columnsByKey = {};
        for (var j = 0; j < columns.length; j++) {
            var col = columns[j];

            }
        }

    // Exécute toutes les migrations en attente
    async function runMigrations(grist, currentVersion, options) {
        options = options || {};
        var nowUnixSeconds = options.nowUnixSeconds || Math.floor(Date.now() / 1000);
        
        var pending = getPendingMigrations(currentVersion);
        
        if (pending.length === 0) {
            log('Aucune migration en attente');
            return {
                success: true,
                applied: 0,
                message: 'Schéma à jour',
                finalVersion: currentVersion
            };
        }
        
        log('Migrations en attente: ' + pending.length, pending.map(function (m) { return m.name; }));
        
        var results = [];
        var metadata = null;
        var lastSuccessfulVersion = currentVersion;
        var docApi = getDocApi(grist);
        
        for (var i = 0; i < pending.length; i++) {
            var migration = pending[i];
            
            try {
                log('Application migration: ' + migration.name + ' (v' + migration.version + ')');
                
                // Relit les métadonnées avant chaque migration
                try {
                    metadata = await loadMigrationMetadata(grist);
                } catch (e) {
                    metadata = { tablesByName: {}, columnsByKey: {} };
                }
                
                // Exécute la migration
                var result = await migration.run(grist, metadata);
                
                if (!result || !result.success) {
                    throw new Error('Migration échouée: ' + migration.name);
                }
                
                results.push({
                    version: migration.version,
                    name: migration.name,
                    success: true,
                    message: result.message
                });
                
                // Met à jour la version courante après succès
                lastSuccessfulVersion = migration.version;
                
                // Mettre à jour TaskFlow_Meta
                await updateSchemaVersion(grist, lastSuccessfulVersion, migration.name, nowUnixSeconds);
                
                log('Migration appliquée: ' + migration.name + ' - version mise à jour: ' + lastSuccessfulVersion);

                    version: migration.version,
                    name: migration.name,
                    success: false,
                    error: e.message || String(e)

                // Arrête au premier échec

            }
        }
        
        return {

        let guard = 0;
        while (cur && guard++ < 128) {
            if (seen.has(cur.id)) { cycleIds.add(t.id); break; }
            seen.add(cur.id);
            cur = cur.parentTask ? tasks.find(x => x.id === cur.parentTask) : null;
        }
    }
    if (cycleIds.size) console.warn('WBS: cycles detected on task ids:', [...cycleIds]);
    for (const t of tasks) {
        const pid = t.parentTask;
        if (pid && !isNaN(pid) && !cycleIds.has(t.id)) {

                ${team.filter(m=>m.actif!==false).map(m => `<span class="filter-check ${filters.assignes.includes(String(m.id))?'active':''}" onclick="toggleFilterAssigne(${m.id})">${escapeHtml(m.nom)}</span>`).join('')}
            </div>
        </div>`;
    html += `
        <div class="filter-section">
            <div class="filter-section-label">Statut</div>
            <div class="filter-checkboxes">
                ${statusCfg.list.map(s => `<span class="filter-check ${filters.statuts.includes(s.value)?'active':''}" onclick="toggleFilterStatut('${s.value}')">${s.label}</span>`).join('')}
            </div>
        </div>`;
    if (hasActiveFilters()) html += `<div class="filter-section" style="justify-content:flex-end"><button class="filter-clear" onclick="clearFilters()">Réinitialiser</button></div>`;
    document.getElementById('filterPanel').innerHTML = html;
}

function renderFilterChips() {
    const chips = [];
    if (filters.periode!=='all') { const labels={week:'Semaine',month:'Mois',quarter:'Trimestre'}; chips.push(`<span class="filter-chip">${labels[filters.periode]}<button title="Retirer" onclick="setPeriode('all')">×</button></span>`); }
    filters.projets.forEach(id => { const p=projects.find(x=>String(x.id)===id); if(p) chips.push(`<span class="filter-chip"><span class="fc-dot" style="background:${p.couleur||'#6366f1'}"></span>${escapeHtml(p.nom)}<button title="Retirer" onclick="toggleFilterProjet(${p.id})">×</button></span>`); });
    filters.assignes.forEach(id => { const m=team.find(x=>String(x.id)===id); if(m) chips.push(`<span class="filter-chip">${escapeHtml((m.nom||'').split(' ')[0])}<button title="Retirer" onclick="toggleFilterAssigne(${m.id})">×</button></span>`); });
    filters.statuts.forEach(v => { const sc=TF.getStatus(statusCfg,v); chips.push(`<span class="filter-chip"><span class="fc-dot" style="background:${sc.fillColor}"></span>${sc.label}<button title="Retirer" onclick="toggleFilterStatut('${v}')">×</button></span>`); });
    const total = (filters.periode!=='all'?1:0) + filters.projets.length + filters.assignes.length + filters.statuts.length;
    const cnt = document.getElementById('filterCount'); if (cnt) { cnt.textContent = total; cnt.style.display = total ? 'inline-flex' : 'none'; }
    const ftb = document.getElementById('filterToggleBtn'); if (ftb) ftb.classList.toggle('active', total>0);
    const host = document.getElementById('headerFilters');
    host.style.display = chips.length ? 'flex' : 'none';
    host.innerHTML = chips.length ? ('<span class="hf-label">Filtres actifs</span>' + chips.join('') + '<span class="hf-clear" onclick="clearFilters()">Tout effacer</span>') : '';
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODE ÉDITION
// ═══════════════════════════════════════════════════════════════════════════════
function toggleEditMode() {
    isEditMode = !isEditMode;
    selectedCompId = null;
    document.getElementById('editPanel').classList.toggle('open', isEditMode);
    document.getElementById('main').classList.toggle('panel-open', isEditMode);
    document.getElementById('editToggleBtn').classList.toggle('active', isEditMode);
    render();
    if (isEditMode) renderEditPanel();
}

function selectComponent(id, e) {
    if (e) e.stopPropagation();
    selectedCompId = (selectedCompId === id) ? null : id;
    renderGrid();
    renderEditPanel();
}

function setSpan(id, span, e) {
    if (e) e.stopPropagation();
    const c = dashConfig.layout.find(x=>x.id===id);
    if (c) { c.colSpan = span; renderGrid(); renderEditPanel(); saveConfig(); }
}

function removeComponent(id, e) {
    if (e) e.stopPropagation();
    dashConfig.layout = dashConfig.layout.filter(x=>x.id!==id);
    if (selectedCompId===id) selectedCompId = null;
    renderGrid(); renderEditPanel(); saveConfig();
}

function addComponent(type) {
    const id = 'c' + (++_compIdCounter);
    const def = CATALOG[type];
    const defaults = { kpi:{ metric:'total' }, donut:{ groupBy:'statut' }, bars:{ groupBy:'statut' }, list:{ preset:'all', limit:10 }, upcoming:{ horizon:14 }, velocity:{ weeks:6 }, workload:{}, projects:{} };
    dashConfig.layout.push({ id, type, colSpan: def.defaultSpan, title: def.label, config: { ...defaults[type] } });
    selectedCompId = id;
    renderGrid(); renderEditPanel(); saveConfig();
    // scroll to bottom
    document.getElementById('dashboardGrid').lastElementChild?.scrollIntoView({ behavior:'smooth' });
}

let _titleTimer = null;
function updateCompTitle(id, val) {
    const c = dashConfig.layout.find(x=>x.id===id);
    if (!c) return;
    c.title = val;
    clearTimeout(_titleTimer);
    _titleTimer = setTimeout(() => { renderGrid(); saveConfig(); }, 300);
}

function updateCompConfig(id, key, val, e) {
    if (e) e.stopPropagation();
    const c = dashConfig.layout.find(x=>x.id===id);
    if (!c) return;
    c.config[key] = val;
    renderGrid(); renderEditPanel(); saveConfig();
}

function updateCompFilterField(id, field, e) {
    if (e) e.stopPropagation();
    const c = dashConfig.layout.find(x=>x.id===id);
    if (!c) return;
    c.config.compFilter = { field, value: '' };
    renderGrid(); renderEditPanel(); saveConfig();
}

function updateCompFilterValue(id, value, e) {
    if (e) e.stopPropagation();
    const c = dashConfig.layout.find(x=>x.id===id);
    if (!c) return;
    if (!c.config.compFilter) c.config.compFilter = { field:'', value:'' };
    c.config.compFilter.value = value;
    renderGrid(); renderEditPanel(); saveConfig();
}

function getFilterValueOptions(field) {
    if (field==='statut')   return statusCfg.list.map(s=>[s.value, s.label]);
    if (field==='priorite') return Object.entries(PRIORITY_LABELS);
    if (field==='projet')   return projects.map(p => [String(p.id), p.nom]);
    if (field==='type')     return [['tache','Tâche'],['jalon','Jalon'],['reunion','Réunion']];
    return [];
}

function renderEditPanel() {
    const body = document.getElementById('editPanelBody');
    if (!body) return;

    // ── Composants actifs — accordéon inline ──
    const accordionItems = dashConfig.layout.map(c => {
        const isOpen = c.id === selectedCompId;
        const cfgFields = CONFIG_FIELDS[c.type] || [];
        const cf = c.config.compFilter || { field:'', value:'' };
        const valueOpts = getFilterValueOptions(cf.field);

        const configBody = isOpen ? `<div class="accordion-body">
            <div class="cfg-row">
                <div class="cfg-label">Titre</div>
                <input class="cfg-input" type="text" value="${escapeHtml(c.title)}" oninput="updateCompTitle('${c.id}',this.value)" />
            </div>
            ${cfgFields.map(f => `
            <div class="cfg-row">
                <div class="cfg-label">${f.label}</div>
                <select class="cfg-input" onchange="updateCompConfig('${c.id}','${f.key}',this.value,event)">
                    ${f.options.map(([v,l]) => `<option value="${v}" ${String(c.config[f.key])===String(v)?'selected':''}>${l}</option>`).join('')}
                </select>
            </div>`).join('')}
            <div class="cfg-row">
                <div class="cfg-label">Filtre composant</div>
                <select class="cfg-input" onchange="updateCompFilterField('${c.id}',this.value,event)">
                    ${FILTER_FIELDS.map(([v,l]) => `<option value="${v}" ${cf.field===v?'selected':''}>${l}</option>`).join('')}
                </select>
                ${cf.field ? `<select class="cfg-input" style="margin-top:4px" onchange="updateCompFilterValue('${c.id}',this.value,event)">
                    ${valueOpts.map(([v,l]) => `<option value="${v}" ${String(cf.value)===String(v)?'selected':''}>${l}</option>`).join('')}
                </select>` : ''}
            </div>
        </div>` : '';

        return `<div class="accordion-item ${isOpen ? 'open' : ''}">
            <div class="accordion-header" onclick="selectComponent('${c.id}',event)">
                <span class="accordion-chevron">▶</span>
                <span class="accordion-label">${escapeHtml(c.title)}</span>
                <div class="edit-controls" onclick="event.stopPropagation()">
                    <div class="span-btns">${[1,2,3,4].map(n=>`<button class="span-btn ${c.colSpan===n?'active':''}" onclick="setSpan('${c.id}',${n},event)">${n}</button>`).join('')}</div>
                    <button class="btn-icon danger" onclick="removeComponent('${c.id}',event)" title="Supprimer">×</button>
                </div>
            </div>
            ${configBody}
        </div>`;
    }).join('');

    // ── Catalogue ──
    const CATALOG_LABELS = {
        kpi:'KPI', donut:'Donut', bars:'Barres', list:'Liste',
        workload:'Équipe', charge:'Charge (h)', plancharge:'Plan de charge', upcoming:'Échéances', projects:'Projets', velocity:'Vélocité'
    };
    const catalogItems = Object.keys(CATALOG).map(type => `
        <div class="catalog-item" onclick="addComponent('${type}')">
            <div class="catalog-label" style="font-size:0.79rem;font-weight:600">${CATALOG_LABELS[type]}</div>
        </div>`).join('');

    body.innerHTML = `
        <div class="edit-section">
            <div class="edit-section-hdr">Composants actifs</div>
            <div class="accordion">${accordionItems}</div>
        </div>
        <div class="edit-section">
            <div class="edit-section-hdr">+ Ajouter</div>
            <div class="edit-section-body">
                <div class="catalog-grid">${catalogItems}</div>
            </div>
        </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER GRID
// ═══════════════════════════════════════════════════════════════════════════════
function renderGrid() {
    const grid = document.getElementById('dashboardGrid');
    grid.innerHTML = '';
    grid.className = 'dashboard-grid' + (isEditMode ? ' edit-mode' : '');
    dashConfig.layout.forEach(comp => grid.appendChild(createComp(comp)));
}

function createComp(comp) {
    const div = document.createElement('div');
    div.className = 'component' + (isEditMode && selectedCompId===comp.id ? ' selected' : '');
    div.dataset.span = comp.colSpan;
    div.dataset.id = comp.id;

    const cf = comp.config.compFilter;
    const hasCF = cf && cf.field && cf.value;
    const cfLabel = hasCF ? ` <span class="comp-filter-badge">${cf.field}=${cf.value}</span>` : '';

    const editControls = isEditMode ? `
        <div class="edit-controls" onclick="event.stopPropagation()">
            <div class="span-btns">${[1,2,3,4].map(n=>`<button class="span-btn ${comp.colSpan===n?'active':''}" onclick="setSpan('${comp.id}',${n},event)">${n}</button>`).join('')}</div>
            <button class="btn-icon ${selectedCompId===comp.id?'active':''}" onclick="selectComponent('${comp.id}',event)" title="Configurer">⚙</button>
            <button class="btn-icon danger" onclick="removeComponent('${comp.id}',event)" title="Supprimer">×</button>
        </div>` : '';

    const ft = getFilteredTasks(hasCF ? cf : null, comp.type === 'charge' || comp.type === 'plancharge');

    div.innerHTML = `
        <div class="comp-header">
            <div class="comp-title-wrap">
                <span class="comp-title">${escapeHtml(comp.title)}</span>${cfLabel}
            </div>
            ${editControls}
        </div>
        <div class="comp-body">${renderCompBody(comp, ft)}</div>`;

    if (isEditMode) div.addEventListener('click', () => selectComponent(comp.id));
    return div;
}

function renderCompBody(comp, ft) {
    switch (comp.type) {
        case 'kpi':      return renderKPI(comp, ft);
        case 'donut':    return renderDonut(comp, ft);
        case 'bars':     return renderBars(comp, ft);
        case 'list':     return renderList(comp, ft);
        case 'workload': return renderWorkload(comp, ft);
        case 'charge':   return renderCharge(comp, ft);
        case 'plancharge': return renderPlanCharge(comp, ft);
        case 'upcoming': return renderUpcoming(comp, ft);
        case 'projects': return renderProjects(comp, ft);
        case 'velocity': return renderVelocity(comp, ft);
        default: return '<div class="empty-state"><div class="empty-text">Type inconnu</div></div>';
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDERERS
// ═══════════════════════════════════════════════════════════════════════════════
function renderKPI(comp, ft) {
    const metric = comp.config.metric || 'total';
    const today = new Date(); today.setHours(0,0,0,0);
    const weekStart = startOfWeek(today);
    let value = 0, label = '';
    switch (metric) {
        case 'total':     value = ft.length;                                                                            label = 'tâches au total'; break;
        case 'inprogress':value = ft.filter(t=>!TF.isTerminal(statusCfg, getStatus(t))).length;                                           label = 'tâches actives'; break;
        case 'done':      value = ft.filter(t=>TF.isTerminal(statusCfg, getStatus(t))).length;                                           label = 'tâches terminées'; break;
        case 'done_week': value = ft.filter(t=>TF.isTerminal(statusCfg, getStatus(t)) && gristToDate(t.dateEcheance)>=weekStart).length; label = 'terminées cette semaine'; break;
        case 'late':      value = ft.filter(t=>{ const d=gristToDate(t.dateEcheance); return d&&d<today&&!TF.isTerminal(statusCfg, getStatus(t)); }).length; label = 'en retard'; break;
        case 'rate':      { const done=ft.filter(t=>TF.isTerminal(statusCfg, getStatus(t))).length; value=ft.length?Math.round(done/ft.length*100):0; label='% complété'; break; }
    }
    const cls = { total:'kpi-total', inprogress:'kpi-inprogress', done:'kpi-done', done_week:'kpi-done_week', late:'kpi-late', rate:'kpi-rate' }[metric]||'';
    const lateClass = metric==='late'&&value>0 ? 'kpi-late-border' : '';
    if (lateClass) setTimeout(()=>{ const el=document.querySelector(`[data-id="${comp.id}"]`); if(el) el.classList.add(lateClass); },0);
    return `<div class="${cls}"><div class="kpi-value">${metric==='rate'?value+'%':value}</div><div class="kpi-label">${label}</div></div>`;
}

function groupByField(ft, field) {
    const counts = {};
    ft.forEach(t => {
        if (field==='assignee') { getAssigneesArray(t).forEach(a=>{ counts[String(a)]=(counts[String(a)]||0)+1; }); return; }
        let key;
        if (field==='statut')   key = getStatus(t);
        else if (field==='priorite') key = String(getPriority(t));
        else if (field==='projet')   key = String(t.projet||'');
        else if (field==='type')     key = t.type||'tache';
        if (key!==undefined) counts[key]=(counts[key]||0)+1;
    });
    if (field==='statut')   return statusCfg.list.map(s=>({ key:s.value, label:s.label, count:counts[s.value]||0, color:s.fillColor }));
    if (field==='priorite') return [1,2,3,4].map(k=>({ key:String(k), label:PRIORITY_LABELS[k], count:counts[String(k)]||0, color:PRIORITY_COLORS[k] }));
    if (field==='projet')   return projects.filter(p=>counts[String(p.id)]).map(p=>({ key:String(p.id), label:p.nom, count:counts[String(p.id)]||0, color:p.couleur||'#6366f1' }));
    if (field==='type')     return [['tache','Tâche','#3b82f6'],['jalon','Jalon','#f59e0b'],['reunion','Réunion','#10b981']].map(([k,l,c])=>({ key:k, label:l, count:counts[k]||0, color:c }));
    if (field==='assignee') return team.filter(m=>counts[String(m.id)]).map(m=>({ key:String(m.id), label:(m.nom||'?').split(' ')[0], count:counts[String(m.id)]||0, color:m.couleur||'#4f46e5' }));
    return [];
}

function renderDonut(comp, ft) {
    const groups = groupByField(ft, comp.config.groupBy||'statut').filter(g=>g.count>0);
    if (!groups.length) return '<div class="empty-state"><div class="empty-text">Aucune donnée</div></div>';
    const total = ft.length||1;
    const R=56, C=2*Math.PI*R;
    let offset=0, paths='', legend='';
    groups.forEach(g => {
        const len=(g.count/total)*C;
        paths+=`<circle cx="70" cy="70" r="${R}" fill="none" stroke="${g.color}" stroke-width="18" stroke-dasharray="${len} ${C}" stroke-dashoffset="${-offset}"/>`;
        offset+=len;
        legend+=`<div class="legend-item"><span class="legend-dot" style="background:${g.color}"></span><span>${escapeHtml(g.label)}</span><span class="legend-value">${g.count}</span></div>`;
    });
    return `<div class="donut-wrap">
        <div class="donut-chart" style="width:140px;height:140px">
            <svg width="140" height="140">${paths}</svg>
            <div class="donut-center"><div class="donut-center-value">${ft.length}</div><div class="donut-center-label">tâches</div></div>
        </div>
        <div class="donut-legend">${legend}</div>
    </div>`;
}

function renderBars(comp, ft) {
    const groups = groupByField(ft, comp.config.groupBy||'statut');
    const max = Math.max(...groups.map(g=>g.count), 1);
    return `<div class="bar-chart">${groups.map(g => `
        <div class="bar-row">
            <div class="bar-label">${escapeHtml(g.label)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(g.count/max*100)}%;background:${g.color}"><span>${g.count}</span></div></div>
        </div>`).join('')}</div>`;
}

function renderWorkload(comp, ft) {
    if (!team.length) return '<div class="empty-state"><div class="empty-icon">◑</div><div class="empty-text">Aucun membre Team</div></div>';
    // resout une valeur d'assigne (id numerique OU nom) vers un id de membre Team — robustesse des formats
    const resolveMember = v => { const m = team.find(x => String(x.id)===String(v) || (x.nom && x.nom.toLowerCase()===String(v).trim().toLowerCase())); return m ? m.id : null; };
    const byAssignee = {};
    ft.forEach(t => {
        getAssigneesArray(t).forEach(a => {
            const id = resolveMember(a); if (id == null) return;
            if (!byAssignee[id]) byAssignee[id]={ total:0, active:0 };
            byAssignee[id].total++;
            if (!TF.isTerminal(statusCfg, getStatus(t))) byAssignee[id].active++;
        });
    });
    const maxActive = Math.max(...team.map(m=>(byAssignee[m.id]||{}).active||0), 1);
    const members = team.filter(m=>m.actif!==false);
    if (!members.length) return '<div class="empty-state"><div class="empty-text">Aucun membre actif</div></div>';
    return `<div class="workload-list">${members.map(m => {
        const d=byAssignee[m.id]||{total:0,active:0};
        const pct=Math.round(d.active/maxActive*100);
        const lvl=d.active>5?'high':d.active>3?'medium':'';
        const ini=(m.nom||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
        return `<div class="workload-item">
            <div class="workload-avatar" style="background:${m.couleur||'#4f46e5'}">${ini}</div>
            <div class="workload-info"><div class="workload-name">${escapeHtml(m.nom)}</div><div class="workload-tasks">${d.active} active${d.active>1?'s':''} / ${d.total} total</div></div>
            <div class="workload-bar"><div class="workload-bar-fill ${lvl}" style="width:${pct}%"></div></div>
        </div>`;
    }).join('')}</div>`;
}

// #3 : charge par personne (somme des heures allouees via Tasks.charges)
function renderCharge(comp, ft) {
    if (!team.length) return '<div class="empty-state"><div class="empty-icon">◔</div><div class="empty-text">Aucun membre Team</div></div>';
    const byMember = TF.chargeByMember(ft); // { teamId: heures }
    const members = team.filter(m=>m.actif!==false);
    if (!members.length) return '<div class="empty-state"><div class="empty-text">Aucun membre actif</div></div>';
    const maxH = Math.max(...members.map(m=>byMember[m.id]||0), 1);
    const totalH = members.reduce((s,m)=>s+(byMember[m.id]||0),0);
    return `<div class="workload-list">${members.map(m => {
        const h = byMember[m.id]||0;
        const pct = Math.round(h/maxH*100);
        const lvl = h>40?'high':h>20?'medium':'';
        const ini=(m.nom||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
        return `<div class="workload-item">
            <div class="workload-avatar" style="background:${m.couleur||'#4f46e5'}">${ini}</div>
            <div class="workload-info"><div class="workload-name">${escapeHtml(m.nom)}</div><div class="workload-tasks">${h} h allouée${h>1?'s':''}</div></div>
            <div class="workload-bar"><div class="workload-bar-fill ${lvl}" style="width:${pct}%"></div></div>
        </div>`;
    }).join('')}<div style="margin-top:8px;font-size:0.78rem;color:var(--text-muted);text-align:right">Total : <strong>${totalH}</strong> h</div></div>`;
}

// #3 plan de charge temporel — grille personne × période (semaine/mois) avec taux vs capacité
// État éphémère (non persisté) du décalage de fenêtre temporelle, par composant.
let planChargeOffset = {};
function planChargeShift(id, delta) { planChargeOffset[id] = (planChargeOffset[id] || 0) + delta; renderGrid(); }
function planChargeReset(id) { planChargeOffset[id] = 0; renderGrid(); }

function renderPlanCharge(comp, ft) {
    if (!team.length) return '<div class="empty-state"><div class="empty-icon">▦</div><div class="empty-text">Aucun membre Team</div></div>';
    const members = team.filter(m => m.actif !== false);
    if (!members.length) return '<div class="empty-state"><div class="empty-text">Aucun membre actif</div></div>';
    const granularity = comp.config.granularity === 'month' ? 'month' : 'week';
    const horizon = parseInt(comp.config.horizon) || 8;
    const includeDone = comp.config.includeDone === 'oui';
    const defaultCap = parseFloat(comp.config.capacite) || 35;
    let planTasks = ft;
    if (!includeDone) planTasks = planTasks.filter(t => !TF.isTerminal(statusCfg, getStatus(t)));
    const byMP = TF.chargeByMemberPeriod(planTasks, granularity);
    const undated = planTasks.filter(t => TF.parseCharges(t.charges).length && (t.dateDebut == null || t.dateEcheance == null)).length;
    if (!Object.keys(byMP).length && !undated) return '<div class="empty-state"><div class="empty-icon">▦</div><div class="empty-text">Aucune charge datée à planifier</div><div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">Renseignez la charge par personne + des dates sur les tâches.</div></div>';
    const offset = planChargeOffset[comp.id] || 0;
    const periods = TF.periodRange(TF.shiftPeriods(new Date(), granularity, offset), granularity, horizon);
    const nowKey = TF.periodKey(new Date(), granularity);
    const capWeek = (m) => (Number(m.capaciteHebdo) > 0 ? Number(m.capaciteHebdo) : defaultCap);
    const capPer = (m) => granularity === 'month' ? capWeek(m) * 52 / 12 : capWeek(m);
    const plabel = (p) => granularity === 'month' ? (p.slice(5) + '/' + p.slice(2, 4)) : ('S' + p.slice(6));
    const cellColor = (h, cap) => { const r = cap > 0 ? h / cap : 0; return r > 1 ? '#e5484d' : r > 0.85 ? '#f59e0b' : r > 0 ? '#3b82f6' : 'transparent'; };
    const navBtn = 'background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:1px 9px;cursor:pointer;font-size:0.8rem';
    let html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><button onclick="planChargeShift(\'' + comp.id + '\',-1)" style="' + navBtn + '">◀</button><span style="font-size:0.74rem;color:var(--text-muted)">' + plabel(periods[0]) + ' → ' + plabel(periods[periods.length - 1]) + '</span><button onclick="planChargeShift(\'' + comp.id + '\',1)" style="' + navBtn + '">▶</button>' + (offset !== 0 ? '<button onclick="planChargeReset(\'' + comp.id + '\')" style="' + navBtn + ';font-size:0.72rem">Aujourd\'hui</button>' : '') + '</div>';
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.74rem"><thead><tr><th style="text-align:left;padding:4px 8px;color:var(--text-muted);font-weight:600">Membre</th>';
    for (const p of periods) html += '<th style="padding:4px 6px;text-align:center;font-weight:600;color:' + (p === nowKey ? 'var(--primary,#6366f1)' : 'var(--text-muted)') + '">' + plabel(p) + (p === nowKey ? ' •' : '') + '</th>';
    html += '</tr></thead><tbody>';
    for (const m of members) {
        const cap = capPer(m);
        html += '<tr><td style="padding:4px 8px;white-space:nowrap;border-top:1px solid var(--border)">' + escapeHtml(m.nom) + ' <span style="color:var(--text-muted);font-size:0.7rem">(' + Math.round(cap) + 'h)</span></td>';
        for (const p of periods) {
            const h = Math.round(((byMP[m.id] || {})[p] || 0) * 10) / 10;
            const col = cellColor(h, cap);
            const pct = cap > 0 ? Math.round(h / cap * 100) : 0;
            html += '<td style="padding:3px 4px;text-align:center;border-top:1px solid var(--border)">' + (h > 0 ? '<div style="background:' + col + ';color:#fff;border-radius:4px;padding:2px 4px;font-weight:600;min-width:26px;display:inline-block" title="' + pct + '% de la capacité">' + h + '</div>' : '<span style="color:var(--text-muted)">·</span>') + '</td>';
        }
        html += '</tr>';
    }
    html += '</tbody></table></div>';
    html += '<div style="margin-top:8px;display:flex;gap:14px;font-size:0.72rem;color:var(--text-muted);flex-wrap:wrap"><span><span style="display:inline-block;width:10px;height:10px;background:#3b82f6;border-radius:2px;vertical-align:middle"></span> charge OK</span><span><span style="display:inline-block;width:10px;height:10px;background:#f59e0b;border-radius:2px;vertical-align:middle"></span> &gt; 85% capacité</span><span><span style="display:inline-block;width:10px;height:10px;background:#e5484d;border-radius:2px;vertical-align:middle"></span> surcharge</span><span>· = aucune charge</span></div>';
    if (undated) html += '<div style="margin-top:6px;font-size:0.72rem;color:#f59e0b">&#9888; ' + undated + ' tâche' + (undated > 1 ? 's' : '') + ' chargée' + (undated > 1 ? 's' : '') + ' sans dates — non planifiée' + (undated > 1 ? 's' : '') + '.</div>';
    return html;
}

function renderUpcoming(comp, ft) {
    const horizon = parseInt(comp.config.horizon)||14;
    const today = new Date(); today.setHours(0,0,0,0);
    const upcoming = ft.filter(t => {
        const d=gristToDate(t.dateEcheance);
        if (!d || TF.isTerminal(statusCfg, getStatus(t))) return false;
        return Math.ceil((d-today)/86400000) <= horizon;
    }).map(t => ({ t, d:gristToDate(t.dateEcheance), days:Math.ceil((gristToDate(t.dateEcheance)-today)/86400000) }))
      .sort((a,b)=>a.d-b.d).slice(0,8);
    if (!upcoming.length) return '<div class="empty-state"><div class="empty-icon">◷</div><div class="empty-text">Aucune échéance proche</div></div>';
    return `<div class="upcoming-list">${upcoming.map(({t,d,days}) => {
        const p=getPriority(t);
        const proj=projects.find(x=>x.id===t.projet);
        const dc=days<0?'late':days===0?'today':'';
        return `<div class="upcoming-item" onclick="selectTask(${t.id})">
            <div class="upcoming-prio p${p}"></div>
            <div class="upcoming-date ${dc}"><div class="upcoming-date-day">${d.getDate()}</div><div class="upcoming-date-month">${MONTHS_SHORT[d.getMonth()]}</div></div>
            <div class="upcoming-info">
                <div class="upcoming-title">${escapeHtml(t.titre)}</div>
                <div class="upcoming-meta">
                    ${proj?`<span style="color:${proj.couleur||'#6366f1'}">● ${escapeHtml(proj.nom)}</span>`:''}
                    <span class="${days<0?'text-danger':''}">${days<0?Math.abs(days)+'j retard':days===0?"Aujourd'hui":'Dans '+days+'j'}</span>
                </div>
            </div>
            <button class="upcoming-done-btn" onclick="markDone(${t.id},event)" title="Marquer comme terminée">✓</button>
        </div>`;
    }).join('')}</div>`;
}

function renderProjects(comp, ft) {
    const active = projects.filter(p=>p.actif!==false);
    if (!active.length) return '<div class="empty-state"><div class="empty-icon">◧</div><div class="empty-text">Aucun projet actif</div></div>';
    const stats = {};
    ft.forEach(t => {
        if (!t.projet) return;
        if (!stats[t.projet]) stats[t.projet]={ total:0, done:0, prog:0 };
        stats[t.projet].total++;
        if (TF.isTerminal(statusCfg, getStatus(t))) stats[t.projet].done++;
        stats[t.projet].prog += (t.progression||0);
    });
    return `<div class="projects-list">${active.filter(p=>stats[p.id]).map(p => {
        const s=stats[p.id]||{total:0,done:0};
        const pct=s.total>0?Math.round(s.done/s.total*100):0;
        return `<div class="project-item">
            <div class="project-color" style="background:${p.couleur||'#6366f1'}"></div>
            <div class="project-info"><div class="project-name">${escapeHtml(p.nom)}</div><div class="project-stats">${s.done}/${s.total} terminées</div></div>
            <div class="project-progress">
                <div class="project-progress-bar"><div class="project-progress-fill" style="width:${pct}%"></div></div>
                <div class="project-progress-text">${pct}%</div>
            </div>
        </div>`;
    }).join('')}</div>`;
}

function renderList(comp, ft) {
    const preset = comp.config.preset||'all';
    const limit  = parseInt(comp.config.limit)||10;
    const today  = new Date(); today.setHours(0,0,0,0);
    let list = ft;
    if (preset==='overdue')   list = ft.filter(t=>{const d=gristToDate(t.dateEcheance);return d&&d<today&&!TF.isTerminal(statusCfg, getStatus(t));});
    else if (preset==='today')     list = ft.filter(t=>{const d=gristToDate(t.dateEcheance);return d&&isSameDay(d,today);});
    else if (preset==='upcoming')  list = ft.filter(t=>{const d=gristToDate(t.dateEcheance);const diff=d&&Math.ceil((d-today)/86400000);return diff!==null&&diff>=0&&diff<=14&&!TF.isTerminal(statusCfg, getStatus(t));});
    else if (preset==='inprogress')list = ft.filter(t=>getStatus(t)==='inprogress');
    if (!list.length) return '<div class="empty-state"><div class="empty-text">Aucune tâche</div></div>';
    return `<div class="list-items">${list.slice(0,limit).map(t=>{
        const p=getPriority(t), s=getStatus(t);
        const d=gristToDate(t.dateEcheance);
        const proj=projects.find(x=>x.id===t.projet);
        const isLate=d&&d<today&&!TF.isTerminal(statusCfg, s);
        return `<div class="list-item" onclick="selectTask(${t.id})">
            <div class="list-prio p${p}"></div>
            <div class="list-info">
                <div class="list-title">${escapeHtml(t.titre||'')}</div>
                <div class="list-meta">
                    ${proj?`<span style="color:${proj.couleur||'#6366f1'}">● ${escapeHtml(proj.nom)}</span>`:''}
                    ${d?`<span class="${isLate?'text-danger':''}">${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}</span>`:''}
                    <span class="status-badge" style="background:${TF.getStatus(statusCfg, s).fillColor};color:${TF.getStatus(statusCfg, s).textColor}">${TF.getStatus(statusCfg, s).label}</span>
                </div>
            </div>
        </div>`;
    }).join('')}</div>`;
}

function renderVelocity(comp, ft) {
    const weeks = parseInt(comp.config.weeks)||6;
    const today = new Date(); today.setHours(0,0,0,0);
    const buckets = [];
    for (let w=weeks-1; w>=0; w--) {
        const start = startOfWeek(addDays(today, -w*7));
        const end   = addDays(start, 7);
        const count = ft.filter(t => {
            if (!TF.isTerminal(statusCfg, getStatus(t))) return false;
            const d=gristToDate(t.dateEcheance);
            return d && d>=start && d<end;
        }).length;
        buckets.push({ label:'S'+getWeekNumber(start), count });
    }
    const maxC = Math.max(...buckets.map(b=>b.count), 1);
    const bw=34, gap=8, ch=100, sw=buckets.length*(bw+gap);
    let bars='';
    buckets.forEach((b,i)=>{
        const h=Math.max(4,Math.round(b.count/maxC*ch));
        const x=i*(bw+gap);
        bars+=`<rect x="${x}" y="${ch-h}" width="${bw}" height="${h}" rx="3" fill="var(--primary)" opacity="${.45+.55*(b.count/maxC)}"/>
        <text x="${x+bw/2}" y="${ch+13}" text-anchor="middle" font-size="9" fill="#64748b">${b.label}</text>
        ${b.count?`<text x="${x+bw/2}" y="${ch-h-4}" text-anchor="middle" font-size="9" fill="#1e293b" font-weight="600">${b.count}</text>`:''}`;
    });
    return `<div class="velocity-wrap"><svg width="${Math.max(sw,200)}" height="${ch+18}" style="overflow:visible">${bars}</svg></div>`;
}

const convert = data => {
    if (!data || Array.isArray(data)) return data||[];
    const cols=Object.keys(data); if (!cols.length) return [];
    const n=data[cols[0]]?.length||0, r=[];
    for (let i=0;i<n;i++){const rec={};cols.forEach(c=>rec[c]=data[c][i]);r.push(rec);}
    return r;
};

async function loadAllData() {
    if (!gristReady) return;
    try {
        const [td,pd,md]=await Promise.all([
            grist.docApi.fetchTable('Tasks'),
            grist.docApi.fetchTable('Projects'),
            grist.docApi.fetchTable('Team'),
        ]);
        tasks=convert(td); projects=convert(pd); team=convert(md);
        rebuildChildrenCache();
        try { statusCfg = await TF.loadStatusConfig(grist, 'Tasks', 'statut', tasks.map(t => t && t.statut)); } catch (e) {}
        render();
    } catch(e) { console.log('Error loading data:', e); }
}
