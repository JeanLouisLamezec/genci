                onReadOnly: () => showToast('Lecture seule : modification non autorisee', 'error'),
                onDenied: () => { showToast('Modification refusee par vos droits', 'error'); loadAllData(); }
            });
            // Phase 2 : Vérifier si le schéma GENCI existe déjà avec inspection complète
            let schemaInitialized = false;
            try {
                console.log('[Kanban] Checking if schema exists...');
                
                // Utiliser l'inspection complète du schéma
                if (TaskFlowBootstrap && TaskFlowBootstrap.inspectGenciSchema) {
                    var inspection = await TaskFlowBootstrap.inspectGenciSchema(grist, ['Team', 'Programmes', 'Entites', 'Projects', 'Tasks', 'Actions']);
                    
                    if (inspection.ready) {
                        schemaInitialized = true;
                        console.log('[Kanban] ✓ Schéma GENCI déjà initialisé et valide');
                    } else {
                        console.log('[Kanban] ✗ Schéma incomplet:', {
                            missingTables: inspection.missingTables,
                            missingColumns: inspection.missingColumns,
                            invalidTypes: inspection.invalidColumnTypes.length
                        });
                    }
                } else {
                    // Fallback pour compatibilité
                    const tables = await grist.docApi.listTables();
                    const essentialTables = ['Team', 'Projects', 'Tasks'];
                    const allExist = essentialTables.every(t => tables.includes(t));
                    
                    if (allExist) {
                        const tasksData = await grist.docApi.fetchTable('Tasks');
                        if (tasksData && tasksData.statut !== undefined) {
                            schemaInitialized = true;
                            console.log('[Kanban] ✓ Schéma GENCI déjà initialisé (fallback)');
                        }
                    }
                }
            } catch (e) {
                console.warn('[Kanban] ✗ Erreur vérification schéma:', e?.message);
                schemaInitialized = false;
            }
            // Initialiser TOUT le schéma GENCI seulement si nécessaire
            if (!TF.isReadOnly() && !schemaInitialized) {
                console.log('[Kanban] → Initializing GENCI schema...');
                showToast('Initialisation du schéma GENCI…', 'info');
                try {
                    var schemaResult = await initGenciSchema(null); // null = pas d'événement bouton
                    
                    // Vérifier le résultat réel
                    if (!schemaResult || schemaResult.success !== true) {
                        console.error(
                            '[Kanban] ✗ GENCI schema initialization failed',
                            schemaResult && schemaResult.errors
                        );
                        throw new Error('Le schéma GENCI reste incomplet après initialisation');
                    }
                    
                    console.log('[Kanban] ✓ GENCI schema initialization complete');
                } catch (e) {
                    console.error('[Kanban] ✗ initGenciSchema error:', e);
                    showToast('Schéma GENCI: ' + (e?.message || e), 'error');
                }
            } else {
                if (TF.isReadOnly()) console.log('[Kanban] → Lecture seule, skip schema init');
                if (schemaInitialized) console.log('[Kanban] → Schema already initialized, skip init');
            }
            try { CRA_ACTIVE = (await grist.docApi.listTables()).includes('TimeEntries'); } catch (e) {}
            console.log('[Kanban] → Calling loadAllData()...');
            try { await loadAllData(); console.log('[Kanban] ✓ loadAllData() complete'); } catch (e) { console.error('[Kanban] ✗ loadAllData error:', e); showToast('Chargement: ' + (e?.message || e), 'error'); }
            console.log('[Kanban] ===== initGrist END =====');
            try {
                grist.onRecords(async () => await loadAllData());

                    if (rec?.id && rec.id !== selectedTaskId && rec.id !== selectedActionId) { 
                        // NOUVEAU: gère aussi les Actions

                            selectedTaskId = rec.id;

                        render();

                });

                    if (options?.filters && interaction?.source !== 'self') {

                        // Appliquer les filtres via FilterManager
                        if (filterManager) {
                          const newFilters = {
                            assignee: Array.isArray(f.assignee) ? f.assignee.map(String) : [],
                            team: Array.isArray(f.team) ? f.team.map(String) : [],
                            project: Array.isArray(f.project) ? f.project.map(String) : [],
                            task: Array.isArray(f.task) ? f.task.map(String) : []
                          };
                          filterManager.setState(newFilters);
                          // Le setState va appeler onChange qui mettra à jour la config et re-render
                        } else {
                          // Fallback si FilterManager pas encore initialisé
                          filters.project = Array.isArray(f.project) ? f.project.map(String) : [];
                          filters.assignee = Array.isArray(f.assignee) ? f.assignee.map(String) : [];
                          filters.team = Array.isArray(f.team) ? f.team.map(String) : [];
                          filters.task = Array.isArray(f.task) ? f.task.map(String) : [];
                          updateFilterMenus();
                          render();
                        }

                { const s = document.getElementById('colorSelect'); if (s) s.value = colorMode; }
                { const s = document.getElementById('levelSelect'); if (s) s.value = workLevel; }
            } catch (e) { console.error('Grist listeners error:', e); }
