    }

    // Attend que toutes les colonnes Ref soient visibles dans les métadonnées
    async function waitForReferenceColumns(grist, schemaDef, formulasMap, options) {
        options = options || {};
        var maxAttempts = options.maxAttempts || 20;
        var baseDelay = options.baseDelay || 200;
        var attempt = 0;
        var lastMissing = [];
        var lastInvalid = [];
        
        // Construire la liste des colonnes Ref attendues
        var expectedRefs = [];
        for (var i = 0; i < SCHEMA.tableOrder.length; i++) {
            var tableId = SCHEMA.tableOrder[i];
            var tableDef = schemaDef.tables[tableId];
            if (!tableDef) continue;
            
            var columns = tableDef.columns || [];
            var split = splitColumns(columns, formulasMap, tableId);
            
            for (var j = 0; j < split.ref.length; j++) {
                var colDef = split.ref[j];
                expectedRefs.push({
                    table: tableId,
                    column: colDef.id,
                    expectedType: colDef.opts?.type || colDef.type
                });
            }
        }
        
        log('[GENCI sync] Attente des colonnes Ref (' + expectedRefs.length + ' colonnes)...');
        
        while (attempt < maxAttempts) {
            try {
                var metadata = await loadSchemaMetadata(grist);
                var missing = [];
                var invalid = [];
                
                for (var k = 0; k < expectedRefs.length; k++) {
                    var ref = expectedRefs[k];
                    var key = ref.table + '.' + ref.column;
                    var col = metadata.columnByKey[key];
                    
                    // Vérifier principalement l'existence de la colonne
                    if (!col) {
                        missing.push(key);
                    } else if (col.type !== ref.expectedType) {
                        // Types incorrects collectés mais ne bloquent pas la stabilisation
                        invalid.push({
                            key: key,
                            expected: ref.expectedType,
                            actual: col.type
                        });
                    }
                }
                
                // Sauvegarder pour le rapport final
                lastMissing = missing.slice();
                lastInvalid = invalid.slice();
                
                // Succès si toutes les colonnes existent (peu importe le type pour l'instant)
                if (missing.length === 0) {
                    log('[GENCI sync] Toutes les colonnes Ref sont présentes (' + attempt + ' tentatives)');
                    if (invalid.length > 0) {
                        log('[GENCI sync] Types incorrects détectés (seront réparés): ' + invalid.length);
                    }
                    return {
                        success: true,
                        missing: [],
                        invalid: invalid,
                        attempts: attempt + 1
                    };
                }
                
                if (missing.length > 0) {
                    log('[GENCI sync] Colonnes Ref manquantes: ' + missing.join(', '));
                }
                
            } catch (e) {
                log('[GENCI sync] Erreur de lecture métadonnées: ' + (e.message || e));
            }
            
            attempt++;
            if (attempt < maxAttempts) {
                await delay(baseDelay * Math.min(attempt, 5));
            }
        }
        
        return {
            success: false,
            error: 'Timeout après ' + attempt + ' tentatives',
            attempts: attempt,
            missing: lastMissing,
            invalid: lastInvalid
        };
    }

    // ========================================================================
    // PASSE 3 — Colonnes calculées (formules)
    // ========================================================================
    
    async function ensureFormulaColumns(grist, formulasMap) {
        var metadata = await loadSchemaMetadata(grist);
        var result = { added: [], skipped: [], errors: [] };
        
        for (var tableName in formulasMap) {
            if (!formulasMap.hasOwnProperty(tableName)) continue;
            
            var formulas = formulasMap[tableName];
            var tableMeta = metadata.tableById[tableName];
            
            if (!tableMeta) {
                result.skipped.push({ table: tableName, reason: 'Table non trouvée' });
                continue;
            }
            
            for (var colId in formulas) {
                if (!formulas.hasOwnProperty(colId)) continue;
                
                var formula = formulas[colId];
                var key = tableName + '.' + colId;
                var existingCol = metadata.columnByKey[key];
                
                if (!existingCol) {
                    // Colonne manquante : l'ajouter
                    try {
                        await grist.docApi.applyUserActions([
                            ['AddColumn', tableName, colId, {
                                type: 'Any',
                                isFormula: true,
                                formula: formula
                            }]
                        ]);
                        result.added.push(key);
                    } catch (e) {
                        result.errors.push({
                            table: tableName,
                            column: colId,
                            error: e.message || String(e)
                        });
                    }
                } else {
                    result.skipped.push({ table: tableName, column: colId, reason: 'Déjà existe' });
                }
            }
        }
        
        return result;
    }

    // ========================================================================
    // PASSE 4 — Configuration des Choices et statuts
    // ========================================================================
    
    async function configureChoiceColumns(grist, defaultChoices) {
        var result = { configured: [], skipped: [] };
        
        for (var key in defaultChoices) {
            if (!defaultChoices.hasOwnProperty(key)) continue;
            
            var parts = key.split('.');
            if (parts.length !== 2) continue;
            
            var table = parts[0];
            var column = parts[1];
            var choices = defaultChoices[key];
            
            try {
                var statusList = choices.map(function(v) {
                    return { value: v, label: v, fillColor: '#94a3b8', textColor: '#ffffff' };
                });
                
                var seedResult = await TF.seedStatusChoices(grist, table, column, statusList);
                
                if (seedResult.ok && seedResult.changed) {
                    result.configured.push(key);
                } else if (seedResult.ok && !seedResult.changed) {
                    result.skipped.push({ key: key, reason: seedResult.reason || 'Déjà configuré' });
                } else {
                    result.skipped.push({ key: key, reason: seedResult.error || 'Erreur inconnue' });
                }
            } catch (e) {
                result.skipped.push({ key: key, reason: e.message || String(e) });
            }
        }
        
        return result;
    }

    // ========================================================================
    // PASSE 5 — Configuration des colonnes visibles des références
    // ========================================================================
    
    async function configureAllRefDisplays(grist, specs) {
        log('[GENCI display] Configuration affichage références...');
        
        var result = await TF.setRefDisplayColumns(grist, specs);
        
        if (result.configured && result.configured.length > 0) {
            log('[GENCI display] Configurés: ' + result.configured.length);
        }
        if (result.alreadyCorrect && result.alreadyCorrect.length > 0) {
            log('[GENCI display] Déjà corrects: ' + result.alreadyCorrect.length);
        }
        if (result.skipped && result.skipped.length > 0) {
            log('[GENCI display] Ignorés: ' + result.skipped.length, result.skipped);
        }
        if (result.errors && result.errors.length > 0) {
            log('[GENCI display] Erreurs: ' + result.errors.length, result.errors);
        }
        
        return result;
    }

    // Helper : obtient toutes les spécifications de références depuis le schéma
    function getExpectedReferenceSpecs(schema) {
        var specs = [];
        
        for (var tableId in schema.tables) {
            if (!Object.prototype.hasOwnProperty.call(schema.tables, tableId)) {
                continue;
            }
            
            var columns = schema.tables[tableId].columns || [];
            
            for (var i = 0; i < columns.length; i++) {
                var column = columns[i];
                var opts = column.opts || column;
                var type = opts.type || '';
                
                if (/^(Ref|RefList):/.test(type)) {
                    specs.push({
                        table: tableId,
                        column: column.id,
                        expectedType: type,
                        targetTable: getRefTarget(type)
                    });
                }
            }
        }
        
        return specs;
    }
    
    // Helper : charge les colonnes réelles des tables utilisateur
    async function loadActualTableColumns(grist, tableIds) {
        var columnsByTable = {};
        var errors = [];
        
        for (var i = 0; i < tableIds.length; i++) {
            var tableId = tableIds[i];
            
            try {
                var data = await grist.docApi.fetchTable(tableId);
                columnsByTable[tableId] = new Set(Object.keys(data || {}));
            } catch (e) {
                columnsByTable[tableId] = new Set();
                errors.push({
                    table: tableId,
                    error: e.message || String(e)
                });
            }
        }
        
        return {
            columnsByTable: columnsByTable,
            errors: errors
        };
    }

    // ========================================================================
    // INSPECTION — Vérification complète du schéma
    // ========================================================================
    
    async function inspectGenciSchema(grist, requiredTables, metadataSnapshot) {
        var result = {
            ready: true,
            missingTables: [],
            missingColumns: [],
            metadataPending: [],
            invalidColumnTypes: [],
            invalidRefTargets: [],
            invalidVisibleColumns: [],
            missingFormulaColumns: []
        };
        
        try {
            // Utiliser le snapshot fourni ou charger les métadonnées
            var metadata = metadataSnapshot || await loadSchemaMetadata(grist);
            
            // Vérifier les tables essentielles
            for (var i = 0; i < requiredTables.length; i++) {
                var tableId = requiredTables[i];
                if (!metadata.tableById[tableId]) {
                    result.missingTables.push(tableId);
                    result.ready = false;
                }
            }
            
            // Vérifier TOUTES les références du schéma (pas juste 6)
            var expectedRefs = getExpectedReferenceSpecs(SCHEMA);
            
            // Charger les colonnes réelles des tables pour distinguer absent vs retardé
            var refTableIds = Array.from(new Set(expectedRefs.map(function(ref) {
                return ref.table;
            })));
            
            var actualColumns = await loadActualTableColumns(grist, refTableIds);
            
            for (var j = 0; j < expectedRefs.length; j++) {
                var ref = expectedRefs[j];
                var key = ref.table + '.' + ref.column;
                var metadataCol = metadata.columnByKey[key];
                var actualTableCols = actualColumns.columnsByTable[ref.table];
                var existsInTable = actualTableCols && actualTableCols.has(ref.column);
                
                // Cas 1 : Colonne absente des métadonnées ET de la table réelle
                if (!metadataCol && !existsInTable) {
                    result.missingColumns.push(key);
                    result.ready = false;
                    continue;
                }
                
                // Cas 2 : Colonne présente dans la table mais absente des métadonnées (retard)
                if (!metadataCol && existsInTable) {
                    result.metadataPending.push(key);
                    // Ne pas mettre ready = false, c'est temporaire
                    continue;
                }
                
                // Cas 3 : Colonne présente dans les métadonnées, vérifier le type
                if (metadataCol.type !== ref.expectedType) {
                    result.invalidColumnTypes.push({
                        column: key,
                        expected: ref.expectedType,
                        actual: metadataCol.type
                    });
                    result.ready = false;
                    
                    // Vérifier si la table cible existe
                    var targetType = ref.targetTable;
                    if (!metadata.tableById[targetType]) {
                        result.invalidRefTargets.push({
                            column: key,
                            expectedTarget: targetType
                        });
                    }
                }
            }
            
            // Vérifier les visibleCol sur TOUTES les références de SCHEMA.referenceDisplays
            var refDisplaySpecs = SCHEMA.referenceDisplays || [];
            
            for (var k = 0; k < refDisplaySpecs.length; k++) {
                var spec = refDisplaySpecs[k];
                var specKey = spec.table + '.' + spec.column;
                var specCol = metadata.columnByKey[specKey];
                
                if (!specCol) {
                    // Référence absente des métadonnées
                    if (!result.metadataPending.includes(specKey)) {
                        result.metadataPending.push(specKey);
                    }
                    continue;
                }
                
                var targetTable = getRefTarget(specCol.type);
                if (targetTable) {
                    var visColKey = targetTable + '.' + spec.visibleColId;
                    var visCol = metadata.columnByKey[visColKey];
                    
                    if (visCol) {
                        // Vérification stricte du visibleCol
                        if (Number(specCol.visibleCol) !== Number(visCol.id)) {
                            result.invalidVisibleColumns.push({
                                column: specKey,
                                expected: visCol.id,
                                actual: specCol.visibleCol
                            });
                            result.ready = false;
                        }
                    }
                }
            }
            
        } catch (e) {
            result.error = e.message || String(e);
            result.ready = false;
        }
        
        return result;
    }

    // Helper : extrait l'ID d'un enregistrement créé
    function getAddedRecordId(actionResult, label) {
        var value = Array.isArray(actionResult)
            ? actionResult[0]
            : actionResult;

        if (typeof value === 'number' && Number.isFinite(value)) {
            return value;
        }

        if (
            value &&
            typeof value === 'object' &&
            typeof value.id === 'number'
        ) {
            return value.id;
        }

        throw new Error(
            'ID de ligne introuvable après AddRecord' +
            (label ? ' (' + label + ')' : '') +
            ': ' + JSON.stringify(actionResult)
        );
    }

    // ========================================================================
    // SEED — Données de démonstration (UNIQUEMENT si tables vides)
    // ========================================================================
    
    async function seedInitialData(grist, context) {
        var seedEntries = [];
        context = context || {};
        
        try {
            // Vérifier si Tasks est vide
            var tasksData = await grist.docApi.fetchTable('Tasks');
            var tasksCount = (tasksData && tasksData.id && tasksData.id.length) || 0;
            
            if (tasksCount > 0) {
                log('[GENCI seed] Tables non vides (' + tasksCount + ' tasks) — seed ignoré');
                return { seeded: false, reason: 'Tables non vides' };
            }
            
            log('[GENCI seed] Tables vides — création données de démonstration...');
            
            // Créer les données dans l'ordre de dépendance
            var createdIds = {};
            
            // 1. Entités
            if (context.tablesCreated && context.tablesCreated.indexOf('Entites') !== -1) {
                var entiteRacine = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Entites', null, { nom: 'Direction', niveau: 'direction', actif: true }]
                ]);
                createdIds.Entites = { racine: getAddedRecordId(entiteRacine, 'Entites.Direction') };
                
                var entiteDev = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Entites', null, { nom: 'Développement', parent: createdIds.Entites.racine, niveau: 'service', actif: true }]
                ]);
                createdIds.Entites.dev = getAddedRecordId(entiteDev, 'Entites.Développement');
                
                seedEntries.push('Créé: Entités (2)');
            }
            
            // 2. Team
            if (context.tablesCreated && context.tablesCreated.indexOf('Team') !== -1) {
                var member1 = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Team', null, { nom: 'Alice Martin', role: 'chef_de_projet', actif: true }]
                ]);
                createdIds.Team = { alice: getAddedRecordId(member1, 'Team.Alice') };
                
                var member2 = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Team', null, { nom: 'Bob Durant', role: 'membre', actif: true }]
                ]);
                createdIds.Team.bob = getAddedRecordId(member2, 'Team.Bob');
                
                // Mettre à jour les références
                if (createdIds.Entites && createdIds.Entites.dev) {
                    await grist.docApi.applyUserActions([
                        ['UpdateRecord', 'Team', createdIds.Team.alice, { entite: createdIds.Entites.dev }],
                        ['UpdateRecord', 'Team', createdIds.Team.bob, { entite: createdIds.Entites.dev, responsable: createdIds.Team.alice }]
                    ]);
                }
                
                seedEntries.push('Créé: Team (2)');
            }
            
            // 3. Programmes
            if (context.tablesCreated && context.tablesCreated.indexOf('Programmes') !== -1) {
                var programme = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Programmes', null, { nom: 'Transformation Digitale', couleur: '#4f46e5', actif: true }]
                ]);
                createdIds.Programmes = { digital: getAddedRecordId(programme, 'Programmes.Transformation') };
                seedEntries.push('Créé: Programmes (1)');
            }
            
            // 4. Competences
            if (context.tablesCreated && context.tablesCreated.indexOf('Competences') !== -1) {
                await grist.docApi.applyUserActions([
                    ['AddRecord', 'Competences', null, { nom: 'JavaScript', categorie: 'technique', actif: true }],
                    ['AddRecord', 'Competences', null, { nom: 'Python', categorie: 'technique', actif: true }],
                    ['AddRecord', 'Competences', null, { nom: 'Gestion de projet', categorie: 'fonctionnel', actif: true }]
                ]);
                seedEntries.push('Créé: Competences (3)');
            }
            
            // 5. KanbanSteps
            if (context.tablesCreated && context.tablesCreated.indexOf('KanbanSteps') !== -1) {
                await grist.docApi.applyUserActions([
                    ['AddRecord', 'KanbanSteps', null, { nom: 'À faire', valeur: 'todo', couleur: '#94a3b8', ordre: 0, actif: true }],
                    ['AddRecord', 'KanbanSteps', null, { nom: 'En cours', valeur: 'inprogress', couleur: '#f59e0b', ordre: 1, actif: true }],
                    ['AddRecord', 'KanbanSteps', null, { nom: 'En revue', valeur: 'review', couleur: '#3b82f6', ordre: 2, actif: true }],
                    ['AddRecord', 'KanbanSteps', null, { nom: 'Terminé', valeur: 'done', couleur: '#10b981', ordre: 3, actif: true }]
                ]);
                seedEntries.push('Créé: KanbanSteps (4)');
            }
            
            return { seeded: true, ids: createdIds, log: seedEntries };
            
        } catch (e) {
            log('[GENCI seed] Erreur: ' + (e.message || e));
            return { seeded: false, error: e.message || String(e) };
        }
    }

    // ========================================================================
    // ORCHESTRATEUR PRINCIPAL
    // ========================================================================
    
    async function ensureGenciSchema(grist, options) {
        options = options || {};
        
        // Sérialise les appels dans une même iframe
        if (bootstrapPromise) {
            return bootstrapPromise;
        }
        
        if (bootstrapComplete && !options.force) {
            return Promise.resolve({ success: true, alreadyComplete: true });
        }
        
        bootstrapPromise = (async function () {
            var startTime = Date.now();
            var globalLog = [];
            var result = {
                success: false,
                phases: {},
                errors: [],
                warnings: []
            };
            
            try {
                log('Démarrage initialisation...');
                
                // Phase 0 : Exécuter les migrations puis inspection
                log('Phase 0: Migrations...');
                var migrationLog = await migrateLegacyTables(grist);
                globalLog = globalLog.concat(migrationLog);
                
                // Exécuter les migrations versionnées si TaskFlowMigrations est disponible
                if (global.TaskFlowMigrations) {
                    try {
                        var currentVersion = await global.TaskFlowMigrations.getCurrentVersion(grist);
                        log('Version actuelle du schéma: v' + currentVersion);
                        
                        var migrationResult = await global.TaskFlowMigrations.runMigrations(grist, currentVersion);
                        
                        if (migrationResult.success) {
                            log('Migrations appliquées: ' + migrationResult.applied + ' migrations, version finale: v' + migrationResult.finalVersion);
                            globalLog.push('Migrations: v' + currentVersion + ' → v' + migrationResult.finalVersion);
                            result.phases.migrations = migrationResult;
                        } else {
                            result.warnings.push({ phase: 'migrations', message: 'Certaines migrations ont échoué' });
                        }
                    } catch (migrationError) {
                        log('Erreur lors des migrations: ' + (migrationError.message || migrationError));
                        result.warnings.push({ phase: 'migrations', error: migrationError.message || String(migrationError) });
                        // Continuer malgré tout, le schéma déclaratif réparera
                    }
                }
                
                result.phases.migration = migrationLog;
                
                // Phase 1 : Création des tables (sans Ref)
                log('Phase 1: Création tables...');
                var phase1 = await ensureBaseTables(grist, SCHEMA, options.formulasMap || {});
                globalLog.push('Tables créées: ' + phase1.created.join(', '));
                result.phases.tables = phase1;
                
                // Synchronisation
                var allExpectedTables = SCHEMA.tableOrder.slice();
                var metadata = await syncMetadata(grist, allExpectedTables);
                result.phases.sync = { success: true };
                
                // Phase 2 : Colonnes Ref
                log('Phase 2: Colonnes Ref...');
                var phase2 = await ensureRefColumns(grist, SCHEMA, options.formulasMap || {});
                globalLog.push('Ref ajoutées: ' + phase2.added.join(', '));
                if (phase2.repaired.length > 0) {
                    globalLog.push('Ref réparées: ' + phase2.repaired.join(', '));
                }
                
                // Vérifier les erreurs de création des Ref
                if (phase2.errors.length > 0) {
                    result.errors.push({
                        phase: 'refs',
                        errors: phase2.errors
                    });
                    result.success = false;
                    log('Échec création des colonnes Ref, arrêt de l\'initialisation');
                    return result;
                }
                
                result.phases.refs = phase2;
                
                // Phase 2 : Colonnes Ref terminées (succès des AddColumn = confirmation)
                log('Phase 2: Colonnes Ref terminées (' + phase2.added.length + ' créées)');
                result.phases.refs = phase2;
                
                // Petite pause pour stabilisation Grist avant formules
                await delay(500);
                
                // Phase 3 : Formules
                if (options.formulasMap && Object.keys(options.formulasMap).length > 0) {
                    log('Phase 3: Formules...');
                    var phase3 = await ensureFormulaColumns(grist, options.formulasMap);
                    globalLog.push('Formules ajoutées: ' + phase3.added.join(', '));
                    result.phases.formulas = phase3;
                }
                
                // Phase 4 : Choices
                log('Phase 4: Choices...');
                var phase4 = await configureChoiceColumns(grist, options.defaultChoices || {});
                result.phases.choices = phase4;
                
                // Phase 5 : Affichage des références
                log('Phase 5: Affichage références...');
                var phase5 = await configureAllRefDisplays(grist, GENCI_REF_DISPLAY_SPECS);
                result.phases.display = phase5;
                
                if (!phase5.ok) {
                    result.warnings.push({ phase: 'display', errors: phase5.errors });
                }
                
                // Phase 6 : Seed (seulement si demandé explicitement)
                if (options.seedDemo === true) {
                    log('Phase 6: Seed de démonstration...');
                    var seedContext = { tablesCreated: phase1.created };
                    var phase6 = await seedInitialData(grist, seedContext);
                    result.phases.seed = phase6;
                    if (phase6.seeded) {
                        globalLog = globalLog.concat(phase6.log || []);
                    }
                    if (phase6.error) {
                        result.errors.push({ phase: 'seed', error: phase6.error });
                    }
                } else {
                    result.phases.seed = {
                        seeded: false,
                        reason: 'Seed de démonstration désactivé (options.seedDemo !== true)'
                    };
                }
                
                // Vérification finale
                log('Vérification finale...');
                
                // Délai de stabilisation avant validation
                await delay(300);
                
                // Relire les métadonnées fraîches
                metadata = await loadSchemaMetadata(grist);
                
                var requiredTables = ['Team', 'Programmes', 'Entites', 'Projects', 'Tasks', 'Actions'];
                var inspection = await inspectGenciSchema(grist, requiredTables, metadata);
                
                if (!inspection.ready) {
                    result.errors.push({
                        phase: 'validation',
                        missingTables: inspection.missingTables,
                        missingColumns: inspection.missingColumns,
                        invalidTypes: inspection.invalidColumnTypes
                    });
                    
                    // Ne pas considérer comme échec total si ce sont juste des visibleCol ou metadataPending
                    if (inspection.missingTables.length === 0 && inspection.missingColumns.length === 0) {
                        result.success = true;
                        result.warnings.push({ phase: 'validation', details: inspection });
                    } else {
                        result.success = false;
                    }
                } else {
                    result.success = true;
                }
                
                // Afficher le détail de la validation
                console.info(
                    '[GENCI validation]',
                    JSON.stringify({
                        ready: inspection.ready,
                        missingTables: inspection.missingTables,
                        missingColumns: inspection.missingColumns,
                        metadataPending: inspection.metadataPending,
                        invalidColumnTypes: inspection.invalidColumnTypes.length,
                        invalidRefTargets: inspection.invalidRefTargets.length,
                        invalidVisibleColumns: inspection.invalidVisibleColumns.length
                    }, null, 2)
                );
                
                // Afficher les warnings techniques
                if (result.warnings && result.warnings.length > 0) {
                    console.warn('[GENCI] Warnings:', result.warnings);
                }
                
                // Afficher les erreurs si échec
                if (!result.success && result.errors && result.errors.length > 0) {
                    console.error('[GENCI] Errors:', JSON.stringify(result.errors, null, 2));
                }
                
                // bootstrapComplete seulement si succès
                bootstrapComplete = result.success === true;
                var duration = Date.now() - startTime;
                log('Initialisation terminée (' + duration + 'ms)');
                result.duration = duration;
                result.log = globalLog;
                
                return result;
                
            } catch (e) {
                log('Échec initialisation: ' + (e.message || e));
                result.errors.push({ phase: 'global', error: e.message || String(e) });
                result.success = false;
                bootstrapComplete = false;
                throw e;
            } finally {
                bootstrapPromise = null;
            }
        })();
        
        return bootstrapPromise;
    }

    // Ancienne API pour compatibilité
    async function ensureSchema(grist, options) {
        return ensureGenciSchema(grist, options);
    }

    // Export public
    global.TaskFlowBootstrap = {

    // Helper : convertir tableau colonnaire en lignes
    function columnarToRows(data) {
        if (!data || Array.isArray(data)) return data || [];
        var cols = Object.keys(data);
        if (!cols.length) return [];
        var n = (data[cols[0]] && data[cols[0]].length) || 0;
        var rows = [];
        for (var i = 0; i < n; i++) {
            var rec = {};
            for (var j = 0; j < cols.length; j++) {

            }
            rows.push(rec);

        return rows;

            tableById[tables[i].id] = tables[i].tableId;
        }
        
        var columnsByKey = {};
        for (var j = 0; j < columns.length; j++) {
            var col = columns[j];
            var tableId = tableById[col.parentId];
            if (tableId) {
                var key = tableId + '.' + col.colId;
                columnsByKey[key] = {
                    tableId: tableId,
                    colId: col.colId,
                    type: col.type,
                    isFormula: col.isFormula,
                    parentId: col.parentId
                };
            }
        }
        
        var tablesByName = {};
        for (var k = 0; k < tables.length; k++) {
            tablesByName[tables[k].tableId] = tables[k];
        }
        
        return {
            tablesById: tableById,

        // ═══════════════════════════════════════════════════════════════════════
        // WBS (hiérarchie sous-tâches) — API commune
        // ═══════════════════════════════════════════════════════════════════════
        let childrenByParent = new Map();
        function rebuildChildrenCache() {
            childrenByParent = new Map();
            const cycleIds = new Set();
            for (const t of tasks) {
                const seen = new Set([t.id]);
                let cur = t.parentTask ? tasks.find(x => x.id === t.parentTask) : null;
                let guard = 0;
                while (cur && guard++ < 128) {
                    if (seen.has(cur.id)) { cycleIds.add(t.id); break; }
                    seen.add(cur.id);
                    cur = cur.parentTask ? tasks.find(x => x.id === cur.parentTask) : null;
                }
            }
            if (cycleIds.size) console.warn('WBS: cycles detected on task ids:', [...cycleIds]);
            for (const t of tasks) {
                const pid = t.parentTask;
                if (pid && !isNaN(pid) && !cycleIds.has(t.id)) {
                    if (!childrenByParent.has(pid)) childrenByParent.set(pid, []);
                    childrenByParent.get(pid).push(t);
                }
            }
        }
        const isRoot = (t) => !t?.parentTask;
        const getParent = (t) => t?.parentTask ? tasks.find(x => x.id === t.parentTask) : null;
        const getChildren = (id) => childrenByParent.get(id) || [];
        const hasChildren = (t) => t && getChildren(t.id).length > 0;
        function getDepth(t) { let d = 0, cur = t, guard = 0; while (cur?.parentTask && guard++ < 32) { cur = tasks.find(x => x.id === cur.parentTask); d++; } return d; }
        function walkTree(roots, cb) {
            const stack = roots.map(r => ({ task: r, depth: 0 }));
            while (stack.length) {
                const { task, depth: d } = stack.shift();
                cb(task, d);
                const kids = getChildren(task.id);
                if (kids.length) for (let i = kids.length - 1; i >= 0; i--) stack.unshift({ task: kids[i], depth: d + 1 });
            }
        }
        function getAllDescendants(id, acc = [], visited = new Set()) {
            if (visited.has(id)) return acc;
            visited.add(id);
            for (const k of getChildren(id)) { acc.push(k); getAllDescendants(k.id, acc, visited); }
            return acc;
        }
        function canSetParent(taskId, newParent) {
            if (!newParent) return true;
            if (newParent === taskId) return false;
            let cur = tasks.find(x => x.id === newParent), guard = 0;
            while (cur && guard++ < 64) {
                if (cur.id === taskId) return false;
                cur = cur.parentTask ? tasks.find(x => x.id === cur.parentTask) : null;
            }
            return true;
        }
        function aggregateProgress(t, visited = new Set()) {
            if (visited.has(t.id)) return t.progression || 0;
            visited.add(t.id);
            const kids = getChildren(t.id);
            if (!kids.length) return t.progression || 0;
            const allWeighted = kids.every(k => k.estimationH && k.estimationH > 0);
            if (allWeighted) {
                const totalW = kids.reduce((s, k) => s + k.estimationH, 0);
                return Math.round(kids.reduce((s, k) => s + aggregateProgress(k, visited) * k.estimationH, 0) / totalW);
            }
            return Math.round(kids.reduce((s, k) => s + aggregateProgress(k, visited), 0) / kids.length);
        }
        function aggregateDates(t, visited = new Set()) {
            if (visited.has(t.id)) return { start: t.dateDebut, end: t.dateEcheance };
            visited.add(t.id);
            const kids = getChildren(t.id);
            if (!kids.length) return { start: t.dateDebut, end: t.dateEcheance };
            let minS = t.dateDebut, maxE = t.dateEcheance;
            for (const k of kids) {
                const sub = aggregateDates(k, visited);
                if (sub.start != null && (minS == null || sub.start < minS)) minS = sub.start;
                if (sub.end != null && (maxE == null || sub.end > maxE)) maxE = sub.end;
            }
            return { start: minS, end: maxE };
        }

        function wouldCreateCycle(taskId, depId, visited = new Set()) { if (taskId === depId) return true; if (visited.has(depId)) return false; visited.add(depId); const depTask = tasks.find(t => t.id === depId); if (!depTask) return false; return getDependsOn(depTask).some(d => wouldCreateCycle(taskId, d, visited)); }
        function getAvailableDependencies(taskId) { return tasks.filter(t => t.id !== taskId && !wouldCreateCycle(taskId, t.id)); }
        function getBlockedTasks(taskId) { return tasks.filter(t => getDependsOn(t).includes(taskId)); }

        // sweet spot : ne jamais ecrire une colonne absente du schema (ex. charges/dateCloture si le Plan n'a jamais ete ouvert). Fail-open si TASK_COLS pas encore peuple.
        function pruneTaskRecord(rec) { if (TASK_COLS.size) { for (const k in rec) if (!TASK_COLS.has(k)) delete rec[k]; } return rec; }
        let ACTION_COLS = new Set();
        function pruneActionRecord(rec) {

        async function initGenciSchema(btn) {
            if (TF.isReadOnly()) { showToast('Lecture seule : action impossible', 'error'); return; }
            if (!gristReady) { showToast('Grist pas prêt, réessayez', 'error'); return; }
            if (btn) {

                btn.style.pointerEvents = 'none';
            }
            
            showToast('Initialisation du schéma GENCI…', 'info');
            
            try {

                    formulasMap: GENCI_DERIVED_FORMULAS,
                    defaultChoices: {
                        'Entites.niveau': ['direction', 'service', 'equipe'],
                        'Team.role': ['membre', 'chef', 'chef_de_projet'],

                        'Competences.categorie': ['technique', 'fonctionnel', 'transverse']
                    },
                    seedDemo: false  // Seed de démo désactivé par défaut
                });
                
                if (result.success) {
                    var msg = 'Schéma GENCI prêt';
                    if (result.duration) msg += ' (' + Math.round(result.duration) + 'ms)';
                    if (result.phases && result.phases.tables && result.phases.tables.created.length > 0) {
                        msg += ' — ' + result.phases.tables.created.length + ' tables';
                    }
                    showToast(msg, 'success');
                    
                    if (result.log && result.log.length > 0) {
                        console.log('[GENCI] Initialization log:', result.log);
                    }
                    if (result.warnings && result.warnings.length > 0) {
                        console.warn('[GENCI] Warnings:', result.warnings);
                    }
                    if (result.errors && result.errors.length > 0) {
                        console.error('[GENCI] Errors:', JSON.stringify(result.errors, null, 2));
                    }
                } else {
                    var errorMsg = 'Échec initialisation GENCI';
                    if (result.errors && result.errors.length > 0) {
                        console.error('[GENCI] Errors:', JSON.stringify(result.errors, null, 2));
                        errorMsg += ' — voir console';
                    }
                    showToast(errorMsg, 'error');
                }
                
                return result;
                
            } catch (e) {
                console.error('[GENCI] Initialization error:', e);
                showToast('Échec initialisation: ' + (e.message || e), 'error');

            const rec = {

                valeur: valeur,
                couleur: couleur,

                actif: true

            const result = await grist.docApi.applyUserActions([

            ]);
            // Mettre à jour le cache local
            rec.id = result?.retValues?.[0] || Date.now();
            kanbanSteps.push(rec);
            return rec;
        }

        // Initialiser le FilterManager
        function initKanbanFilterManager() {
          const teamById = (id) => team.find(m => m.id === id);
          const effCharges = (t) => {
            const c = TF.parseCharges(t.charges);
            if (c.length) return c;
            const est = Number(t.estimationH) || 0, asg = getRefListArray(t.assignees);
            return (est > 0 && asg.length) ? asg.map(id => ({ teamId: id, heures: est / asg.length })) : [];
          };
          
          // Post-filter spécifique au Kanban : Actions + workLevel + showSubtasks + search
          // Ce post-filter reçoit les TÂCHES déjà filtrées par le FilterManager, et doit retourner les ACTIONS à afficher
          const kanbanPostFilter = (filteredTasks, config, allData) => {
            const { actions = [], tasks = [], team = [] } = allData;
            const filteredTaskIds = new Set(filteredTasks.map(t => t.id));
            
            console.log('kanbanPostFilter:', {
              totalActions: actions.length,
              filteredTaskIds: filteredTaskIds.size,
              config: config,
              _assigneeFilter: config._assigneeFilter,
              _teamFilter: config._teamFilter
            });
            
            // Filtrer les actions dont la tâche parente est dans les tâches filtrées
            let result = actions.filter(a => {
              // La tâche parente doit être dans les tâches filtrées
              if (a.task && !filteredTaskIds.has(Number(a.task))) return false;
              
              // Appliquer le filtre assignee SUR L'ACTION elle-même (pas juste la tâche parente)
              if (config._assigneeFilter && config._assigneeFilter.length > 0) {
                // Si l'action n'a PAS d'assignee, elle ne correspond pas au filtre
                if (!a.assignee) return false;
                // Si l'assignee de l'action n'est PAS dans le filtre, on exclut
                if (!config._assigneeFilter.includes(String(a.assignee))) return false;
              }
              
              // Appliquer le filtre team (entité) sur l'assignee de l'action
              if (config._teamFilter && config._teamFilter.length > 0) {
                const member = team.find(m => m.id === a.assignee);
                if (!member) return false; // Pas de membre trouvé
                if (!member.entite) return false; // Membre sans entité
                if (!config._teamFilter.includes(String(member.entite))) return false; // Entité non filtrée
              }
              
              // Filtre recherche
              if (config.searchQuery && !(a.titre||'').toLowerCase().includes(config.searchQuery)) return false;
              return true;
            });
            
            console.log('kanbanPostFilter result:', result.length, 'actions');
            
            // Appliquer workLevel (actions/parents/all)
            if (config.workLevel === 'actions') {
              // Actions = tâches sans sous-tâche (feuilles)
              result = result.filter(a => !hasChildren(a.task));
            } else if (config.workLevel === 'parents') {
              // Parents = tâches avec des enfants
              result = result.filter(a => hasChildren(a.task));
            }
            
            // Appliquer showSubtasks (WBS-03)
            if (!config.showSubtasks) {
              // Exclure les tâches qui sont des enfants (ont un parentTask)
              const parentTaskIds = new Set(tasks.filter(t => t.parentTask).map(t => t.parentTask));
              result = result.filter(a => !parentTaskIds.has(a.task));
            }
            
            return result;
          };
          
          // Initialiser le FilterManager (les données seront mises à jour via setData)
          filterManager = new FilterManager({
            initialFilters: filters,
            onChange: (newFilters) => {
              // Mettre à jour la variable globale filters
              filters.assignee = newFilters.assignee || [];
              filters.team = newFilters.team || [];
              filters.project = newFilters.project || [];
              filters.programme = newFilters.programme || [];
              filters.task = newFilters.task || [];
              
              updateFilterCount();
              broadcastKanbanFilters();
              // Mettre à jour la config avec les filtres pour le post-filter
              if (filterManager) {
                filterManager.setWidgetConfig({
                  workLevel: workLevel,
                  showSubtasks: showSubtasks,
                  searchQuery: searchQuery,
                  _assigneeFilter: filters.assignee,
                  _teamFilter: filters.team,
                  _projectFilter: filters.project,
                  _programmeFilter: filters.programme
                });
              }
              render();
            },
            onBroadcast: (newFilters) => {
              broadcastKanbanFilters();
            },
            effCharges: effCharges,
            teamById: teamById,
            theme: 'light',
            postFilter: kanbanPostFilter,
            widgetConfig: {
              workLevel: workLevel,
              showSubtasks: showSubtasks,
              searchQuery: searchQuery,
              _assigneeFilter: filters.assignee,
              _teamFilter: filters.team
            }
          });

          // Initialiser l'UI avec le panneau de filtres
          const filterPanel = document.getElementById('filterPanel');
          filterManager.initUI({
            assignee: document.getElementById('filterPersonContainer'),
            team: document.getElementById('filterTeamContainer'),
            project: document.getElementById('filterProjectContainer'),
            programme: document.getElementById('filterProgramContainer'),
            task: document.getElementById('filterTaskContainer')
          }, filterPanel);
        }

          const cnt = document.getElementById('filterCount');
          if (!cnt) return;
          const total = filters.assignee.length + filters.team.length + filters.project.length + filters.programme.length + filters.task.length;
          cnt.textContent = total;
          cnt.style.display = total > 0 ? 'inline-flex' : 'none';
          const fbtn = document.getElementById('filterBtn');
          if (fbtn) fbtn.classList.toggle('has-filter', total > 0);
        }

        // Lit les widgetOptions courantes de la colonne Choice `statut`.
        async function _readStatutColumnOptions() {
            const meta = await grist.docApi.fetchTable('_grist_Tables');
            const tables = convertGristToRecords(meta);
            const cols = convertGristToRecords(await grist.docApi.fetchTable('_grist_Tables_column'));

            if (tid == null) return null;

        // Couleur par defaut pour un nouveau statut (palette harmonisee)
        const STATUS_COLOR_PALETTE = ['#94a3b8', '#f59e0b', '#3b82f6', '#10b981', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#ef4444'];

        // Génère une valeur slugifiée depuis un nom
        function slugify(text) {
            return text.toLowerCase()
                .replace(/[^a-z0-9-]/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '') || Date.now().toString();
        }

        // Ajoute une nouvelle étape au Kanban (table KanbanSteps + sync Choice).
        async function addStatusColumn() {
            if (TF.isReadOnly()) { showToast('Lecture seule : action impossible', 'error'); return; }
            if (groupBy !== 'statut') { showToast('Activez le groupement par Statut', 'info'); return; }
            const addCol = document.querySelector('.kanban-add-column');
            if (!addCol || addCol.querySelector('input')) return;
            const input = document.createElement('input');
            input.className = 'column-title-input';
            input.placeholder = 'Nom de l\'étape';
            input.style.cssText = 'width:120px;text-align:center;margin-top:4px';
            addCol.querySelector('button').style.display = 'none';
            addCol.appendChild(input);
            input.focus();
            let done = false;
            const finish = async (commit) => {
                if (done) return; done = true;
                const nom = input.value.trim();
                addCol.innerHTML = '<button onclick="addStatusColumn()" title="Ajouter une étape">+</button>';
                if (!commit || !nom) return;
                try {
                    // Vérifier si une étape avec ce nom existe déjà
                    if (kanbanSteps.some(s => s.nom.toLowerCase() === nom.toLowerCase() && s.actif !== false)) {
                        showToast('Cette étape existe déjà', 'info');
                        return;
                    }
                    // Générer une valeur unique
                    let valeur = slugify(nom);
                    let counter = 1;
                    while (kanbanSteps.some(s => s.valeur === valeur && s.actif !== false)) {
                        valeur = slugify(nom) + '-' + counter++;
                    }
                    // Trouver une couleur disponible
                    const usedColors = kanbanSteps.filter(s => s.actif !== false).map(s => s.couleur);
                    const couleur = STATUS_COLOR_PALETTE.find(c => !usedColors.includes(c)) || STATUS_COLOR_PALETTE[0];
                    
                    // Sauvegarder dans la table KanbanSteps
                    await saveKanbanStep(nom, valeur, couleur);
                    
                    // Synchroniser avec la colonne Choice
                    await syncKanbanStepsToChoice();
                    
                    // Recharger les données
                    await loadAllData();
                    render();
                    showToast('Étape « ' + nom + ' » ajoutée', 'success');
                } catch (e) { console.error('addStatusColumn:', e); showToast('Erreur: ' + (e?.message || e), 'error'); }
            };
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); finish(true); } else if (e.key === 'Escape') { finish(false); } });
            input.addEventListener('blur', () => finish(true));
        }

        // Renomme une étape existante (met à jour KanbanSteps + sync Choice + update tâches).
        async function renameStatusColumn(oldValue) {
            if (TF.isReadOnly()) { showToast('Lecture seule : action impossible', 'error'); return; }
            if (groupBy !== 'statut') return;
            const span = event?.currentTarget?.closest('.column-header')?.querySelector('.column-title');
            if (!span) return;
            const oldLabel = statusCfg.byValue[oldValue]?.label || oldValue;
            // Remplace le span par un input inline
            const input = document.createElement('input');
            input.className = 'column-title-input';
            input.value = oldLabel;
            input.style.width = Math.max(80, oldLabel.length * 9) + 'px';
            span.replaceWith(input);
            input.focus();
            input.select();
            let done = false;
            const finish = async (commit) => {
                if (done) return; done = true;
                const newLabel = input.value.trim();
                // Si pas de changement ou annule, on restore
                if (!commit || !newLabel || newLabel === oldLabel) { render(); return; }
                try {
                    // Trouver l'étape dans KanbanSteps
                    const step = kanbanSteps.find(s => s.valeur === oldValue && s.actif !== false);
                    if (!step) { showToast('Étape introuvable', 'error'); render(); return; }
                    
                    // Vérifier si une autre étape a déjà ce nom
                    if (kanbanSteps.some(s => s.nom.toLowerCase() === newLabel.toLowerCase() && s.valeur !== oldValue && s.actif !== false)) {
                        showToast('Une étape « ' + newLabel + ' » existe déjà', 'info');
                        render();
                        return;
                    }
                    
                    // 1. Mettre à jour toutes les tâches qui ont oldValue -> garder la même valeur, juste changer le label
                    const tasksToUpdate = tasks.filter(t => t.statut === oldValue);
                    if (tasksToUpdate.length) {
                        const actions = tasksToUpdate.map(t => ['UpdateRecord', 'Tasks', t.id, { statut: oldValue }]);
                        await grist.docApi.applyUserActions(actions);
                    }
                    
                    // 2. Mettre à jour l'étape dans KanbanSteps (juste le nom, pas la valeur)
                    await updateKanbanStep(step.id, { nom: newLabel });
                    
                    // 3. Synchroniser avec la colonne Choice
                    await syncKanbanStepsToChoice();
                    
                    // 4. Recharger les données
                    await loadAllData();
                    render();
                    showToast('Étape renommée en « ' + newLabel + ' »' + (tasksToUpdate.length ? ' (' + tasksToUpdate.length + ' tâche' + (tasksToUpdate.length > 1 ? 's' : '') + ' mise à jour)' : ''), 'success');
                } catch (e) { console.error('renameStatusColumn:', e); showToast('Erreur: ' + (e?.message || e), 'error'); render(); }
            };
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); finish(true); } else if (e.key === 'Escape') { finish(false); } });
            input.addEventListener('blur', () => finish(true));
        }

        // Réordonnancement des étapes par drag & drop
        async function handleColumnReorder(evt) {
            if (groupBy !== 'statut') return;
            
            const oldIndex = evt.oldIndex;
            const newIndex = evt.newIndex;
            
            if (oldIndex === newIndex) return;
            
            console.log('handleColumnReorder:', { oldIndex, newIndex, kanbanStepsCount: kanbanSteps.length });
            
            try {
                // Filtrer uniquement les étapes actives et triées par ordre
                const activeSteps = kanbanSteps
                    .filter(s => s.actif !== false)
                    .sort((a, b) => (a.ordre || 0) - (b.ordre || 0));
                
                console.log('Active steps before reorder:', activeSteps.map(s => ({ id: s.id, nom: s.nom, ordre: s.ordre })));
                
                // Réordonner le tableau local
                const movedStep = activeSteps.splice(oldIndex, 1)[0];
                activeSteps.splice(newIndex, 0, movedStep);
                
                console.log('Active steps after reorder:', activeSteps.map(s => ({ id: s.id, nom: s.nom, ordre: s.ordre })));
                
                // Mettre à jour les ordres dans Grist
                const actions = activeSteps.map((step, index) => 
                    ['UpdateRecord', 'KanbanSteps', step.id, { ordre: index }]
                );
                
                console.log('Grist actions:', actions);
                
                const result = await grist.docApi.applyUserActions(actions);
                console.log('Grist update result:', result);
                
                // Mettre à jour le cache local avec les nouveaux ordres
                activeSteps.forEach((step, index) => {
                    const local = kanbanSteps.find(s => s.id === step.id);
                    if (local) {
                        local.ordre = index;
                        console.log('Updated local step:', local);
                    }
                });
                
                // Mettre à jour statusCfg pour refléter le nouvel ordre
                const stepList = activeSteps.map(s => ({
                    value: s.valeur || s.nom,
                    label: s.nom,
                    fillColor: s.couleur || '#94a3b8',
                    textColor: '#ffffff'
                }));
                statusCfg = TF.buildStatusConfig(stepList, 'kanban');
                
                // Re-render pour appliquer le nouvel ordre
                render();
                showToast('Ordre des étapes mis à jour', 'success');
            } catch (e) {
                console.error('handleColumnReorder:', e);
                // En mode démo ou erreur, on garde l'ordre localement quand même
                const activeSteps = kanbanSteps
                    .filter(s => s.actif !== false)
                    .sort((a, b) => (a.ordre || 0) - (b.ordre || 0));
                const movedStep = activeSteps.splice(oldIndex, 1)[0];
                activeSteps.splice(newIndex, 0, movedStep);
                
                // Mettre à jour localement sans Grist
                const newOrderMap = new Map(activeSteps.map((s, i) => [s.id, i]));
                kanbanSteps.forEach(s => {
                    if (newOrderMap.has(s.id)) s.ordre = newOrderMap.get(s.id);
                });
                
                // Mettre à jour statusCfg
                const stepList = activeSteps.map(s => ({
                    value: s.valeur || s.nom,
                    label: s.nom,
                    fillColor: s.couleur || '#94a3b8',
                    textColor: '#ffffff'
                }));
                statusCfg = TF.buildStatusConfig(stepList, 'kanban');
                
                render();
                showToast('Ordre mis à jour (mode démo)', 'info');
            }
        }

        function buildColumns(fa) {  // fa = filtered Actions
            if (groupBy === 'statut') {
                return statusCfg.list.map(s => ({ key: s.value, label: s.label, icon: '', tasks: fa.filter(a => a.statut === s.value) }));

                return [1,2,3,4].map(p => ({ key: String(p), label: PRIORITY_LABELS[p], icon: '', tasks: fa.filter(a => a.priorite === String(p)) }));

                const cols = projects.filter(p => p.actif !== false).map(p => ({ key: String(p.id), label: p.nom, icon: `<span style="color:${p.couleur}">●</span>`, tasks: fa.filter(a => a.task && tasks.find(tk => tk.id === a.task)?.projet === p.id) }));
                cols.push({ key: 'none', label: 'Sans projet', icon: '', tasks: fa.filter(a => !a.task || !tasks.find(tk => tk.id === a.task)?.projet) });
                return cols;
            }
            return [];
        }

        async function handleDrop(evt) {
            const actionId = parseInt(evt.item.dataset.id);
            const action = actions.find(a => a.id === actionId);
            if (!action) return;

            // Lire la colonne de destination depuis evt.to (le conteneur d'arrivée).
            const colKey = (evt.to && evt.to.id) ? evt.to.id.replace(/^col-/, '') : null;
            if (colKey === null) return;

            let updates = {};
            if (groupBy === 'statut') { 
                updates.statut = colKey; 
                const _wasT = TF.isTerminal(statusCfg, action.statut), _nowT = TF.isTerminal(statusCfg, colKey); 
                if (_nowT) { updates.progression = 100; if (!_wasT) updates.dateEcheance = Math.floor(Date.now() / 1000); } 
                else if (_wasT) updates.dateEcheance = null; 
            }
            else if (groupBy === 'priorite') updates.priorite = colKey;
            else if (groupBy === 'projet') updates.task = colKey === 'none' ? null : parseInt(colKey, 10);
            
            Object.assign(action, updates);
            
            if (gristReady) {
                try { await grist.docApi.applyUserActions([['UpdateRecord', 'Actions', actionId, updates]]); showSaveIndicator(); }
                catch (e) { showToast('Erreur déplacement', 'error'); await loadAllData(); }
            }
            render();
        }

        function openActionPanel(actionId) {  // NOUVEAU: pour Actions
            const action = actions.find(a => a.id === actionId);

            selectedActionId = actionId;
            
            // Find column actions for navigation
            const fa = filterManager ? filterManager.filterTasks(tasks) : actions;
            const columns = buildColumns(fa);
            let colKey = null, colActions = [];
            for (const col of columns) {
                const idx = col.tasks.findIndex(a => a.id === actionId);
                if (idx !== -1) { colKey = col.key; colActions = col.tasks; break; }
            }
            
            panelState.actionId = actionId;
            panelState.taskIndex = colActions.findIndex(a => a.id === actionId);
            panelState.columnTasks = colActions;
            panelState.columnKey = colKey;
            panelState.isNew = false;
            panelState.editData = cloneActionData(action);
            renderPanelAction();
            openPanel();
            if (gristReady) grist.setSelectedRows([actionId]);

        function syncLocalAction() {  // NOUVEAU
            if (panelState.isNew || !panelState.actionId) return;

        // ═══════════════════════════════════════════════════════════════════════
        // FIELD HANDLERS
        // ═══════════════════════════════════════════════════════════════════════
        function updateField(field, value, noSave = false) {
            const data = panelState.editData;
            if (!data) return;
            // BUG-01 FIX: Utiliser parseInputDate pour éviter problèmes de timezone
            if (field === 'dateDebut' || field === 'dateEcheance') value = value ? dateToGrist(parseInputDate(value)) : null;
            // dateCloture auto : posee quand on passe au statut terminal, effacee si on rouvre
            if (field === 'statut') { const _wasT = TF.isTerminal(statusCfg, data.statut), _nowT = TF.isTerminal(statusCfg, value); if (_nowT && !_wasT) data.dateCloture = Math.floor(Date.now() / 1000); else if (!_nowT && _wasT) data.dateCloture = null; }
            data[field] = value;
            if (field === 'type' && value === 'jalon' && data.dateDebut) data.dateEcheance = data.dateDebut;
            
            // Synchroniser le task local pour affichage immédiat
            syncLocalTask();
            
            const visualFields = ['type', 'priorite', 'statut', 'projet', 'progression', 'couleur', 'parentTask'];
            if (visualFields.includes(field)) { renderPanelTask(); if (!panelState.isNew) render(); }
            if (field === 'titre' && panelState.isNew) { const btn = document.querySelector('.panel-footer .panel-btn.success'); if (btn) btn.disabled = !value || !value.trim(); }
            if (!panelState.isNew && !noSave && gristReady) saveTaskToGrist();
        }

        function setProgressPreset(value) {
            const data = panelState.editData;
            if (!data) return;
            data.progression = value;
            syncLocalTask();  // FIX: Synchroniser le task local

            const slider = document.querySelector('.progress-slider');
            const valueSpan = document.getElementById('progressValue');
            const barFill = document.getElementById('progressBarFill');
            if (slider) slider.value = value;
            if (valueSpan) valueSpan.textContent = value + '%';
            if (barFill) barFill.style.width = value + '%';
            document.querySelectorAll('.progress-preset').forEach(btn => btn.classList.toggle('active', parseInt(btn.textContent) === value));
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            render();
        }

        function setTodayDate() {
            const data = panelState.editData;
            if (!data) return;
            const today = dateToGrist(new Date());
            data.dateDebut = today;
            if (data.type === 'jalon') data.dateEcheance = today;
            syncLocalTask();
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
            render();
        }

        // KAN-03: Clic direct sur barre de progression
        async function setCardProgress(e, taskId) {
            const rect = e.currentTarget.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = Math.round((clickX / rect.width) * 100);
            const roundedPercent = Math.round(percent / 5) * 5;  // Arrondir à 5%
            const clampedPercent = Math.max(0, Math.min(100, roundedPercent));
            
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            task.progression = clampedPercent;
            if (task.progression === 100 && !TF.isTerminal(statusCfg, task.statut)) task.statut = statusCfg.terminalValue;
            
            if (gristReady) {
                try {
                    await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', taskId, { progression: clampedPercent, statut: task.statut }]]);
                    showToast(`${clampedPercent}%`, 'success');
                } catch (err) {
                    showToast('Erreur', 'error');
                }
            }
            render();
        }

        function toggleMultiSelect(id) { const el = document.getElementById(id); document.querySelectorAll('.multi-select').forEach(s => { if (s.id !== id) s.classList.remove('open'); }); el.classList.toggle('open'); }
        function toggleAssignee(id) { const data = panelState.editData; const idx = data.assignees.indexOf(id); if (idx === -1) data.assignees.push(id); else data.assignees.splice(idx, 1); syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); render(); }
        function removeAssignee(id) { const data = panelState.editData; const idx = data.assignees.indexOf(id); if (idx !== -1) { data.assignees.splice(idx, 1); syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); render(); } }
        function updateCharge(memberId, value) {
            const data = panelState.editData; if (!data) return;
            if (!Array.isArray(data.charges)) data.charges = [];
            const h = Math.max(0, Number(value) || 0);
            const existing = data.charges.find(c => c.teamId === memberId);
            if (existing) existing.heures = h; else data.charges.push({ teamId: memberId, heures: h });
            syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask();
        }
        function toggleDependency(id) { const data = panelState.editData; const idx = data.dependDe.indexOf(id); if (idx === -1) data.dependDe.push(id); else data.dependDe.splice(idx, 1); syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); }
        function removeDependency(id) { const data = panelState.editData; const idx = data.dependDe.indexOf(id); if (idx !== -1) { data.dependDe.splice(idx, 1); syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); } }
        function handleTagKeydown(e) { const data = panelState.editData; if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); const tag = e.target.value.trim().replace(/^#/, ''); if (tag && !data.tags.includes(tag)) { data.tags.push(tag); e.target.value = ''; syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); } } else if (e.key === 'Backspace' && !e.target.value && data.tags.length) { data.tags.pop(); syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); } }
        function removeTag(tag) { const data = panelState.editData; const idx = data.tags.indexOf(tag); if (idx !== -1) { data.tags.splice(idx, 1); syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); } }
        function showDeleteConfirm() { const el = document.getElementById('deleteConfirm'); if (el) el.style.display = 'block'; }
        function hideDeleteConfirm() { const el = document.getElementById('deleteConfirm'); if (el) el.style.display = 'none'; }

        // NOUVEAU: Gestion des tags pour Actions
        function handleActionTagKeydown(e) { const data = panelState.editData; if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); const tag = e.target.value.trim().replace(/^#/, ''); if (tag && !data.tags.includes(tag)) { data.tags.push(tag); e.target.value = ''; syncLocalAction(); if (!panelState.isNew && gristReady) saveActionToGrist(); renderPanelAction(); } } else if (e.key === 'Backspace' && !e.target.value && data.tags.length) { data.tags.pop(); syncLocalAction(); if (!panelState.isNew && gristReady) saveActionToGrist(); renderPanelAction(); } }
        function removeActionTag(tag) { const data = panelState.editData; const idx = data.tags.indexOf(tag); if (idx !== -1) { data.tags.splice(idx, 1); syncLocalAction(); if (!panelState.isNew && gristReady) saveActionToGrist(); renderPanelAction(); } }

        // NOUVEAU: Mise à jour progression par clic sur la carte Action
        function setActionCardProgress(evt, actionId) {
            const action = actions.find(a => a.id === actionId);
            if (!action) return;
            const rect = evt.currentTarget.getBoundingClientRect();
            const percent = Math.min(100, Math.max(0, Math.round((evt.clientX - rect.left) / rect.width * 100)));
            action.progression = percent;
            if (gristReady) {
                grist.docApi.applyUserActions([['UpdateRecord', 'Actions', actionId, { progression: percent }]]);
            }
            showSaveIndicator();
            render();
        }

        // A15: Mise à jour couleur membre dans la table Team
        async function setMemberColor(memberId, color) {
            const m = team.find(x => x.id === memberId);
            if (!m) return;
            m.couleur = color;  // Mise à jour locale immédiate
            if (gristReady) {
                try {
                    await grist.docApi.applyUserActions([['UpdateRecord', 'Team', memberId, { couleur: color }]]);
                    showSaveIndicator();
                } catch (e) { showToast('Erreur mise à jour couleur', 'error'); }
            }
            renderPanelTask();
            render();
        }

        // FUT-01: Gestion des subtasks/checklist
        function getSubtasks(task) {
            if (!task?.subtasks) return [];
            try { return JSON.parse(task.subtasks); } catch (e) { return []; }
        }
        function subtasksToJson(subtasks) {
            return JSON.stringify(subtasks || []);
        }
        function addSubtask() {
            const input = document.getElementById('newSubtaskInput');
            const text = input?.value?.trim();
            if (!text) return;
            const data = panelState.editData;
            if (!data.subtasks) data.subtasks = [];
            data.subtasks.push({ id: Date.now(), text: text, done: false });
            input.value = '';
            updateSubtaskProgress();
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
            render();  // FIX: Actualiser l'affichage des cartes
        }
        function toggleSubtask(id) {
            const data = panelState.editData;
            if (!data.subtasks) return;
            const st = data.subtasks.find(s => s.id === id);
            if (st) { 
                st.done = !st.done; 
                updateSubtaskProgress();
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask(); 
                render();
            }
        }
        function removeSubtask(id) {
            const data = panelState.editData;
            if (!data.subtasks) return;
            const idx = data.subtasks.findIndex(s => s.id === id);
            if (idx !== -1) {
                data.subtasks.splice(idx, 1);
                updateSubtaskProgress();
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
                render();  // FIX: Actualiser l'affichage des cartes
            }
        }
        // Édite le texte d'un item de checklist (pas de renderPanelTask -> garde le focus dans l'input)
        function editSubtask(id, value) {
            const data = panelState.editData;
            if (!data || !data.subtasks) return;
            const st = data.subtasks.find(s => s.id === id);
            if (!st) return;
            const t = (value || '').trim();
            if (!t || t === st.text) return;
            st.text = t;
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            render();
        }
        function updateSubtaskProgress() {
            const data = panelState.editData;
            if (!data.subtasks || data.subtasks.length === 0) return;
            const done = data.subtasks.filter(s => s.done).length;
            const total = data.subtasks.length;
            data.progression = Math.round((done / total) * 100);
            syncLocalTask();  // FIX: Synchroniser immédiatement pour affichage correct
        }
        function handleSubtaskKeydown(e) {
            if (e.key === 'Enter') { e.preventDefault(); addSubtask(); }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // CRUD
        // ═══════════════════════════════════════════════════════════════════════
        async function saveTaskToGrist() {
            const data = panelState.editData;
            if (!data || panelState.isNew || !gristReady) return;
            if (data.dateDebut && data.dateEcheance && data.dateDebut > data.dateEcheance) { showToast('La date de début ne peut pas dépasser la date de fin', 'error'); return; }
            syncLocalTask();  // FIX: Synchroniser localement avant envoi API
            const record = { titre: data.titre, description: data.description, type: data.type, priorite: data.priorite, statut: data.statut, progression: data.progression, dateDebut: data.dateDebut, dateEcheance: data.dateEcheance, projet: data.projet, assignees: toGristRefList(data.assignees), dependDe: toGristRefList(data.dependDe), tags: toGristChoiceList(data.tags), estimationH: data.estimationH, tempsPasse: data.tempsPasse, subtasks: subtasksToJson(data.subtasks), couleur: data.couleur || null, parentTask: data.parentTask || null, charges: TF.chargesToJson((data.charges || []).filter(c => data.assignees.includes(c.teamId))), dateCloture: data.dateCloture || null };
            try { await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', panelState.taskId, pruneTaskRecord(record)]]); showSaveIndicator(); } catch (e) { showToast('Erreur sauvegarde', 'error'); }
        }

        // NOUVEAU: Sauvegarde Action
        async function saveActionToGrist() {
            const data = panelState.editData;
            if (!data || panelState.isNew || !gristReady) return;
            if (data.dateDebut && data.dateEcheance && data.dateDebut > data.dateEcheance) { showToast('La date de début ne peut pas dépasser la date de fin', 'error'); return; }
            syncLocalAction();
            const record = { 
                titre: data.titre, 
                description: data.description, 
                statut: data.statut, 
                priorite: data.priorite, 
                progression: data.progression, 
                dateDebut: data.dateDebut, 
                dateEcheance: data.dateEcheance,
                task: typeof data.task === 'object' ? data.task.id : data.task,
                assignee: data.assignee,
                estimationH: data.estimationH,
                tags: toGristChoiceList(data.tags),
                couleur: data.couleur || null,
                ordre: data.ordre || 0
            };
            console.log('[DIAG assignee] update record:', record);
            try { 
                const result = await grist.docApi.applyUserActions([['UpdateRecord', 'Actions', panelState.actionId, record]]);
                console.log('[DIAG assignee] update result:', result);
                showSaveIndicator(); 
            } catch (e) { 
                console.error('[DIAG assignee] update error:', e);
                showToast('Erreur sauvegarde', 'error'); 
            }
        }

        async function createTask() {
            const data = panelState.editData;

                useDemoMode();
                return;

            // Grist est prêt, on peut initialiser

            // #7 respect des droits : bandeau lecture seule + garde transverse sur toutes les ecritures.
