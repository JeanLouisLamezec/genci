// ---- Saisie d'une cellule -------------------------------------------------
async function setCell(taskId, dayMs, personId, qtyStr) {
  const hours = qtyToHours(qtyStr);
  const cap = dayCapacityForPerson(dayMs, personId);
  
  // Bloquer la saisie si le jour est en indisponibilité totale
  if (cap === 0) {
    toast('Impossible de saisir du temps sur un jour en congé/indisponibilité');
    render();
    return;
  }
  
  // Vérifier le verrouillage de la semaine
  const weekLock = CRAController.isPersonWeekLocked(
    personId,
    CRAController.localDayKeyFromMs(S.weekStart),
    S.feuilles
  );
  
  if (weekLock.locked) {
    toast('Semaine verrouillée - saisie impossible');
    render();
    return;
  }
  
  // Résoudre l'affectation active (PHASE 1.1.3 : avec date)
  const dayIso = CRAController.localDayKeyFromMs(dayMs);
  const assignmentResult = CRAController.resolveActiveAssignment(
    taskId,
    personId,
    dayIso,  // PHASE 1.1.3 : Date pour filtrer les affectations
    S.assignments
  );
  
  if (assignmentResult.status === 'ambiguous') {
    toast('Erreur : plusieurs affectations actives pour cette tâche. Veuillez corriger le planning.');
    render();
    return;
  }
  
  const activeAssignment = assignmentResult.assignment;
  
  // Trouver la feuille actuelle pour la personne et la semaine
  const currentSheet = S.feuilles.find(f => 
    f.membre === personId && sameDay(gristToMs(f.semaine), S.weekStart)
  );
  
  // Résoudre l'entrée éditable
  const dayIso = CRAController.localDayKeyFromMs(dayMs);
  const entryResult = CRAController.resolveEditableCellEntry(
    S.entries, taskId, dayIso, personId, activeAssignment
  );
  
  if (entryResult.status === 'multiple') {
    toast('Erreur : plusieurs entrées pour cette cellule. Veuillez corriger manuellement.');
    render();
    return;
  }
  
  const existingEntry = entryResult.entry;
  
  // Vérifier si la ligne a des champs de planning
  const hasPlanningData = CRAController.hasPlanningFields(existingEntry);
  
  // Déterminer l'action à effectuer
  const actionResult = CRAController.determineEntryAction(
    existingEntry, hours, activeAssignment, currentSheet, hasPlanningData
  );
  
  // PHASE 1.1.4 : Gérer le blocage création sans affectation
  if (actionResult.action === 'blocked') {
    if (actionResult.reason === 'MISSING_ACTIVE_ASSIGNMENT') {
      toast('Aucune affectation active pour cette tâche et cette personne à cette date');
    } else {
      toast('Action bloquée : ' + actionResult.reason);
    }
    render();
    return;
  }
  
  // Exécuter l'action
  if (S.alone) {
    // Mode démo
    if (actionResult.action === 'update' && existingEntry) {
      Object.assign(existingEntry, actionResult.fields);
    } else if (actionResult.action === 'create') {
      const nid = Math.max(0, ...S.entries.map(e => e.id)) + 1;
      S.entries.push({ 
        id: nid, 
        membre: personId, 
        tache: taskId, 
        date: msToGrist(dayMs), 
        ...actionResult.fields 
      });
    } else if (actionResult.action === 'delete' && existingEntry) {
      S.entries = S.entries.filter(e => e !== existingEntry);
    }
    buildCraIndexes();
    render();
    return;
  }
  
  try {
    if (actionResult.action === 'update' && existingEntry) {
      await grist.docApi.applyUserActions([
        ['UpdateRecord', 'TimeEntries', existingEntry.id, actionResult.fields]
      ]);
      // Mettre à jour localement
      Object.assign(existingEntry, actionResult.fields);
    } else if (actionResult.action === 'create') {
      const fieldsToCreate = {
        membre: personId,
        tache: taskId,
        date: msToGrist(dayMs),
        heuresPrevues: 0,  // PHASE 1.1.5 : Initialiser explicitement
        revisionPlan: 0,   // PHASE 1.1.5 : Initialiser explicitement
        ...actionResult.fields
      };
      
      // PHASE 1.1.5 : Ajouter référence capacité si disponible
      const capacityResult = CRAController.dailyCapacityForPersonAndDate(
        personId,
        dayMs,
        S.dailyCapacities || [],
        S.team || [],
        S.disponibilites || []
      );
      
      if (capacityResult.capacity > 0) {
        fieldsToCreate.capaciteTheorique = capacityResult.capacity;
        fieldsToCreate.capaciteDisponible = capacityResult.capacity;
      }
      
      const r = await grist.docApi.applyUserActions([
        ['AddRecord', 'TimeEntries', null, fieldsToCreate]
      ]);
      S.entries.push({ id: r.retValues[0], ...fieldsToCreate });
    } else if (actionResult.action === 'delete' && existingEntry) {
      await grist.docApi.applyUserActions([
        ['RemoveRecord', 'TimeEntries', existingEntry.id]
      ]);
      S.entries = S.entries.filter(e => e !== existingEntry);
    }
    
    // PHASE 1.1.6 : SUPPRESSION écriture Tasks.tempsPasse
    // Cette écriture sort du contrat du CRA et sera gérée par une formule Grist ou un service dédié
    
    // Reconstruire les index après modification locale
    buildCraIndexes();
    render();
  } catch (e) { 
    toast('Ecriture refusee : ' + (e.message || e)); 
    render(); 
  }
}

/**
 * Extrait l'ID d'un enregistrement créé par applyUserActions
 * @param {*} actionResult - Résultat de AddRecord
 * @param {string} label - Label pour le message d'erreur
 * @returns {number} ID de l'enregistrement
 */
function getAddedRecordId(actionResult, label) {
  let value = actionResult;

  if (
    value &&
    Array.isArray(value.retValues) &&
    value.retValues.length
  ) {
    value = value.retValues[0];
  } else if (Array.isArray(value)) {
    value = value[0];
  }

  if (typeof value === 'number' && Number.isFinite(value)) {
    return value;
  }

  if (
    value &&
    typeof value === 'object' &&
    typeof value.id === 'number'
  ) {
    return value.id;
  }

  throw new Error(
    'ID de ligne introuvable après AddRecord' +
    (label ? ' (' + label + ')' : '') +
    ': ' + JSON.stringify(actionResult)
  );
}

/**
 * Soumet une semaine pour une personne donnée
 * 1. Obtient ou crée la feuille
 * 2. Identifie les TimeEntries de la semaine
 * 3. Contrôle les liens existants
 * 4. Rattache puis soumet
 */
async function submitWeekForPerson(personId) {
  const weekStartMs = S.weekStart;
  const weekStartIso = new Date(weekStartMs).toISOString().split('T')[0];
  
  try {
    // Étape 1 : Obtenir ou créer la feuille
    let sheet = S.feuilles.find(f => {
      const sheetDate = typeof f.semaine === 'number'
        ? new Date(f.semaine * 1000).toISOString().split('T')[0]
        : f.semaine;
      return f.membre === personId && sheetDate === weekStartIso;
    });
    
    let sheetId = sheet ? sheet.id : null;
    
    // Créer la feuille si elle n'existe pas
    if (!sheet) {
      const weekStartGrist = Math.floor(weekStartMs / 1000);
      const result = await grist.docApi.applyUserActions([
        ['AddRecord', 'Feuilles', null, { membre: personId, semaine: weekStartGrist, statut: 'brouillon' }]
      ]);
      sheetId = getAddedRecordId(result, 'Feuille ' + weekStartIso);
      
      // Recharger les feuilles pour avoir la nouvelle
      const sheetsData = await grist.docApi.fetchTable('Feuilles');
      const sheetsRows = colObjToRows(sheetsData);
      sheet = sheetsRows.find(s => s.id === sheetId);
      if (!sheet) {
        throw new Error('Feuille créée mais introuvable : ' + sheetId);
      }
      S.feuilles.push({
        id: sheet.id,
        membre: sheet.membre,
        semaine: sheet.semaine,
        statut: sheet.statut,
        validePar: sheet.validePar,
        motifRejet: sheet.motifRejet
      });
    }
    
    // Étape 2 : Identifier les TimeEntries de la semaine (lundi 00:00 à dimanche 23:59)
    const weekEndMs = weekStartMs + (7 * 24 * 60 * 60 * 1000);
    const entriesToLink = S.entries.filter(e => {
      if (e.membre !== personId) return false;
      const entryDateMs = typeof e.date === 'number' ? e.date * 1000 : 0;
      return entryDateMs >= weekStartMs && entryDateMs < weekEndMs;
    });
    
    // Étape 3 : Contrôler les liens existants
    for (const entry of entriesToLink) {
      if (entry.feuille != null && entry.feuille !== 0 && entry.feuille !== sheetId) {
        console.warn('TimeEntry ' + entry.id + ' liée à une autre feuille : ' + entry.feuille);
        throw new Error(
          'Ligne ' + entry.id + ' du ' + 
          new Date(entry.date * 1000).toLocaleDateString('fr-FR') +
          ' est liée à une autre feuille. Impossible de soumettre.'
        );
      }
    }
    
    // Étape 4 : Rattacher puis soumettre
    if (entriesToLink.length > 0) {
      const attachActions = entriesToLink.map(e => [
        'UpdateRecord',
        'TimeEntries',
        e.id,
        { feuille: sheetId }
      ]);
      
      // Ajouter la mise à jour du statut en DERNIER
      attachActions.push(['UpdateRecord', 'Feuilles', sheetId, { statut: 'soumis' }]);
      
      await grist.docApi.applyUserActions(attachActions);
      
      // Mettre à jour le cache local
      for (const entry of entriesToLink) {
        entry.feuille = sheetId;
      }
      sheet.statut = 'soumis';
    } else {
      // Aucune entrée à rattacher, juste soumettre la feuille
      await grist.docApi.applyUserActions([
        ['UpdateRecord', 'Feuilles', sheetId, { statut: 'soumis' }]
      ]);
      sheet.statut = 'soumis';
    }
    
    // Recharger les données depuis Grist
    await reloadCra('submit-week', { immediate: true });
    toast('Semaine soumise pour validation (' + S.team.find(t => t.id === personId).nom + ')');
  } catch (e) {
    // En cas d'échec, recharger depuis Grist pour annuler l'optimiste
    try {
      await reloadCra('write-error-recovery', { immediate: true });
    } catch (reloadError) {
      // Ignorer les erreurs de rechargement
    }
    toast('Refuse : ' + (e.message || e));
  }
}

// ---- Export Excel (CSV + BOM, comme le Plan) ------------------------------
function exportCSV() {
  const nameOf = (id) => { const p = S.team.find(t => t.id === id); return p ? p.nom : id; };
  const taskOf = (id) => { const t = S.tasks.find(x => x.id === id); return t ? t.titre : id; };
  const projOf = (id) => { const t = S.tasks.find(x => x.id === id); if (!t) return ''; const p = S.projects.find(x => x.id === t.projet); return p ? p.nom : ''; };
  const statutOf = (membre, dateSec) => { const wk = mondayOf(dateSec * 1000); const f = S.feuilles.find(x => x.membre === membre && sameDay(gristToMs(x.semaine), wk)); return f ? f.statut : 'brouillon'; };
  const fmtDate = (sec) => { const d = new Date(sec * 1000); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); };
  const rows = [['Agent', 'Date', 'Projet/Imputation', 'Tache', 'Heures realisees', 'Heures prevues', 'Ecart', 'Statut feuille']];
  S.entries.slice().sort((a, b) => a.date - b.date).forEach(e => {
    const realized = Number(e.heures) || 0;
    const planned = Number(e.heuresPrevues) || 0;
    const gap = realized - planned;
    rows.push([
      nameOf(e.membre), 
      fmtDate(e.date), 
      projOf(e.tache), 
      taskOf(e.tache), 
      String(realized),
      String(planned),
      String(gap),
      statutOf(e.membre, e.date)
    ]);
  });
  const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(';')).join('\r\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'feuilles-de-temps.csv'; a.click();
}

function colObjToRows(d) { const rows = []; const ids = d.id || []; for (let i = 0; i < ids.length; i++) { const o = {}; for (const k in d) o[k] = d[k][i]; rows.push(o); } return rows; }

async function getMyUserId() {
  try { const tok = await grist.docApi.getAccessToken({ readOnly: true }); const p = JSON.parse(atob(tok.token.split('.')[1])); return p.userId || null; } catch (e) { return null; }
}

// chaine_chefs d'une personne = chefs de son entite + entites ancetres (Entites.parent), borne anti-cycle.
function chaineChefsOf(entiteId) {
  const byId = {}; for (const e of (S.entites || [])) byId[e.id] = e;
  const chefs = []; const seen = new Set(); let e = byId[entiteId];
  while (e && !seen.has(e.id)) { seen.add(e.id); if (e.chef) chefs.push(e.chef); e = e.parent ? byId[e.parent] : null; }
  return chefs;
}
// agents_geres de "me" = personnes (hors soi) dont la chaine_chefs contient me. Replique F_GERES de l'annuaire.
function computeMesGeres(me) {
  const out = [];
  for (const a of (S.team || [])) { if (a.id === me) continue; if (chaineChefsOf(a.entite).includes(me)) out.push(a.id); }
  return out;
}

/**
 * Assure une instance unique de FilterManager (TODO 8)
 */
function ensureFilterManager() {
  if (S.filterManager && craFilterManagerInitialized) {
    return S.filterManager;
  }
  
  // Initialiser le FilterManager
  S.filterManager = new FilterManager({
    data: {
      team: S.team || [],
      entites: S.entites || [],
      projects: S.projects || [],
      tasks: S.tasks || [],
      programmes: S.programmes || []
    },
    initialFilters: S.filters || { assignee: [], team: [], project: [], programme: [] },
    onChange: (filters) => {
      S.filters = filters;
      
      // Calculer les personnes visibles selon les filtres
      S.visiblePersonIds = (S.team || []).filter(m => {
        if (!filters.assignee.length && !filters.team.length) {
          return true;
        }
        if (filters.assignee.length && !filters.assignee.includes(Number(m.id))) {
          return false;
        }
        if (filters.team.length && !filters.team.includes(Number(m.entite))) {
          return false;
        }
        return true;
      }).map(m => m.id);
      
      // Si aucune personne visible, afficher au moins la première
      if (S.visiblePersonIds.length === 0 && S.team.length > 0) {
        S.visiblePersonIds = [S.team[0].id];
      }
      
      // Mettre à jour S.me
      if (S.visiblePersonIds.length === 1) {
        S.me = S.visiblePersonIds[0];
        const meRow = S.team.find(t => t.id === S.me);
        S.meName = meRow ? meRow.nom : '';
      } else if (!S.visiblePersonIds.includes(S.me)) {
        S.me = S.visiblePersonIds[0];
        const meRow = S.team.find(t => t.id === S.me);
        S.meName = meRow ? meRow.nom : '';
      }
      
      render();
    },
    onBroadcast: (filters) => {
      if (grist?.widgetApi) {
        grist.widgetApi.setOptions({ filters });
      }
    },
    effCharges: (t) => {
      try {
        return t.charges ? JSON.parse(t.charges) : [];
      } catch (e) { return []; }
    },
    teamById: (id) => S.team.find(t => t.id === Number(id)) || null,
    theme: 'light'
  });
  
  // Initialiser l'UI avec les conteneurs
  const containers = {
    assignee: document.getElementById('filterPersonContainer'),
    team: document.getElementById('filterTeamContainer'),
    project: document.getElementById('filterProjectContainer'),
    programme: document.getElementById('filterProgramContainer')
  };
  const filterPanel = document.getElementById('filterPanel');
  
  S.filterManager.initUI(containers, filterPanel);
  craFilterManagerInitialized = true;
  
  return S.filterManager;
}

/**
 * Met à jour le FilterManager avec les nouvelles données (TODO 8)
 */
function updateFilterManagerData() {
  const manager = ensureFilterManager();
  manager.setData({
    team: S.team,
    entites: S.entites || [],
    projects: S.projects,
    tasks: S.tasks,
    programmes: S.programmes || []
  });
}

/**
 * Construit les index de données pour le rendu (TODO 10)
 * 
 * PHASE 3 - CORRECTIONS :
 * - Utilise affectation + date comme clé canonique (pas tache + membre + date)
 * - Initialise weekStart s'il est manquant
 * - Reconstruit les index à chaque appel (pas de cache figé)
 */
function buildCraIndexes() {
  // PHASE 3 : Initialiser weekStart s'il est manquant
  if (!S.weekStart) {
    S.weekStart = mondayOf(Date.now());
    console.warn('[CRA] buildCraIndexes: weekStart initialisé par défaut', new Date(S.weekStart).toISOString());
  }
  
  S.indexes = {
    teamById: new Map(),
    taskById: new Map(),
    projectById: new Map(),
    // PHASE 3 : Nouvelle clé : affectation|date (ou tache|date en fallback)
    entriesByAssignmentDate: new Map(),
    entriesByTaskDate: new Map(),  // Fallback pour données legacy
    assignmentsByPersonTask: new Map(),
    dailyCapacityByPersonDate: new Map(),
    feuillesByPersonWeek: new Map()
  };
  
  // Index team
  for (const m of S.team) {
    S.indexes.teamById.set(m.id, m);
  }
  
  // Index tasks
  for (const t of S.tasks) {
    S.indexes.taskById.set(t.id, t);
  }
  
  // Index projects
  for (const p of S.projects) {
    S.indexes.projectById.set(p.id, p);
  }
  
  // PHASE 3 : Index entries par affectation + date (clé canonique)
  const mondayMs = S.weekStart;
  const sundayMs = mondayMs + (6 * 24 * 60 * 60 * 1000);
  
  for (const e of S.entries) {
    const personId = e.membre;
    const entryMs = typeof e.date === 'number' ? e.date * 1000 : 0;
    
    // Index par affectation + date (clé canonique)
    if (e.affectation != null && e.affectation !== 0) {
      const assignmentKey = e.affectation + '|' + e.date;
      if (!S.indexes.entriesByAssignmentDate.has(assignmentKey)) {
        S.indexes.entriesByAssignmentDate.set(assignmentKey, []);
      }
      S.indexes.entriesByAssignmentDate.get(assignmentKey).push(e);
    }
    
    // Index par tache + date (fallback pour données legacy)
    if (e.tache != null && entryMs >= mondayMs && entryMs <= sundayMs) {
      const taskKey = personId + '|' + e.tache + '|' + e.date;
      if (!S.indexes.entriesByTaskDate.has(taskKey)) {
        S.indexes.entriesByTaskDate.set(taskKey, []);
      }
      S.indexes.entriesByTaskDate.get(taskKey).push(e);
    }
    
    // Index daily capacity
    if (e.capaciteJour) {
      const capKey = personId + '|' + e.date;
      S.indexes.dailyCapacityByPersonDate.set(capKey, e.capaciteJour);
    }
  }
  
  // Index feuilles par personne + semaine
  for (const f of S.feuilles) {
    const fWeekMs = typeof f.semaine === 'number' ? f.semaine * 1000 : 0;
    if (fWeekMs >= mondayMs && fWeekMs <= sundayMs + (24 * 60 * 60 * 1000)) {
      const key = f.membre + '|' + f.semaine;
      S.indexes.feuillesByPersonWeek.set(key, f);
    }
  }
  
  // Index assignments par personne + tache
  for (const a of S.assignments) {
    if (a.actif) {
      const key = a.membre + '|' + a.tache;
      S.indexes.assignmentsByPersonTask.set(key, a);
    }
  }
  
  // PHASE 1.1.7 : Ajouter index entriesByPersonWeek (manquant)
  // Utilisé par les totaux et agrégats hebdomadaires
  for (const e of S.entries) {
    const personId = e.membre;
    const entryMs = typeof e.date === 'number' ? e.date * 1000 : 0;
    
    if (entryMs >= mondayMs && entryMs <= sundayMs) {
      const key = personId + '|' + e.tache;
      if (!S.indexes.entriesByPersonWeek.has(key)) {
        S.indexes.entriesByPersonWeek.set(key, []);
      }
      S.indexes.entriesByPersonWeek.get(key).push(e);
    }
  }
  
  console.info('[CRA]', {
    phase: 'indexes-built',
    entryCount: S.entries.length,
    assignmentCount: S.assignments.length,
    indexSize: {
      entriesByAssignmentDate: S.indexes.entriesByAssignmentDate.size,
      entriesByTaskDate: S.indexes.entriesByTaskDate.size,
      entriesByPersonWeek: S.indexes.entriesByPersonWeek.size,
      feuillesByPersonWeek: S.indexes.feuillesByPersonWeek.size
    }
  });
}

// Les fonctions applyCraSnapshot, requestCraReload, runReloadLoop, loadCraSnapshotForReason,
// ensureCraReadyAndLoad sont maintenant dans CraDataLoader et configurées via CraDataLoader.configure()

/**
 * Helper : affiche l'état de chargement (TODO 10)
 */
function showCraLoading(message) {
  const main = document.getElementById('main');
  if (main) {
    main.innerHTML = '<div class="empty-cta">' + (message || 'Chargement…') + '</div>';
  }
}

/**
 * Helper : affiche une erreur (TODO 10)
 */
function showCraError(error) {
  const main = document.getElementById('main');
  if (main) {
    main.innerHTML = '<div class="empty-cta error-state">' +
      '<strong>Impossible de charger le CRA</strong><br>' +
      '<p>Les données Grist n\'ont pas pu être chargées.</p>' +
      '<p style="font-size:0.8em;color:#64748b">' + esc(error.message || error) + '</p>' +
      '<button class="btn" id="retry-cra-load" style="margin-top:12px">Réessayer</button>' +
      '</div>';
    
    const retryBtn = document.getElementById('retry-cra-load');
    if (retryBtn) {
      retryBtn.addEventListener('click', () => {
        CraDataLoader.requestCraReload({
          reason: 'manual-retry',
          immediate: true,
          allowSchemaRecovery: true
        }).catch(console.error);
      });
    }
  }
}

/**
 * Enregistre les listeners Grist une seule fois (TODO 7, 12)
 */
let craGristListenersRegistered = false;

/**
 * Applique les options externes (filtres partagés via grist.onOptions)
 */
function applyExternalOptions(options) {
  const filters = options && options.filters;

  if (!filters) {
    return;
  }

  const manager = ensureFilterManager();

  if (typeof manager.applyExternalFilters === 'function') {
    manager.applyExternalFilters(filters);
  } else if (typeof manager.setState === 'function') {
    manager.setState(filters);
  }
}

function registerGristListenersOnce() {
  if (craGristListenersRegistered) {
    return;
  }
  
  craGristListenersRegistered = true;
  
  grist.onRecords(() => {
    CraDataLoader.requestCraReload({
      reason: 'grist.onRecords',
      immediate: false,
      allowSchemaRecovery: false
    }).catch(error => {
      console.error('[CRA] Reload onRecords', error);
    });
  });
  
  grist.onOptions(options => {
    applyExternalOptions(options);
  });
}

/**
 * Initialisation optimisée de Grist (TODO 1, 2, 11, 12)
 */
async function initGrist() {
  try {
    showCraLoading('Connexion à Grist…');
    
    await grist.ready({
      requiredAccess: 'full'
    });
    
    craPerfLog('grist.ready');
    
    S.alone = false;
    
    TF.readOnlyBanner();
    
    TF.guardWrites(grist, {
      onReadOnly: () => {
        toast('Lecture seule : modification non autorisée');
      },
      onDenied: (error) => {
        toast('Modification refusée par vos droits');
        CraDataLoader.requestCraReload({
          reason: 'acl-denied',
          immediate: false,
          allowSchemaRecovery: false
        }).catch(console.error);
      }
    });
    
    // Vérification défensive (TODO 1)
    if (!globalThis.CraDataLoader) {
      throw new Error('CraDataLoader indisponible : vérifiez le chargement du script');
    }
    
    // Configuration du loader (TODO 2)
    CraDataLoader.configure({
      grist: grist,
      bootstrap: typeof TaskFlowBootstrap !== 'undefined' ? TaskFlowBootstrap : null,
      isReadOnly: TF.isReadOnly,
      applySnapshot: function(normalized, metadata) {
        // PHASE 3 : Application atomique avec initialisation défensive
        Object.assign(S, normalized);
        
        // PHASE 3 : Initialiser la semaine courante SI non définie
        // Ceci garantit que la semaine n'est jamais undefined ou null
        if (!S.weekStart || typeof S.weekStart !== 'number') {
          S.weekStart = mondayOf(Date.now());
          console.info('[CRA]', {
            phase: 'snapshot',
            weekStartInitialized: new Date(S.weekStart).toISOString(),
            reason: 'week-was-missing'
          });
        } else {
          console.info('[CRA]', {
            phase: 'snapshot',
            weekStart: new Date(S.weekStart).toISOString(),
            entryCount: S.entries.length
          });
        }
        
        // Calculer "qui je gere" après chaque snapshot
        S.mesGeres = S.me ? computeMesGeres(S.me) : [];
        
        // PHASE 3 : Reconstruire les index (utilise maintenant affectation+date)
        buildCraIndexes();
        ensureFilterManager();
        updateFilterManagerData();
        render();
      },
      showLoading: function(message) {
        showCraLoading(message);
      },
      showError: function(error) {
        showCraError(error);
      },
      onSchemaUpgrade: function(inspection) {
        showCraLoading('Mise à niveau du document…');
        console.info('[CRA] Réparation du schéma', inspection);
      }
    });
    
    // Enregistrer les listeners une seule fois (TODO 12)
    registerGristListenersOnce();
    
    // Charger avec fast path (TODO 5, 6)
    await CraDataLoader.requestCraReload({
      reason: 'initial',
      immediate: true,
      allowSchemaRecovery: true
    });
    
    craPerfLog('init.complete');
    
  } catch (error) {
    console.error('[CRA] Initialisation Grist impossible', error);
    
    showCraError(error);
    
    // Mode démo uniquement si hors iframe Grist
    if (window.self === window.top) {
      loadDemo();
    }
  }
}

// Démarrage
initGrist();
</script>
