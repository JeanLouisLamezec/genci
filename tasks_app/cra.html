<style>
:root {
  --primary: #3e5de7; --primary-dark: #2845c1;
  --bg: #f8fafc; --card-bg: #fff; --text: #1e293b; --text-muted: #64748b;
  --border: #e2e8f0; --ok: #10b981; --warn: #f59e0b; --over: #ef4444;
  --cell: #fff; --cell-fill: #eef2ff;
}
@media (prefers-color-scheme: dark) {
  :root {
    --primary: #6b7cff; --primary-dark: #8b9bff;
    --bg: #0f1525; --card-bg: #1a2236; --text: #e2e8f0; --text-muted: #94a3b8;
    --border: #2a3550; --ok: #34d399; --warn: #fbbf24; --over: #f87171;
    --cell: #141b2e; --cell-fill: #232f52;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { display: flex; flex-direction: column; background: var(--bg); color: var(--text); overflow: hidden; }
.topbar { flex-shrink: 0; display: flex; align-items: center; gap: 14px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--card-bg); flex-wrap: wrap; }
h1 { font-size: 1.15rem; font-weight: 700; }
.status { display: flex; align-items: center; gap: 6px; font-size: .78rem; color: var(--text-muted); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
.dot.ok { background: var(--ok); }
.sp { flex: 1; }
.week { display: flex; align-items: center; gap: 4px; }
.wbtn { border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); border-radius: 7px; padding: 5px 9px; font-size: .78rem; cursor: pointer; font-family: inherit; line-height: 1; }
.wbtn:hover { color: var(--text); }
.wlabel { font-size: .82rem; font-weight: 600; min-width: 150px; text-align: center; }
.seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.seg button { border: none; background: var(--bg); color: var(--text-muted); padding: 6px 11px; font-size: .76rem; font-weight: 600; cursor: pointer; font-family: inherit; }
.seg button.active { background: var(--primary); color: #fff; }
.btn { border: 1px solid var(--primary); background: var(--primary); color: #fff; border-radius: 8px; padding: 7px 14px; font-size: .8rem; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn.ghost { background: var(--bg); color: var(--text); border-color: var(--border); }
.btn:hover { background: var(--primary-dark); }
.main { flex: 1; overflow: auto; padding: 18px 20px; }
.empty-cta { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: .9rem; line-height: 1.7; }
table.grid { border-collapse: collapse; width: 100%; font-size: .82rem; }
table.grid th, table.grid td { border: 1px solid var(--border); padding: 0; }
table.grid thead th { background: var(--card-bg); font-weight: 600; padding: 8px 10px; text-align: center; white-space: nowrap; color: var(--text-muted); }
table.grid thead th.left { text-align: left; }
table.grid th.today { color: var(--primary); }
.tcell { padding: 8px 10px; }
.tcell .tt { font-weight: 600; }
.tcell .tp { font-size: .72rem; color: var(--text-muted); }
td.day { width: 70px; }
td.day input { width: 100%; height: 38px; border: none; background: var(--cell); color: var(--text); text-align: center; font-family: inherit; font-size: .82rem; outline: none; }
td.day input:focus { background: var(--cell-fill); box-shadow: inset 0 0 0 2px var(--primary); }
td.day.filled input { background: var(--cell-fill); font-weight: 600; }
td.day.indispo-cell { background: var(--bg); }
td.day.indispo-cell div { background: repeating-linear-gradient(45deg, var(--bg), var(--bg) 10px, color-mix(in srgb, var(--border) 30%, var(--bg)) 10px, color-mix(in srgb, var(--border) 30%, var(--bg)) 20px); }
td.today { background: color-mix(in srgb, var(--primary) 7%, transparent); }
th.indispo { background: color-mix(in srgb, var(--warn) 15%, var(--card-bg)); color: var(--warn); }
td.total, th.total { text-align: center; font-weight: 700; background: var(--card-bg); padding: 8px 10px; }
tfoot td { background: var(--card-bg); font-weight: 700; text-align: center; padding: 9px 10px; }
tfoot td.left { text-align: left; color: var(--text-muted); font-weight: 600; }
.over { color: var(--over); }
.addrow { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
.addrow select { background: var(--card-bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 7px 9px; font-size: .8rem; font-family: inherit; }
.legend { flex-shrink: 0; display: flex; gap: 16px; padding: 8px 20px; border-top: 1px solid var(--border); background: var(--card-bg); font-size: .72rem; color: var(--text-muted); }
.toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--card-bg); padding: 9px 16px; border-radius: 8px; font-size: .8rem; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 50; }
.toast.show { opacity: 1; }
.fstatus { padding: 8px 12px; border-radius: 8px; font-size: .78rem; font-weight: 700; margin-bottom: 12px; }
.fstatus.soumis { background: color-mix(in srgb, var(--warn) 18%, transparent); color: var(--warn); }
.fstatus.valide { background: color-mix(in srgb, var(--ok) 18%, transparent); color: var(--ok); }
.fstatus.rejete { background: color-mix(in srgb, var(--over) 18%, transparent); color: var(--over); }
.fbadge { font-size: .66rem; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; }
.fbadge.brouillon { background: var(--border); color: var(--text-muted); }
.fbadge.soumis { background: color-mix(in srgb, var(--warn) 20%, transparent); color: var(--warn); }
.fbadge.valide { background: color-mix(in srgb, var(--ok) 20%, transparent); color: var(--ok); }
.fbadge.rejete { background: color-mix(in srgb, var(--over) 20%, transparent); color: var(--over); }
.tcell .btn { padding: 5px 10px; font-size: .74rem; }
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-ov.open { display: flex; }
.modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; width: min(560px,92vw); max-height: 88vh; overflow: auto; padding: 22px 24px; box-shadow: 0 12px 40px rgba(0,0,0,.4); }
.modal h2 { font-size: 1.05rem; margin-bottom: 6px; }
.csub { font-size: .82rem; color: var(--text-muted); margin-bottom: 14px; line-height: 1.45; }
.cstatus { font-size: .8rem; font-weight: 600; padding: 8px 11px; border-radius: 8px; margin-bottom: 12px; }
.cstatus.ok { background: color-mix(in srgb, var(--ok) 16%, transparent); color: var(--ok); }
.cstatus.off { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
.cstatus.err { background: color-mix(in srgb, var(--over) 16%, transparent); color: var(--over); }
.cprereq { font-size: .74rem; color: var(--text-muted); background: var(--bg); border-left: 3px solid var(--warn); padding: 8px 11px; border-radius: 0 6px 6px 0; margin-bottom: 14px; }
.modal details { margin-bottom: 12px; } .modal summary { font-size: .78rem; font-weight: 600; cursor: pointer; color: var(--text-muted); }
.modal pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: .7rem; overflow: auto; white-space: pre-wrap; color: var(--text); margin-top: 8px; }
.cacts { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
.cbtn { border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 8px; padding: 8px 14px; font-size: .8rem; font-weight: 600; cursor: pointer; font-family: inherit; }
.cbtn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.cbtn.danger { color: var(--over); }
.cbtn:disabled { opacity: .5; cursor: default; }
.planned-indicator { font-size: .7rem; color: var(--text-muted); margin-top: 3px; text-align: center; }
.planned-indicator strong { color: var(--primary); }
</style>

<div class="topbar">

    <div class="filter-panel" id="filterPanel">

<script>
// <taskflow-core> -- GENERE par scripts/build-taskflow.js, NE PAS EDITER ICI
/* ============================================================================
 * taskflow-core.js — Module commun aux widgets TaskFlow
 * ----------------------------------------------------------------------------
 * SOURCE UNIQUE. Inline dans chaque widget par scripts/build-taskflow.js entre
 * les marqueurs de generation prevus a cet effet.
 * NE PAS editer la copie inlinee dans les .html : editer CE fichier puis lancer
 *   npm run build:taskflow
 *
 * Expose un objet `TF` (namespace) pour ne jamais entrer en collision avec les
 * helpers locaux existants des widgets. Toutes les fonctions qui ecrivent dans
 * Grist sont DEFENSIVES : en cas d'echec elles n'interrompent jamais le widget
 * (au pire, comportement actuel inchange).
 * ========================================================================== */
const TF = (function () {
    'use strict';

    /* ----- Statuts ---------------------------------------------------------
     * Convention : l'ORDRE fait foi. Le DERNIER statut de la liste est l'etat
     * terminal ("termine") utilise par la logique de completion des widgets.
     * Les statuts reels proviennent de la colonne Choice `statut` (editable par
     * l'utilisateur dans Grist). DEFAULT_STATUSES n'est qu'un repli.
     * --------------------------------------------------------------------- */
    const DEFAULT_STATUSES = [
        { value: 'todo',       label: 'À faire',  fillColor: '#94a3b8', textColor: '#ffffff' },
        { value: 'inprogress', label: 'En cours', fillColor: '#f59e0b', textColor: '#ffffff' },
        { value: 'review',     label: 'En revue', fillColor: '#3b82f6', textColor: '#ffffff' },
        { value: 'done',       label: 'Terminé',  fillColor: '#10b981', textColor: '#ffffff' }
    ];
    // Repli libelle + couleur pour les CODES par defaut. Permet d'afficher un libelle
    // FR (et la bonne couleur) meme quand la colonne Choice stocke le code brut
    // (todo/inprogress/...). Une valeur renommee par l'utilisateur garde SON libelle.
    const DEFAULTS_BY_VALUE = {};
    for (var _i = 0; _i < DEFAULT_STATUSES.length; _i++) DEFAULTS_BY_VALUE[DEFAULT_STATUSES[_i].value] = DEFAULT_STATUSES[_i];

    // Convertit un tableau Grist colonnaire en tableau d'objets lignes.
    function columnarToRows(data) {
        if (!data || Array.isArray(data)) return data || [];
        const cols = Object.keys(data);
        if (!cols.length) return [];
        const n = (data[cols[0]] && data[cols[0]].length) || 0;
        const rows = [];
        for (let i = 0; i < n; i++) {
            const rec = {};
            for (const k of cols) rec[k] = data[k][i];
            rows.push(rec);
        }
        return rows;
    }

    // Resout le rowId d'une table depuis son tableId via _grist_Tables.
    async function tableRowId(grist, tableId) {
        const meta = columnarToRows(await grist.docApi.fetchTable('_grist_Tables'));
        const row = meta.find(r => r.tableId === tableId);
        return row ? row.id : null;
    }

    // Verifie si un type est une reference (Ref ou RefList)
    function isRefType(type) {
        return /^(Ref|RefList):/.test(String(type || ''));
    }

    // Extrait la table cible d'un type Ref ou RefList
    function getRefTarget(type) {
        const match = /^(?:Ref|RefList):(.+)$/.exec(String(type || ''));
        return match ? match[1] : null;
    }

    // Verifie si une colonne est une formule derivee
    function isFormulaColumn(tableName, colId, formulasMap) {
        if (!formulasMap || !formulasMap[tableName]) return false;
        return Boolean(formulasMap[tableName][colId]);
    }

    // Helper : délai
    function delay(ms) {
        return new Promise(function (resolve) {
            setTimeout(resolve, ms);
        });
    }

    // Attend que les metadonnees de toutes les tables soient disponibles
    async function waitForTablesMetadata(grist, expectedTableIds, options) {
        options = options || {};
        var maxAttempts = options.maxAttempts || 30;
        var baseDelay = options.baseDelay || 200;
        var attempt = 0;
        var missing = [];
        var unavailable = [];

        while (attempt < maxAttempts) {
            try {
                var tablesData = await grist.docApi.fetchTable('_grist_Tables');
                var tables = columnarToRows(tablesData);
                var tableIds = tables.map(function(t) { return t.tableId; });
                
                missing = [];
                unavailable = [];
                
                for (var i = 0; i < expectedTableIds.length; i++) {
                    var tableId = expectedTableIds[i];
                    
                    // Vérifier si la table existe dans _grist_Tables
                    if (tableIds.indexOf(tableId) === -1) {
                        missing.push(tableId);
                        continue;
                    }
                    
                    // Vérifier que fetchTable(tableId) réussit
                    try {
                        await grist.docApi.fetchTable(tableId);
                    } catch (e) {
                        unavailable.push(tableId);
                    }
                }
                
                if (missing.length === 0 && unavailable.length === 0) {
                    // Petit delai supplementaire pour stabilisation
                    await delay(300);
                    return { 
                        success: true, 
                        missing: [],
                        unavailable: [],
                        attempts: attempt + 1
                    };
                }
            } catch (e) {
                // Erreur globale, continuer a essayer
            }
            
            attempt++;
            if (attempt < maxAttempts) {
                await delay(baseDelay * Math.min(attempt, 5));
            }
        }

        return { 
            success: false, 
            missing: missing,
            unavailable: unavailable,
            error: 'Timeout after ' + attempt + ' attempts. Missing: ' + missing.join(', ') + '. Unavailable: ' + unavailable.join(', '),
            attempts: attempt
        };
    }

    // Construit une config de statuts normalisee depuis une liste brute.
    function buildStatusConfig(list, source) {
        const clean = (list || []).filter(s => s && s.value != null).map(s => {
            const v = String(s.value);
            const d = DEFAULTS_BY_VALUE[v];
            const hasExplicitLabel = s.label != null && s.label !== '' && String(s.label) !== v;
            return {
                value: v,
                label: hasExplicitLabel ? String(s.label) : (d ? d.label : v),
                fillColor: s.fillColor || (d ? d.fillColor : '#94a3b8'),
                textColor: s.textColor || (d ? d.textColor : '#ffffff')
            };
        });
        const final = clean.length ? clean : DEFAULT_STATUSES.slice();
        const byValue = {};
        for (const s of final) byValue[s.value] = s;
        return {
            list: final,
            byValue,
            values: final.map(s => s.value),
            terminalValue: final[final.length - 1].value, // convention "dernier = termine"
            firstValue: final[0].value,
            source: clean.length ? source : 'default'
        };
    }

    /* Lit les statuts (libelles + couleurs + ordre) depuis la colonne Choice
     * indiquee, via les metadonnees Grist. Repli en cascade :
     *   1. options de la colonne Choice (cas ideal)
     *   2. valeurs distinctes presentes dans les donnees (colonne Text)
     *   3. DEFAULT_STATUSES
     * Ne jette jamais : retourne toujours une config exploitable.
     */
    async function loadStatusConfig(grist, table, column, distinctFallback) {
        try {
            const tid = await tableRowId(grist, table);
            if (tid != null) {
                const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
                const col = cols.find(c => c.parentId === tid && c.colId === column);
                if (col && col.widgetOptions) {
                    let opt = {};
                    try { opt = JSON.parse(col.widgetOptions) || {}; } catch (e) { opt = {}; }
                    const choices = Array.isArray(opt.choices) ? opt.choices : [];
                    const co = opt.choiceOptions || {};
                    if (choices.length) {
                        return buildStatusConfig(choices.map(ch => ({
                            value: ch,
                            label: ch,
                            fillColor: co[ch] && co[ch].fillColor,
                            textColor: co[ch] && co[ch].textColor
                        })), 'choice');
                    }
                }
            }
        } catch (e) { /* repli silencieux */ }

        if (Array.isArray(distinctFallback) && distinctFallback.length) {
            const seen = [];
            for (const v of distinctFallback) { if (v != null && v !== '' && seen.indexOf(v) === -1) seen.push(v); }
            if (seen.length) return buildStatusConfig(seen.map(v => ({ value: v, label: v })), 'data');
        }
        return buildStatusConfig(DEFAULT_STATUSES.slice(), 'default');
    }

    function getStatus(cfg, value) {
        if (cfg && cfg.byValue && cfg.byValue[value]) return cfg.byValue[value];
        return { value: value, label: value || '', fillColor: '#94a3b8', textColor: '#ffffff' };
    }
    function isTerminal(cfg, value) { return !!cfg && value === cfg.terminalValue; }

    /* Seme les options (choix + couleurs) sur une colonne Choice si elle n'en a
     * pas encore. Defensif. A appeler depuis ensureSchema apres creation.
     * Retourne un resultat structure : { ok, changed, reason/error }
     */
    async function seedStatusChoices(grist, table, column, statuses) {
        try {
            const tid = await tableRowId(grist, table);
            if (tid == null) {
                return { ok: false, changed: false, reason: 'Table non trouvée: ' + table };
            }
            
            const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
            const col = cols.find(c => c.parentId === tid && c.colId === column);
            
            if (!col) {
                return { ok: false, changed: false, reason: 'Colonne non trouvée: ' + table + '.' + column };
            }
            
            let opt = {};
            try { opt = JSON.parse(col.widgetOptions || '{}') || {}; } catch (e) { opt = {}; }
            
            // Si deja configure, on respecte les personnalisations
            if (Array.isArray(opt.choices) && opt.choices.length) {
                return { ok: true, changed: false, reason: 'already-configured' };
            }
            
            const list = statuses && statuses.length ? statuses : DEFAULT_STATUSES;
            const choiceOptions = {};
            for (const s of list) choiceOptions[s.value] = { fillColor: s.fillColor, textColor: s.textColor };
            const widgetOptions = JSON.stringify({ choices: list.map(s => s.value), choiceOptions: choiceOptions });
            
            await grist.docApi.applyUserActions([['ModifyColumn', table, column, { widgetOptions: widgetOptions }]]);
            
            return { ok: true, changed: true, reason: null };
        } catch (e) {
            console.warn('TF.seedStatusChoices:', e && e.message);
            return { ok: false, changed: false, error: e.message || String(e) };
        }
    }

    /* ----- #2 : colonnes d'affichage des Ref (noms au lieu des IDs) ---------
     * Pose le visibleCol + la display formula sur des colonnes Ref pour que les
     * VUES NATIVES Grist affichent un libelle plutot que l'ID de ligne.
     * specs : [{ table:'Tasks', column:'projet', visibleColId:'nom' }, ...]
     * ROBUSTE : verifie les metadonnees, gere les erreurs, retourne un rapport.
     * --------------------------------------------------------------------- */
    async function setRefDisplayColumns(grist, specs) {
        var result = {
            ok: true,
            configured: [],
            alreadyCorrect: [],
            skipped: [],
            errors: []
        };

        if (!Array.isArray(specs) || !specs.length) {
            return result;
        }

        try {
            // Relire les metadonnees fraîches
            var tables = columnarToRows(await grist.docApi.fetchTable('_grist_Tables'));
            var cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
            
            var tidOf = function(tableId) {
                var r = tables.find(function(t) { return t.tableId === tableId; });
                return r ? r.id : null;
            };
            
            var colOf = function(tableRowId, colId) {
                return cols.find(function(c) { return c.parentId === tableRowId && c.colId === colId; });
            };

            for (var i = 0; i < specs.length; i++) {
                var s = specs[i];
                var srcTid = tidOf(s.table);
                
                if (srcTid == null) {
                    result.skipped.push({ table: s.table, column: s.column, reason: 'Table source non trouvée' });
                    continue;
                }
                
                var refCol = colOf(srcTid, s.column);
                if (!refCol) {
                    result.skipped.push({ table: s.table, column: s.column, reason: 'Colonne référence absente des métadonnées' });
                    result.ok = false;  // IMPORTANT : skipped = échec, pas ignoré
                    continue;
                }
                
                // Verifier que c'est bien une colonne Ref ou RefList
                var typeMatch = /^(?:Ref|RefList):(.+)$/.exec(refCol.type || '');
                if (!typeMatch) {
                    result.errors.push({
                        table: s.table,
                        column: s.column,
                        reason: 'Type incorrect: ' + (refCol.type || 'undefined') + ' (attendu Ref:*)'
                    });
                    result.ok = false;
                    continue;
                }
                
                // Table cible deduite du type
                var targetTid = tidOf(typeMatch[1]);
                if (targetTid == null) {
                    result.errors.push({
                        table: s.table,
                        column: s.column,
                        reason: 'Table cible non trouvée: ' + typeMatch[1]
                    });
                    result.ok = false;
                    continue;
                }
                
                var visCol = colOf(targetTid, s.visibleColId);
                if (!visCol) {
                    result.errors.push({
                        table: s.table,
                        column: s.column,
                        reason: 'Colonne visible non trouvée: ' + s.visibleColId
                    });
                    result.ok = false;
                    continue;
                }
                
                // Verifier si deja configure correctement
                var visibleColId = refCol.visibleCol;
                var displayColId = refCol.displayCol;
                
                // Verifier visibleCol (comparaison numerique)
                var visibleColIsCorrect = (Number(visibleColId) === Number(visCol.id));
                
                // Verifier display formula
                var displayFormula = '$' + s.column + '.' + s.visibleColId;
                var displayCol = displayColId ? cols.find(function(c) { return c.id === displayColId; }) : null;
                var displayFormulaIsCorrect = displayCol && displayCol.formula === displayFormula;
                
                if (visibleColIsCorrect && displayFormulaIsCorrect) {
                    result.alreadyCorrect.push({ table: s.table, column: s.column });
                    continue;
                }
                
                // Appliquer les corrections
                var actions = [];
                
                // Configurer la formule d'affichage
                actions.push(['SetDisplayFormula', s.table, null, s.column, displayFormula]);
                
                // Configurer le visibleCol
                actions.push(['UpdateRecord', '_grist_Tables_column', refCol.id, { visibleCol: visCol.id }]);
                
                try {
                    await grist.docApi.applyUserActions(actions);
                    result.configured.push({ table: s.table, column: s.column });
                } catch (e) {
                    result.errors.push({
                        table: s.table,
                        column: s.column,
                        reason: e.message || String(e)
                    });
                    result.ok = false;
                }
            }
            
            return result;
        } catch (e) {
            result.ok = false;
            result.errors.push({ reason: 'Erreur globale: ' + (e.message || String(e)) });
            return result;
        }
    }

    /* ----- #3 : plan de charge (heures par personne) ------------------------
     * Stockage : colonne Text `charges` sur Tasks, JSON [{teamId, heures}].
     * Parse defensif identique au pattern subtasks.
     * --------------------------------------------------------------------- */
    function parseCharges(v) {
        try {
            const a = JSON.parse(v || '[]');
            if (!Array.isArray(a)) return [];
            return a.filter(x => x && x.teamId != null)
                    .map(x => ({ teamId: Number(x.teamId), heures: Number(x.heures) || 0 }))
                    .filter(x => !isNaN(x.teamId));
        } catch (e) { return []; }
    }
    function chargesToJson(arr) {
        return JSON.stringify((arr || [])
            .filter(x => x && x.teamId != null)
            .map(x => ({ teamId: Number(x.teamId), heures: Number(x.heures) || 0 }))
            .filter(x => !isNaN(x.teamId)));
    }
    // Heures totales d'une tache (somme des charges par personne).
    function chargeTotal(charges) { return parseCharges(typeof charges === 'string' ? charges : JSON.stringify(charges || [])).reduce((s, c) => s + c.heures, 0); }
    // Agrege la charge par membre sur une liste de taches (chaque tache expose .charges).
    function chargeByMember(tasks) {
        const by = {};
        for (const t of (tasks || [])) {
            for (const c of parseCharges(t && t.charges)) {
                by[c.teamId] = (by[c.teamId] || 0) + c.heures;
            }
        }
        return by;
    }

    // Cle de periode : semaine ISO 'YYYY-Www' ou mois 'YYYY-MM'.
    function periodKey(date, granularity) {
        if (granularity === 'month') {
            return date.getUTCFullYear() + '-' + String(date.getUTCMonth() + 1).padStart(2, '0');
        }
        const d = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
        const day = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - day);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return d.getUTCFullYear() + '-W' + String(week).padStart(2, '0');
    }

    // #3 plan de charge temporel : etale les charges PROPRES de chaque tache sur sa
    // duree (jours calendaires), agrege par personne et par periode.
    // dateDebut/dateEcheance = timestamps Unix SECONDES (Grist). Tache sans dates ou
    // sans charge = ignoree. Retourne { teamId: { periodKey: heures } }.
    function chargeByMemberPeriod(tasks, granularity) {
        const g = granularity === 'month' ? 'month' : 'week';
        const out = {};
        for (const t of (tasks || [])) {
            const charges = parseCharges(t && t.charges);
            if (!charges.length) continue;
            const s = t.dateDebut, e = t.dateEcheance;
            if (s == null || e == null) continue;
            const day0 = Math.floor((s * 1000) / 86400000);
            const day1 = Math.floor((e * 1000) / 86400000);
            const nDays = Math.max(day1 - day0 + 1, 1);
            for (const c of charges) {
                const perDay = (Number(c.heures) || 0) / nDays;
                if (!perDay) continue;
                if (!out[c.teamId]) out[c.teamId] = {};
                for (let dd = day0; dd <= day1; dd++) {
                    const key = periodKey(new Date(dd * 86400000), g);
                    out[c.teamId][key] = (out[c.teamId][key] || 0) + perDay;
                }
            }
        }
        return out;
    }

    // Decale une date de n periodes (semaine = 7 jours, mois = 1 mois).
    function shiftPeriods(date, granularity, n) {
        const d = new Date(date.getTime());
        if (granularity === 'month') d.setUTCMonth(d.getUTCMonth() + n);
        else d.setUTCDate(d.getUTCDate() + n * 7);
        return d;
    }

    // Liste contigue de cles de periode (semaine ISO ou mois) a partir d'une date,
    // alignee sur le debut de periode (lundi / 1er du mois). Inclut les periodes vides.
    function periodRange(startDate, granularity, count) {
        const g = granularity === 'month' ? 'month' : 'week';
        let d = new Date(Date.UTC(startDate.getUTCFullYear(), startDate.getUTCMonth(), startDate.getUTCDate()));
        if (g === 'week') { const day = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() - day + 1); }
        else { d = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1)); }
        const out = [];
        for (let i = 0; i < count; i++) {
            out.push(periodKey(d, g));
            if (g === 'week') d.setUTCDate(d.getUTCDate() + 7);
            else d.setUTCMonth(d.getUTCMonth() + 1);
        }
        return out;
    }

    // chargeMatrix : generalise chargeByMemberPeriod. Etale les charges (via getCharges,
    // defaut parseCharges) sur la duree, agrege par cle keyFn(t, charge) et periode.
    function chargeMatrix(tasks, keyFn, granularity, getCharges, workdays) {
        const g = granularity === 'month' ? 'month' : 'week';
        const out = {};
        for (const t of (tasks || [])) {
            const charges = getCharges ? getCharges(t) : parseCharges(t && t.charges);
            if (!charges.length || t.dateDebut == null || t.dateEcheance == null) continue;
            const d0 = Math.floor((t.dateDebut * 1000) / 86400000), d1 = Math.floor((t.dateEcheance * 1000) / 86400000);
            const days = [];
            for (let dd = d0; dd <= d1; dd++) { if (workdays) { const wd = new Date(dd * 86400000).getUTCDay(); if (wd < 1 || wd > 5) continue; } days.push(dd); }
            if (!days.length) days.push(d0);
            for (const c of charges) {
                const key = keyFn(t, c); if (key == null) continue;
                const perDay = c.heures / days.length; if (!perDay) continue;
                if (!out[key]) out[key] = {};
                for (const dd of days) { const pk = periodKey(new Date(dd * 86400000), g); out[key][pk] = (out[key][pk] || 0) + perDay; }
            }
        }
        return out;
    }

    /* ----- #7 : respect des droits (ACL) ------------------------------------
     * Deux niveaux : (a) acces document lecture seule -> Grist passe
     * `readonly=true` dans l'URL de l'iframe ; (b) ACL au niveau ligne ->
     * l'acces widget peut etre `full` mais une ecriture sur une ligne donnee
     * est refusee par le serveur. safeApply absorbe ce refus proprement.
     * --------------------------------------------------------------------- */
    function _qp(name) { try { return new URLSearchParams(location.search).get(name); } catch (e) { return null; } }
    // Vrai si Grist a ouvert le widget en lecture seule (acces doc restreint).
    function isReadOnly() { return _qp('readonly') === 'true'; }
    // Niveau d'acces accorde au widget : 'full' | 'read table' | 'none' (defaut 'full').
    function accessLevel() { return _qp('access') || 'full'; }
    // Detecte un message d'erreur Grist correspondant a un refus de droits.
    function isAccessError(e) {
        const msg = (e && (e.message || e.toString())) || '';
        return /access denied|not allowed|permission|forbidden|read[- ]?only|cannot (modify|add|remove)|acl/i.test(msg);
    }
    // Applique des actions en absorbant un refus de droits.
    // Retourne { ok:true } ou { ok:false, denied:bool, message }. Ne fait PAS d'UI
    // (chaque widget affiche son propre toast et recharge pour annuler l'optimiste).
    async function safeApply(grist, actions) {
        if (isReadOnly()) return { ok: false, denied: true, message: 'Document en lecture seule' };
        try { const r = await grist.docApi.applyUserActions(actions); return { ok: true, ret: r }; }
        catch (e) { return { ok: false, denied: isAccessError(e), message: (e && (e.message || e.toString())) || 'Erreur' }; }
    }
    // Garde transverse : enrobe grist.docApi.applyUserActions une seule fois pour
    // respecter les droits sur TOUS les sites d'ecriture sans les modifier un a un.
    // - lecture seule -> bloque + opts.onReadOnly()
    // - refus ACL au niveau ligne -> opts.onDenied(err) (le widget toast + recharge)
    // Les erreurs continuent d'etre levees (les try/catch existants les absorbent).
    function guardWrites(grist, opts) {
        opts = opts || {};
        if (!grist || !grist.docApi || grist.docApi._tfGuarded) return;
        const raw = grist.docApi.applyUserActions.bind(grist.docApi);
        grist.docApi._tfGuarded = true;
        grist.docApi.applyUserActions = async function (actions) {
            if (isReadOnly()) { try { opts.onReadOnly && opts.onReadOnly(); } catch (e) {} const err = new Error('Document en lecture seule'); err.tfReadOnly = true; throw err; }
            try { return await raw(actions); }
            catch (e) { if (isAccessError(e)) { try { opts.onDenied && opts.onDenied(e); } catch (e2) {} } throw e; }
        };
    }
    // Bandeau "lecture seule" auto-contenu (aucun markup widget requis).
    // Pousse le contenu vers le bas (padding-top sur body) pour NE PAS recouvrir l'en-tete du widget.
    function readOnlyBanner() {
        if (!isReadOnly() || (typeof document === 'undefined') || document.getElementById('tf-ro-banner')) return;
        const b = document.createElement('div');
        b.id = 'tf-ro-banner';
        b.textContent = 'Lecture seule — vos droits ne permettent pas la modification';
        b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#b45309;color:#fff;font:600 12px/1.4 system-ui,-apple-system,sans-serif;text-align:center;padding:6px 10px;letter-spacing:.2px;box-sizing:border-box';
        document.body.appendChild(b);
        const h = b.offsetHeight || 28;
        const prev = parseFloat(getComputedStyle(document.body).paddingTop) || 0;
        document.body.style.paddingTop = (prev + h) + 'px';
    }

    return {
        DEFAULT_STATUSES: DEFAULT_STATUSES,
        columnarToRows: columnarToRows,
        loadStatusConfig: loadStatusConfig,
        buildStatusConfig: buildStatusConfig,
        getStatus: getStatus,
        isTerminal: isTerminal,
        seedStatusChoices: seedStatusChoices,
        setRefDisplayColumns: setRefDisplayColumns,
        parseCharges: parseCharges,
        chargesToJson: chargesToJson,
        chargeTotal: chargeTotal,
        chargeByMember: chargeByMember,
        periodKey: periodKey,
        chargeByMemberPeriod: chargeByMemberPeriod,
        shiftPeriods: shiftPeriods,
        periodRange: periodRange,
        chargeMatrix: chargeMatrix,
        isReadOnly: isReadOnly,
        accessLevel: accessLevel,
        isAccessError: isAccessError,
        safeApply: safeApply,
        guardWrites: guardWrites,
        readOnlyBanner: readOnlyBanner,
        // Helpers pour le schema
        tableRowId: tableRowId,
        isRefType: isRefType,
        getRefTarget: getRefTarget,
        isFormulaColumn: isFormulaColumn,
        waitForTablesMetadata: waitForTablesMetadata,
        delay: delay
    };
})();

// Export explicite pour globalThis (fonctionne dans navigateur et autres environnements)
if (typeof globalThis !== 'undefined') {
    globalThis.TF = TF;
}

        log('[GENCI tables] Création table: ' + tableId + ' (' + colSpecs.length + ' colonnes)');

                if (missing.length === 0) {
                    log('[GENCI sync] Toutes les colonnes Ref sont présentes (' + attempt + ' tentatives)');
                    if (invalid.length > 0) {
                        log('[GENCI sync] Types incorrects détectés (seront réparés): ' + invalid.length);
                    }
                    return {
                        success: true,
                        missing: [],
                        invalid: invalid,
                        attempts: attempt + 1
                    };
                }
                
                if (missing.length > 0) {
                    log('[GENCI sync] Colonnes Ref manquantes: ' + missing.join(', '));
                }
                
            } catch (e) {
                log('[GENCI sync] Erreur de lecture métadonnées: ' + (e.message || e));
            }
            
            attempt++;
            if (attempt < maxAttempts) {
                await delay(baseDelay * Math.min(attempt, 5));
            }
        }
        
        return {
            success: false,
            error: 'Timeout après ' + attempt + ' tentatives',
            attempts: attempt,
            missing: lastMissing,
            invalid: lastInvalid
        };
    }

    // ========================================================================
    // PASSE 3 — Colonnes calculées (formules)
    // ========================================================================
    
    async function ensureFormulaColumns(grist, formulasMap) {
        var metadata = await loadSchemaMetadata(grist);
        var result = { added: [], skipped: [], errors: [] };
        
        for (var tableName in formulasMap) {
            if (!formulasMap.hasOwnProperty(tableName)) continue;
            
            var formulas = formulasMap[tableName];
            var tableMeta = metadata.tableById[tableName];
            
            if (!tableMeta) {
                result.skipped.push({ table: tableName, reason: 'Table non trouvée' });
                continue;
            }
            
            for (var colId in formulas) {
                if (!formulas.hasOwnProperty(colId)) continue;
                
                var formula = formulas[colId];
                var key = tableName + '.' + colId;
                var existingCol = metadata.columnByKey[key];
                
                if (!existingCol) {
                    // Colonne manquante : l'ajouter
                    try {
                        await grist.docApi.applyUserActions([
                            ['AddColumn', tableName, colId, {
                                type: 'Any',
                                isFormula: true,
                                formula: formula
                            }]
                        ]);
                        result.added.push(key);
                    } catch (e) {
                        result.errors.push({
                            table: tableName,
                            column: colId,
                            error: e.message || String(e)
                        });
                    }
                } else {
                    result.skipped.push({ table: tableName, column: colId, reason: 'Déjà existe' });
                }
            }
        }
        
        return result;
    }

    // ========================================================================
    // PASSE 4 — Configuration des Choices et statuts
    // ========================================================================
    
    async function configureChoiceColumns(grist, defaultChoices) {
        var result = { configured: [], skipped: [] };
        
        for (var key in defaultChoices) {
            if (!defaultChoices.hasOwnProperty(key)) continue;
            
            var parts = key.split('.');
            if (parts.length !== 2) continue;
            
            var table = parts[0];
            var column = parts[1];
            var choices = defaultChoices[key];
            
            try {
                var statusList = choices.map(function(v) {
                    return { value: v, label: v, fillColor: '#94a3b8', textColor: '#ffffff' };
                });
                
                var seedResult = await TF.seedStatusChoices(grist, table, column, statusList);
                
                if (seedResult.ok && seedResult.changed) {
                    result.configured.push(key);
                } else if (seedResult.ok && !seedResult.changed) {
                    result.skipped.push({ key: key, reason: seedResult.reason || 'Déjà configuré' });
                } else {
                    result.skipped.push({ key: key, reason: seedResult.error || 'Erreur inconnue' });
                }
            } catch (e) {
                result.skipped.push({ key: key, reason: e.message || String(e) });
            }
        }
        
        return result;
    }

    // ========================================================================
    // PASSE 5 — Configuration des colonnes visibles des références
    // ========================================================================
    
    async function configureAllRefDisplays(grist, specs) {
        log('[GENCI display] Configuration affichage références...');
        
        var result = await TF.setRefDisplayColumns(grist, specs);
        
        if (result.configured && result.configured.length > 0) {
            log('[GENCI display] Configurés: ' + result.configured.length);
        }
        if (result.alreadyCorrect && result.alreadyCorrect.length > 0) {
            log('[GENCI display] Déjà corrects: ' + result.alreadyCorrect.length);
        }
        if (result.skipped && result.skipped.length > 0) {
            log('[GENCI display] Ignorés: ' + result.skipped.length, result.skipped);
        }
        if (result.errors && result.errors.length > 0) {
            log('[GENCI display] Erreurs: ' + result.errors.length, result.errors);
        }
        
        return result;
    }

    // Helper : obtient toutes les spécifications de références depuis le schéma
    function getExpectedReferenceSpecs(schema) {
        var specs = [];
        
        for (var tableId in schema.tables) {
            if (!Object.prototype.hasOwnProperty.call(schema.tables, tableId)) {
                continue;
            }
            
            var columns = schema.tables[tableId].columns || [];
            
            for (var i = 0; i < columns.length; i++) {
                var column = columns[i];
                var opts = column.opts || column;
                var type = opts.type || '';
                
                if (/^(Ref|RefList):/.test(type)) {
                    specs.push({
                        table: tableId,
                        column: column.id,
                        expectedType: type,
                        targetTable: getRefTarget(type)
                    });
                }
            }
        }
        
        return specs;
    }
    
    // Helper : charge les colonnes réelles des tables utilisateur
    async function loadActualTableColumns(grist, tableIds) {
        var columnsByTable = {};
        var errors = [];
        
        for (var i = 0; i < tableIds.length; i++) {
            var tableId = tableIds[i];
            
            try {
                var data = await grist.docApi.fetchTable(tableId);
                columnsByTable[tableId] = new Set(Object.keys(data || {}));
            } catch (e) {
                columnsByTable[tableId] = new Set();
                errors.push({
                    table: tableId,
                    error: e.message || String(e)
                });
            }
        }
        
        return {
            columnsByTable: columnsByTable,
            errors: errors
        };
    }

    // ========================================================================
    // INSPECTION — Vérification complète du schéma
    // ========================================================================
    
    async function inspectGenciSchema(grist, requiredTables, metadataSnapshot) {
        var result = {
            ready: true,
            missingTables: [],
            missingColumns: [],
            metadataPending: [],
            invalidColumnTypes: [],
            invalidRefTargets: [],
            invalidVisibleColumns: [],
            missingFormulaColumns: [],
            duplicateColumns: [],
            corrupted: false
        };
        
        try {
            // Utiliser le snapshot fourni ou charger les métadonnées
            var metadata = metadataSnapshot || await loadSchemaMetadata(grist);
            
            // Vérifier les tables essentielles
            for (var i = 0; i < requiredTables.length; i++) {
                var tableId = requiredTables[i];
                if (!metadata.tableById[tableId]) {
                    result.missingTables.push(tableId);
                    result.ready = false;
                }
            }
            
            // Vérifier TOUTES les références du schéma (pas juste 6)
            var expectedRefs = getExpectedReferenceSpecs(SCHEMA);
            
            // Charger les colonnes réelles des tables pour distinguer absent vs retardé
            var refTableIds = Array.from(new Set(expectedRefs.map(function(ref) {
                return ref.table;
            })));
            
            var actualColumns = await loadActualTableColumns(grist, refTableIds);
            
            for (var j = 0; j < expectedRefs.length; j++) {
                var ref = expectedRefs[j];
                var key = ref.table + '.' + ref.column;
                var metadataCol = metadata.columnByKey[key];
                var actualTableCols = actualColumns.columnsByTable[ref.table];
                var existsInTable = actualTableCols && actualTableCols.has(ref.column);
                
                // Cas 1 : Colonne absente des métadonnées ET de la table réelle
                if (!metadataCol && !existsInTable) {
                    result.missingColumns.push(key);
                    result.ready = false;
                    continue;
                }
                
                // Cas 2 : Colonne présente dans la table mais absente des métadonnées (retard)
                if (!metadataCol && existsInTable) {
                    result.metadataPending.push(key);
                    // Ne pas mettre ready = false, c'est temporaire
                    continue;
                }
                
                // Cas 3 : Colonne présente dans les métadonnées, vérifier le type
                if (metadataCol.type !== ref.expectedType) {
                    result.invalidColumnTypes.push({
                        column: key,
                        expected: ref.expectedType,
                        actual: metadataCol.type
                    });
                    result.ready = false;
                    
                    // Vérifier si la table cible existe
                    var targetType = ref.targetTable;
                    if (!metadata.tableById[targetType]) {
                        result.invalidRefTargets.push({
                            column: key,
                            expectedTarget: targetType
                        });
                    }
                }
            }
            
            // Vérifier les visibleCol sur TOUTES les références de SCHEMA.referenceDisplays
            var refDisplaySpecs = SCHEMA.referenceDisplays || [];
            
            for (var k = 0; k < refDisplaySpecs.length; k++) {
                var spec = refDisplaySpecs[k];
                var specKey = spec.table + '.' + spec.column;
                var specCol = metadata.columnByKey[specKey];
                
                if (!specCol) {
                    // Référence absente des métadonnées
                    if (!result.metadataPending.includes(specKey)) {
                        result.metadataPending.push(specKey);
                    }
                    continue;
                }
                
                var targetTable = getRefTarget(specCol.type);
                if (targetTable) {
                    var visColKey = targetTable + '.' + spec.visibleColId;
                    var visCol = metadata.columnByKey[visColKey];
                    
                    if (visCol) {
                        // Vérification stricte du visibleCol
                        if (Number(specCol.visibleCol) !== Number(visCol.id)) {
                            result.invalidVisibleColumns.push({
                                column: specKey,
                                expected: visCol.id,
                                actual: specCol.visibleCol
                            });
                            result.ready = false;
                        }
                    }
                }
            }
            
            // ====================================================================
            // DETECTION DES COLONNES DUPLIQUEES (CORRUPTION)
            // ====================================================================
            // Pour chaque table du schéma, vérifier les colonnes qui correspondent
            // au pattern ^<canonical>[0-9]+$ pour détecter les duplications
            for (var tableIdx = 0; tableIdx < SCHEMA.tableOrder.length; tableIdx++) {
                var tableId = SCHEMA.tableOrder[tableIdx];
                var tableDef = SCHEMA.tables[tableId];
                
                if (!tableDef || !metadata.tableById[tableId]) {
                    continue;
                }
                
                // Obtenir toutes les colonnes de cette table depuis les métadonnées
                var tableColumns = metadata.columns.filter(function(col) {
                    var parentTable = metadata.tables.find(function(t) { 
                        return t.id === col.parentId; 
                    });
                    return parentTable && parentTable.tableId === tableId;
                });
                
                // Pour chaque colonne canonique du schéma
                for (var colIdx = 0; colIdx < tableDef.columns.length; colIdx++) {
                    var canonicalCol = tableDef.columns[colIdx];
                    var canonicalId = canonicalCol.id;
                    
                    // Échapper l'identifiant canonique pour la RegExp
                    var escapedCanonical = canonicalId.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    var duplicatePattern = new RegExp('^' + escapedCanonical + '[0-9]+$');
                    
                    // Trouver les duplications
                    var duplicates = tableColumns.filter(function(col) {
                        return duplicatePattern.test(col.colId);
                    }).map(function(col) {
                        return col.colId;
                    });
                    
                    if (duplicates.length > 0) {
                        result.duplicateColumns.push({
                            table: tableId,
                            canonicalColumn: canonicalId,
                            duplicates: duplicates
                        });
                    }
                }
            }
            
            // Marquer comme corrompu si des duplications sont trouvées
            if (result.duplicateColumns.length > 0) {
                result.corrupted = true;
            }
            
        } catch (e) {
            result.error = e.message || String(e);
            result.ready = false;
        }
        
        return result;
    }

    // Helper : extrait l'ID d'un enregistrement créé
    function getAddedRecordId(actionResult, label) {
        var value = Array.isArray(actionResult)
            ? actionResult[0]
            : actionResult;

        if (typeof value === 'number' && Number.isFinite(value)) {
            return value;
        }

        if (
            value &&
            typeof value === 'object' &&
            typeof value.id === 'number'
        ) {
            return value.id;
        }

        throw new Error(
            'ID de ligne introuvable après AddRecord' +
            (label ? ' (' + label + ')' : '') +
            ': ' + JSON.stringify(actionResult)
        );
    }

    // ========================================================================
    // SEED — Données de démonstration (UNIQUEMENT si tables vides)
    // ========================================================================
    
    async function seedInitialData(grist, context) {
        var seedEntries = [];
        context = context || {};
        
        try {
            // Vérifier si Tasks est vide
            var tasksData = await grist.docApi.fetchTable('Tasks');
            var tasksCount = (tasksData && tasksData.id && tasksData.id.length) || 0;
            
            if (tasksCount > 0) {
                log('[GENCI seed] Tables non vides (' + tasksCount + ' tasks) — seed ignoré');
                return { seeded: false, reason: 'Tables non vides' };
            }
            
            log('[GENCI seed] Tables vides — création données de démonstration...');
            
            // Créer les données dans l'ordre de dépendance
            var createdIds = {};
            
            // 1. Entités
            if (context.tablesCreated && context.tablesCreated.indexOf('Entites') !== -1) {
                var entiteRacine = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Entites', null, { nom: 'Direction', niveau: 'direction', actif: true }]
                ]);
                createdIds.Entites = { racine: getAddedRecordId(entiteRacine, 'Entites.Direction') };
                
                var entiteDev = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Entites', null, { nom: 'Développement', parent: createdIds.Entites.racine, niveau: 'service', actif: true }]
                ]);
                createdIds.Entites.dev = getAddedRecordId(entiteDev, 'Entites.Développement');
                
                seedEntries.push('Créé: Entités (2)');
            }
            
            // 2. Team
            if (context.tablesCreated && context.tablesCreated.indexOf('Team') !== -1) {
                var member1 = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Team', null, { nom: 'Alice Martin', role: 'chef_de_projet', actif: true }]
                ]);
                createdIds.Team = { alice: getAddedRecordId(member1, 'Team.Alice') };
                
                var member2 = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Team', null, { nom: 'Bob Durant', role: 'membre', actif: true }]
                ]);
                createdIds.Team.bob = getAddedRecordId(member2, 'Team.Bob');
                
                // Mettre à jour les références
                if (createdIds.Entites && createdIds.Entites.dev) {
                    await grist.docApi.applyUserActions([
                        ['UpdateRecord', 'Team', createdIds.Team.alice, { entite: createdIds.Entites.dev }],
                        ['UpdateRecord', 'Team', createdIds.Team.bob, { entite: createdIds.Entites.dev, responsable: createdIds.Team.alice }]
                    ]);
                }
                
                seedEntries.push('Créé: Team (2)');
            }
            
            // 3. Programmes
            if (context.tablesCreated && context.tablesCreated.indexOf('Programmes') !== -1) {
                var programme = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Programmes', null, { nom: 'Transformation Digitale', couleur: '#4f46e5', actif: true }]
                ]);
                createdIds.Programmes = { digital: getAddedRecordId(programme, 'Programmes.Transformation') };
                seedEntries.push('Créé: Programmes (1)');
            }
            
            // 4. Competences
            if (context.tablesCreated && context.tablesCreated.indexOf('Competences') !== -1) {
                await grist.docApi.applyUserActions([
                    ['AddRecord', 'Competences', null, { nom: 'JavaScript', categorie: 'technique', actif: true }],
                    ['AddRecord', 'Competences', null, { nom: 'Python', categorie: 'technique', actif: true }],
                    ['AddRecord', 'Competences', null, { nom: 'Gestion de projet', categorie: 'fonctionnel', actif: true }]
                ]);
                seedEntries.push('Créé: Competences (3)');
            }
            
            // 5. KanbanSteps
            if (context.tablesCreated && context.tablesCreated.indexOf('KanbanSteps') !== -1) {
                await grist.docApi.applyUserActions([
                    ['AddRecord', 'KanbanSteps', null, { nom: 'À faire', valeur: 'todo', couleur: '#94a3b8', ordre: 0, actif: true }],
                    ['AddRecord', 'KanbanSteps', null, { nom: 'En cours', valeur: 'inprogress', couleur: '#f59e0b', ordre: 1, actif: true }],
                    ['AddRecord', 'KanbanSteps', null, { nom: 'En revue', valeur: 'review', couleur: '#3b82f6', ordre: 2, actif: true }],
                    ['AddRecord', 'KanbanSteps', null, { nom: 'Terminé', valeur: 'done', couleur: '#10b981', ordre: 3, actif: true }]
                ]);
                seedEntries.push('Créé: KanbanSteps (4)');
            }
            
            return { seeded: true, ids: createdIds, log: seedEntries };
            
        } catch (e) {
            log('[GENCI seed] Erreur: ' + (e.message || e));
            return { seeded: false, error: e.message || String(e) };
        }
    }

    // ========================================================================
    // ORCHESTRATEUR PRINCIPAL
    // ========================================================================
    
    async function ensureGenciSchema(grist, options) {
        options = options || {};
        
        // Sérialise les appels dans une même iframe
        if (bootstrapPromise) {
            return bootstrapPromise;
        }
        
        if (bootstrapComplete && !options.force) {
            return Promise.resolve({ success: true, alreadyComplete: true });
        }
        
        bootstrapPromise = (async function () {
            var startTime = Date.now();
            var globalLog = [];
            var result = {
                success: false,
                phases: {},
                errors: [],
                warnings: []
            };
            
            try {
                log('Démarrage initialisation...');
                
                // Phase 0 : Exécuter les migrations puis inspection
                log('Phase 0: Migrations...');
                var migrationLog = await migrateLegacyTables(grist);
                globalLog = globalLog.concat(migrationLog);
                
                // Exécuter les migrations versionnées si TaskFlowMigrations est disponible
                if (global.TaskFlowMigrations) {
                    try {
                        var currentVersion = await global.TaskFlowMigrations.getCurrentVersion(grist);
                        log('Version actuelle du schéma: v' + currentVersion);
                        
                        var migrationResult = await global.TaskFlowMigrations.runMigrations(grist, currentVersion);
                        
                        if (migrationResult.success) {
                            log('Migrations appliquées: ' + migrationResult.applied + ' migrations, version finale: v' + migrationResult.finalVersion);
                            globalLog.push('Migrations: v' + currentVersion + ' → v' + migrationResult.finalVersion);
                            result.phases.migrations = migrationResult;
                        } else {
                            result.warnings.push({ phase: 'migrations', message: 'Certaines migrations ont échoué' });
                        }
                    } catch (migrationError) {
                        log('Erreur lors des migrations: ' + (migrationError.message || migrationError));
                        result.warnings.push({ phase: 'migrations', error: migrationError.message || String(migrationError) });
                        // Continuer malgré tout, le schéma déclaratif réparera
                    }
                }
                
                result.phases.migration = migrationLog;
                
                // Phase 1 : Création des tables (sans Ref)
                log('Phase 1: Création tables...');
                var phase1 = await ensureBaseTables(grist, SCHEMA, options.formulasMap || {});
                globalLog.push('Tables créées: ' + phase1.created.join(', '));
                result.phases.tables = phase1;
                
                // Synchronisation
                var allExpectedTables = SCHEMA.tableOrder.slice();
                var metadata = await syncMetadata(grist, allExpectedTables);
                result.phases.sync = { success: true };
                
                // Phase 2 : Colonnes Ref
                log('Phase 2: Colonnes Ref...');
                var phase2 = await ensureRefColumns(grist, SCHEMA, options.formulasMap || {});
                globalLog.push('Ref ajoutées: ' + phase2.added.join(', '));
                if (phase2.repaired.length > 0) {
                    globalLog.push('Ref réparées: ' + phase2.repaired.join(', '));
                }
                
                // Vérifier les erreurs de création des Ref
                if (phase2.errors.length > 0) {
                    result.errors.push({
                        phase: 'refs',
                        errors: phase2.errors
                    });
                    result.success = false;
                    log('Échec création des colonnes Ref, arrêt de l\'initialisation');
                    return result;
                }
                
                result.phases.refs = phase2;
                
                // Phase 2 : Colonnes Ref terminées (succès des AddColumn = confirmation)
                log('Phase 2: Colonnes Ref terminées (' + phase2.added.length + ' créées)');
                result.phases.refs = phase2;
                
                // Petite pause pour stabilisation Grist avant formules
                await delay(500);
                
                // Phase 3 : Formules
                if (options.formulasMap && Object.keys(options.formulasMap).length > 0) {
                    log('Phase 3: Formules...');
                    var phase3 = await ensureFormulaColumns(grist, options.formulasMap);
                    globalLog.push('Formules ajoutées: ' + phase3.added.join(', '));
                    result.phases.formulas = phase3;
                }
                
                // Phase 4 : Choices
                log('Phase 4: Choices...');
                var phase4 = await configureChoiceColumns(grist, options.defaultChoices || {});
                result.phases.choices = phase4;
                
                // Phase 5 : Affichage des références
                log('Phase 5: Affichage références...');
                var phase5 = await configureAllRefDisplays(grist, GENCI_REF_DISPLAY_SPECS);
                result.phases.display = phase5;
                
                if (!phase5.ok) {
                    result.warnings.push({ phase: 'display', errors: phase5.errors });
                }
                
                // Phase 6 : Seed (seulement si demandé explicitement)
                if (options.seedDemo === true) {
                    log('Phase 6: Seed de démonstration...');
                    var seedContext = { tablesCreated: phase1.created };
                    var phase6 = await seedInitialData(grist, seedContext);
                    result.phases.seed = phase6;
                    if (phase6.seeded) {
                        globalLog = globalLog.concat(phase6.log || []);
                    }
                    if (phase6.error) {
                        result.errors.push({ phase: 'seed', error: phase6.error });
                    }
                } else {
                    result.phases.seed = {
                        seeded: false,
                        reason: 'Seed de démonstration désactivé (options.seedDemo !== true)'
                    };
                }
                
                // Vérification finale
                log('Vérification finale...');
                
                // Délai de stabilisation avant validation
                await delay(300);
                
                // Relire les métadonnées fraîches
                metadata = await loadSchemaMetadata(grist);
                
                var requiredTables = ['Team', 'Programmes', 'Entites', 'Projects', 'Tasks', 'Actions'];
                var inspection = await inspectGenciSchema(grist, requiredTables, metadata);
                
                if (!inspection.ready) {
                    result.errors.push({
                        phase: 'validation',
                        missingTables: inspection.missingTables,
                        missingColumns: inspection.missingColumns,
                        invalidTypes: inspection.invalidColumnTypes
                    });
                    
                    // Ne pas considérer comme échec total si ce sont juste des visibleCol ou metadataPending
                    if (inspection.missingTables.length === 0 && inspection.missingColumns.length === 0) {
                        result.success = true;
                        result.warnings.push({ phase: 'validation', details: inspection });
                    } else {
                        result.success = false;
                    }
                } else {
                    result.success = true;
                }
                
                // Afficher le détail de la validation
                console.info(
                    '[GENCI validation]',
                    JSON.stringify({
                        ready: inspection.ready,
                        missingTables: inspection.missingTables,
                        missingColumns: inspection.missingColumns,
                        metadataPending: inspection.metadataPending,
                        invalidColumnTypes: inspection.invalidColumnTypes.length,
                        invalidRefTargets: inspection.invalidRefTargets.length,
                        invalidVisibleColumns: inspection.invalidVisibleColumns.length
                    }, null, 2)
                );
                
                // Afficher les warnings techniques
                if (result.warnings && result.warnings.length > 0) {
                    console.warn('[GENCI] Warnings:', result.warnings);
                }
                
                // Afficher les erreurs si échec
                if (!result.success && result.errors && result.errors.length > 0) {
                    console.error('[GENCI] Errors:', JSON.stringify(result.errors, null, 2));
                }
                
                // bootstrapComplete seulement si succès
                bootstrapComplete = result.success === true;
                var duration = Date.now() - startTime;
                log('Initialisation terminée (' + duration + 'ms)');
                result.duration = duration;
                result.log = globalLog;
                
                return result;
                
            } catch (e) {
                log('Échec initialisation: ' + (e.message || e));
                result.errors.push({ phase: 'global', error: e.message || String(e) });
                result.success = false;
                bootstrapComplete = false;
                throw e;
            } finally {
                bootstrapPromise = null;
            }
        })();
        
        return bootstrapPromise;
    }

    // Ancienne API pour compatibilité
    async function ensureSchema(grist, options) {
        return ensureGenciSchema(grist, options);
    }

    // Export public
    global.TaskFlowBootstrap = {
        ensureSchema: ensureSchema,
        ensureGenciSchema: ensureGenciSchema,
        inspectGenciSchema: inspectGenciSchema,
        loadSchemaMetadata: loadSchemaMetadata,

        }

        if (pending.length === 0) {
            log('Aucune migration en attente');
            return {
                success: true,
                applied: 0,

                finalVersion: currentVersion
            };
        }

                if (!result || !result.success) {
                    throw new Error('Migration échouée: ' + migration.name);
                }
                
                results.push({
                    version: migration.version,
                    name: migration.name,
                    success: true,
                    message: result.message

                // Met à jour la version courante après succès
                lastSuccessfulVersion = migration.version;
                
                // Mettre à jour TaskFlow_Meta
                await updateSchemaVersion(grist, lastSuccessfulVersion, migration.name, nowUnixSeconds);

                log('Échec migration: ' + migration.name, e);
                
                results.push({
                    version: migration.version,
                    name: migration.name,
                    success: false,
                    error: e.message || String(e)

                // Arrête au premier échec

            } else {

// ---- Utils ----------------------------------------------------------------
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const gristToMs = (ts) => ts ? ts * 1000 : 0;
const msToGrist = (ms) => Math.floor(ms / 1000);
function refIds(v) { return Array.isArray(v) && v[0] === 'L' ? v.slice(1).map(Number) : []; }
function mondayOf(ms) { const x = new Date(ms); const dow = (x.getDay() + 6) % 7; x.setHours(0, 0, 0, 0); x.setDate(x.getDate() - dow); return x.getTime(); }
function weekDays() { 
  const r = []; 
  for (let i = 0; i < 5; i++)  // Lun-Ven uniquement (5 jours)
    r.push(S.weekStart + i * DAY); 
  return r; 
}
function sameDay(a, b) { return mondayOf(a) === mondayOf(b) && new Date(a).getDate() === new Date(b).getDate(); }

// unite : facteur de conversion heures <-> unite
function unitFactor() { return S.unit === 'jours' ? S.hoursPerDay : (S.unit === 'demi' ? S.hoursPerDay / 2 : 1); }
function unitLabel() { return S.unit === 'jours' ? 'jours' : (S.unit === 'demi' ? 'demi-journees' : 'heures'); }
function hoursToQty(h) { const q = h / unitFactor(); return Math.round(q * 100) / 100; }
function qtyToHours(q) { return (Number(q) || 0) * unitFactor(); }
function fmtQty(h) { if (!h) return ''; const q = hoursToQty(h); return String(q); }

// somme heures d'une (tache, jour) pour une personne
function cellHours(taskId, dayMs, personId) {
  let h = 0;
  for (const e of S.entries) 
    if (e.membre === personId && e.tache === taskId && sameDay(gristToMs(e.date), dayMs)) 
      h += (Number(e.heures) || 0);
  return h;
}

/**
 * Helper : clé de cellule
 */
function cellKey(taskId, dayMs, personId) {
  return personId + '|' + taskId + '|' + dayMs;
}

/**
 * Helper : clé de jour (YYYY-MM-DD local)
 */
function dayKey(dayMs) {
  const d = new Date(dayMs);
  return [d.getFullYear(), String(d.getMonth() + 1).padStart(2, '0'), String(d.getDate()).padStart(2, '0')].join('-');
}

/**
 * Renvoie les entrées pour une cellule donnée (utilise les index si disponibles)
 */
function cellEntries(taskId, dayMs, personId) {
  // Utiliser les index si disponibles
  if (S.indexes && S.indexes.entriesByPersonWeek) {
    const key = personId + '|' + taskId;
    const entries = S.indexes.entriesByPersonWeek.get(key);
    if (entries) {
      const dk = dayKey(dayMs);
      return entries.filter(e => {
        const eDate = typeof e.date === 'number' ? new Date(e.date * 1000) : new Date(0);
        const edk = [eDate.getFullYear(), String(eDate.getMonth() + 1).padStart(2, '0'), String(eDate.getDate()).padStart(2, '0')].join('-');
        return edk === dk;
      });
    }
  }
  
  // Fallback : filtrage complet
  return S.entries.filter(e => 
    e.membre === personId && 
    e.tache === taskId && 
    sameDay(gristToMs(e.date), dayMs)
  );
}

/**
 * Heures réalisées pour une cellule (optimisé avec index)
 */
function cellActualHours(taskId, dayMs, personId) {
  const entries = cellEntries(taskId, dayMs, personId);
  let h = 0;
  for (const e of entries) {
    h += (Number(e.heures) || 0);
  }
  return h;

          if (edk === dk) {

  for (const e of S.entries) {

// Tâches pour une personne donnée (optimisé avec index)
function gridTasksForPerson(personId) {
  const ids = new Set();
  
  // Tâches assignées à cette personne (via index)
  if (S.indexes && S.indexes.taskById) {
    for (const [taskId, task] of S.indexes.taskById) {
      if (refIds(task.assignees).includes(personId)) {
        ids.add(taskId);
      }
    }
  } else {
    // Fallback sans index
    for (const t of S.tasks) {
      if (refIds(t.assignees).includes(personId)) {
        ids.add(t.id);
      }
    }
  }
  
  // Tâches provenant des affectations actives (optimisé avec index)
  if (S.indexes && S.indexes.assignmentsByPersonTask) {
    for (const [key, assignment] of S.indexes.assignmentsByPersonTask) {
      if (key.startsWith(personId + '|')) {
        ids.add(assignment.tache);
      }
    }
  } else {
    // Fallback
    for (const a of S.assignments) {
      if (a.membre === personId && a.actif !== false) {
        ids.add(a.tache);
      }
    }
  }
  
  // Tâches avec saisie cette semaine (déjà dans les index entriesByPersonWeek)
  if (S.indexes && S.indexes.entriesByPersonWeek) {
    for (const [key, entries] of S.indexes.entriesByPersonWeek) {
      if (key.startsWith(personId + '|')) {
        const taskId = Number(key.split('|')[1]);
        if (taskId) {
          ids.add(taskId);
        }
      }
    }
  }
  
  // Tâches ajoutées manuellement
  const extraForPerson = S.extraRows[personId] || [];
  for (const id of extraForPerson) {
    ids.add(id);
  }
  
  // Appliquer le filtre par projet
  let tasks = [...ids].map(id => {
    if (S.indexes && S.indexes.taskById) {
      return S.indexes.taskById.get(id);
    }
    return S.tasks.find(t => t.id === id);
  }).filter(Boolean);
  
  if (S.filters.project && S.filters.project.length > 0) {
    tasks = tasks.filter(t => S.filters.project.includes(String(t.projet)));
  }
  
  return tasks;
}

// taches de la grille = pour toutes les personnes visibles
function gridTasks() {
  const allTasks = new Set();
  for (const personId of S.visiblePersonIds) {
    const tasks = gridTasksForPerson(personId);
    tasks.forEach(t => allTasks.add(t.id));
  }
  return [...allTasks].map(id => S.tasks.find(t => t.id === id)).filter(Boolean);
}

/**
 * PHASE 1.1.1 - Utiliser MemberDailyCapacities comme source canonique
 * 
 * Priorité :
 * 1. MemberDailyCapacities.capaciteDisponible (même si = 0)
 * 2. MemberDailyCapacities.capaciteTheorique
 * 3. Fallback legacy (capaciteHebdo / 5 + indisponibilités)
 * 
 * @param {number} dayMs - Timestamp du jour en ms
 * @param {number} personId - ID de la personne
 * @returns {number} Capacité en heures
 */
function dayCapacityForPerson(dayMs, personId) {
  // Utiliser le contrôleur canonique qui lit MemberDailyCapacities
  const result = CRAController.dailyCapacityForPersonAndDate(
    personId,
    dayMs,
    S.dailyCapacities || [],
    S.team || [],
    S.disponibilites || []
  );
  
  if (result.warning) {
    console.warn('[CRA] dayCapacityForPerson:', result.warning);
  }
  
  return result.capacity;
}

// Parse Team.indispos (JSON) + Disponibilites table pour une personne donnée
function parseIndisposFor(personId) {
  const indispos = [];
  // Depuis Team.indispos (JSON inline)
  const person = S.team.find(t => t.id === personId);
  if (person && person.indispos) {
    try {
      const arr = JSON.parse(person.indispos);
      if (Array.isArray(arr)) indispos.push(...arr);
    } catch (e) {}
  }
  // Depuis Disponibilites table
  for (const d of S.disponibilites) {
    if (d.membre === personId) {
      indispos.push({
        start: gristToMs(d.dateDebut),
        end: gristToMs(d.dateFin),
        type: d.type || 'autre',
        dispo: d.dispo != null ? d.dispo : 0,  // % de dispo (0 = indispo totale)
        label: d.commentaire || d.type
      });
    }
  }
  return indispos;
}

// Parse pour moi (legacy)
function parseIndispos() {
  return parseIndisposFor(S.me);
}

// Est-ce qu'un jour (ms) est en indisponibilité ?
function isIndispo(dayMs, indispos) {
  for (const ind of indispos) {
    if (dayMs >= ind.start && dayMs <= ind.end) {
      // Si dispo=0 ou non défini = indispo totale
      if (!ind.dispo || ind.dispo === 0) return { isIndispo: true, type: ind.type, label: ind.label };
      // Sinon dispo partielle (ex: 50% = on peut travailler 50% de la capacité)
      return { isIndispo: true, type: ind.type, label: ind.label, dispo: ind.dispo };
    }
  }
  return { isIndispo: false };
}

// Capacité par jour (en heures) pour une personne donnée
function dayCapacityForPerson(dayMs, personId) {
  const person = S.team.find(t => t.id === personId);
  const baseHeures = (person && person.capaciteHebdo) ? person.capaciteHebdo : S.hoursPerDay;
  const baseParJour = baseHeures / 5;  // réparti sur 5 jours (Lun-Ven)
  
  const indispos = parseIndisposFor(personId);
  const ind = isIndispo(dayMs, indispos);
  
  if (ind.isIndispo) {
    // Si dispo partielle (%), on réduit la capacité
    if (ind.dispo != null && ind.dispo > 0 && ind.dispo < 100) {
      return baseParJour * (ind.dispo / 100);
    }
    // Indispo totale
    return 0;
  }
  return baseParJour;
}

// Capacité par jour (en heures) pour moi (legacy)
function dayCapacity(dayMs) {
  return dayCapacityForPerson(dayMs, S.me);
}

      + '<td class="tcell"><span class="fbadge ' + f.statut + '">' + f.statut + '</span></td>'
      + '<td class="tcell">' + act + '</td></tr>';
  }
  html += '</tbody></table>';
  main.innerHTML = html;
}
